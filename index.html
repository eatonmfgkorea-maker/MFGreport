<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFG Report</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body { background: #f8fafc; }
    @media print { .no-print { display: none !important; } }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ===== Validation Panel Component =====
    function ValidationPanel({ tcpData, feData, allLogs, computeLogContribution }) {
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [dateFrom, setDateFrom] = useState('');
      const [dateTo, setDateTo] = useState('');
      const [severityFilter, setSeverityFilter] = useState('all');

      // Helpers
      const parseHm = (hm) => {
        if (!hm || typeof hm !== 'string' || !hm.includes(':')) return null;
        const [h, m] = hm.split(':').map(Number);
        if (isNaN(h) || isNaN(m)) return null;
        return h * 60 + m;
      };
      const minToHm = (m) => {
        m = ((m % (24*60)) + 24*60) % (24*60);
        return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
      };

      // All data collection
      const allDowntimeLogs = useMemo(() => {
        const arr = [];
        if (tcpData?.downtimeLogs) arr.push(...tcpData.downtimeLogs.map(d => ({...d, source: 'TCP'})));
        if (feData?.downtimeLogs) arr.push(...feData.downtimeLogs.map(d => ({...d, source: 'FE'})));
        return arr;
      }, [tcpData, feData]);
      const allDefectLogs = useMemo(() => {
        const arr = [];
        if (tcpData?.defectLogs) arr.push(...tcpData.defectLogs.map(d => ({...d, source: 'TCP'})));
        if (feData?.defectLogs) arr.push(...feData.defectLogs.map(d => ({...d, source: 'FE'})));
        return arr;
      }, [tcpData, feData]);
      const allReworkLogs = useMemo(() => {
        const arr = [];
        if (tcpData?.reworkLogs) arr.push(...tcpData.reworkLogs.map(r => ({...r, source: 'TCP'})));
        if (feData?.reworkLogs) arr.push(...feData.reworkLogs.map(r => ({...r, source: 'FE'})));
        return arr;
      }, [tcpData, feData]);

      // 필터 적용된 로그
      const filteredLogs = useMemo(() => {
        return allLogs.filter(l => {
          if (!l.productionDate) return false;
          if (dateFrom && l.productionDate < dateFrom) return false;
          if (dateTo && l.productionDate > dateTo) return false;
          return true;
        });
      }, [allLogs, dateFrom, dateTo]);

      // === 카테고리 1: 계획비가동 누락 ===
      const planIssues = useMemo(() => {
        const issues = [];
        const STD = [
          { key: '조회',   name: '조회',          sMin: 8*60+30,  eMin: 8*60+40,  dur: 10 },
          { key: '오전쉼', name: '오전 쉬는시간', sMin: 10*60+30, eMin: 10*60+40, dur: 10 },
          { key: '점심',   name: '점심시간',      sMin: 12*60+30, eMin: 13*60+30, dur: 60 },
          { key: '체조',   name: '체조',          sMin: 13*60+30, eMin: 13*60+35, dur: 5 },
          { key: '오후쉼', name: '오후 쉬는시간', sMin: 15*60+20, eMin: 15*60+30, dur: 10 },
          { key: '저녁',   name: '저녁시간',      sMin: 17*60+30, eMin: 18*60,    dur: 30 },
        ];

        // 그룹핑 (date + shift + section)
        const groups = {};
        filteredLogs.forEach(l => {
          if (!l.startTime || !l.endTime) return;
          const key = `${l.productionDate}|${l.shift||'주간'}|${l.section}`;
          if (!groups[key]) groups[key] = [];
          groups[key].push(l);
        });

        const overlap = (as, ae, bs, be) => Math.max(0, Math.min(ae,be) - Math.max(as,bs));

        Object.entries(groups).forEach(([gkey, logs]) => {
          const [date, shift, section] = gkey.split('|');
          const offset = shift === '야간' ? 12*60 : 0;
          const fiveSMin = section === 'FE' ? 10 : 5;

          // work span 합집합
          const workIntervals = [];
          logs.forEach(l => {
            const s = parseHm(l.startTime), e = parseHm(l.endTime);
            if (s == null || e == null) return;
            const ws = s + offset;
            let we = e + offset;
            if (we < ws) we += 24*60;
            workIntervals.push([ws, we]);
          });
          // union
          workIntervals.sort((a,b) => a[0]-b[0]);
          const workUnion = [];
          workIntervals.forEach(([s,e]) => {
            if (workUnion.length && s <= workUnion[workUnion.length-1][1]) {
              workUnion[workUnion.length-1][1] = Math.max(workUnion[workUnion.length-1][1], e);
            } else workUnion.push([s,e]);
          });

          // 계획비가동 (해당 section의 그룹 로그들의)
          const logIds = new Set(logs.map(l => l.id));
          const data = section === 'TCP' ? tcpData : feData;
          const planned = [];
          (data?.downtimeLogs || []).forEach(dt => {
            if (!logIds.has(dt.productionLogId)) return;
            const cat = dt.downtimeCategory || dt.category;
            if (cat !== '계획') return;
            const s = parseHm(dt.startTime), e = parseHm(dt.endTime);
            if (s == null || e == null) return;
            let ds = s + offset, de = e + offset;
            if (de < ds) de += 24*60;
            planned.push([ds, de]);
          });

          // 항목별 체크
          const expected = STD.map(st => ({
            ...st,
            sMinAbs: st.sMin + offset,
            eMinAbs: st.eMin + offset,
          }));
          // 저녁: 작업 종료가 해당 시간 포함?
          // 라인5S: endTime이 17:30/20:00/05:30/08:00?
          const workEnd = workUnion.length ? workUnion[workUnion.length-1][1] : 0;
          const fiveSTargets = [(17*60+30)+offset, (20*60)+offset];
          for (const target of fiveSTargets) {
            if (Math.abs(workEnd - target) <= 5) {
              expected.push({
                key: '라인5S', name: `라인5S (${section})`,
                sMinAbs: target - fiveSMin, eMinAbs: target, dur: fiveSMin
              });
              break;
            }
          }

          const missing = [];
          expected.forEach(ex => {
            // work span에 해당하는 부분만 기대
            let expInWork = 0;
            workUnion.forEach(([ws,we]) => {
              expInWork += overlap(ws, we, ex.sMinAbs, ex.eMinAbs);
            });
            if (expInWork <= 0) return;
            let actual = 0;
            planned.forEach(([ps,pe]) => {
              actual += overlap(ps, pe, ex.sMinAbs, ex.eMinAbs);
            });
            if (actual < expInWork) {
              missing.push({ name: ex.name, expected: expInWork, actual, missing: expInWork - actual });
            }
          });

          if (missing.length > 0) {
            const totalMissing = missing.reduce((s,m) => s+m.missing, 0);
            issues.push({
              category: 'planned_downtime',
              severity: totalMissing >= 30 ? 'high' : (totalMissing >= 10 ? 'mid' : 'low'),
              date,
              shift,
              section,
              line: Array.from(new Set(logs.map(l => l.lineName))).join(', '),
              item: '',
              logCount: logs.length,
              issueText: missing.map(m => `${m.name}(${Math.round(m.missing)}분)`).join(', '),
              missingMinutes: totalMissing,
              logs: logs.map(l => l.id),
            });
          }
        });
        return issues;
      }, [filteredLogs, tcpData, feData]);

      // === 카테고리 2: OEE 계산 이상 ===
      const oeeIssues = useMemo(() => {
        const issues = [];
        filteredLogs.forEach(l => {
          const data = l.section === 'TCP' ? tcpData : feData;
          const items = data?.settings?.[l.section]?.items || [];
          const itemDef = items.find(it => it.item === l.item);
          if (itemDef?.excludeFromOEE === true) return;

          // CT 미설정
          if (!itemDef) {
            issues.push({
              category: 'oee', severity: 'high',
              date: l.productionDate, shift: l.shift,
              section: l.section, line: l.lineName, item: l.item,
              issueText: '아이템이 설정에 없음 (CT 조회 불가)',
              logs: [l.id],
            });
            return;
          }
          if (!itemDef.ct || !Array.isArray(itemDef.ct) || itemDef.ct.length === 0) {
            issues.push({
              category: 'oee', severity: 'high',
              date: l.productionDate, shift: l.shift,
              section: l.section, line: l.lineName, item: l.item,
              issueText: 'CT(Cycle Time) 미설정',
              logs: [l.id],
            });
            return;
          }

          // baseQty 체크
          const workers = Array.isArray(l.selectedWorkers) ? l.selectedWorkers.length : (parseInt(l.workers) || 1);
          const ce = itemDef.ct.find(c => c.workers === workers) || itemDef.ct[0];
          const baseQty = parseFloat(ce?.baseQty) || 0;
          if (baseQty <= 0) {
            issues.push({
              category: 'oee', severity: 'high',
              date: l.productionDate, shift: l.shift,
              section: l.section, line: l.lineName, item: l.item,
              issueText: `baseQty = 0 (인원 ${workers}명 기준)`,
              logs: [l.id],
            });
            return;
          }

          // 기대 대비 실제 비율 체크
          const contrib = computeLogContribution(l);
          if (!contrib) return;
          if (contrib.expectedOutput > 0) {
            const ratio = contrib.goodQty / contrib.expectedOutput;
            if (ratio > 2) {
              issues.push({
                category: 'oee', severity: 'mid',
                date: l.productionDate, shift: l.shift,
                section: l.section, line: l.lineName, item: l.item,
                issueText: `실제 양품(${Math.round(contrib.goodQty)})이 기대생산(${Math.round(contrib.expectedOutput)})의 ${(ratio*100).toFixed(0)}% — CT 재검토 필요`,
                logs: [l.id],
              });
            } else if (ratio < 0.1 && contrib.goodQty > 0) {
              issues.push({
                category: 'oee', severity: 'mid',
                date: l.productionDate, shift: l.shift,
                section: l.section, line: l.lineName, item: l.item,
                issueText: `실제 양품(${Math.round(contrib.goodQty)})이 기대생산(${Math.round(contrib.expectedOutput)})의 ${(ratio*100).toFixed(0)}%로 매우 낮음`,
                logs: [l.id],
              });
            }
          }
        });
        return issues;
      }, [filteredLogs, tcpData, feData, computeLogContribution]);

      // === 카테고리 3: 작업자 이상 ===
      const workerIssues = useMemo(() => {
        const issues = [];
        const tcpEmps = (tcpData?.employees || []).map(e => e.id);
        const feEmps = (feData?.employees || []).map(e => e.id);
        const empSet = new Set([...tcpEmps, ...feEmps]);

        filteredLogs.forEach(l => {
          const sw = l.selectedWorkers;
          const workersNum = parseInt(l.workers) || 0;
          
          // selectedWorkers 비어있음
          if (!Array.isArray(sw) || sw.length === 0) {
            if (workersNum > 0) {
              issues.push({
                category: 'worker', severity: 'mid',
                date: l.productionDate, shift: l.shift,
                section: l.section, line: l.lineName, item: l.item,
                issueText: `인원수(${workersNum})는 있는데 selectedWorkers가 비어있음`,
                logs: [l.id],
              });
            }
            return;
          }
          // workers 숫자 불일치 (선택 작업자 수와 다름, 공유 작업자 고려 안 함)
          if (workersNum > 0 && sw.length !== workersNum) {
            issues.push({
              category: 'worker', severity: 'low',
              date: l.productionDate, shift: l.shift,
              section: l.section, line: l.lineName, item: l.item,
              issueText: `workers(${workersNum}) ≠ selectedWorkers.length(${sw.length})`,
              logs: [l.id],
            });
          }
          // 삭제된 작업자
          sw.forEach(w => {
            const wid = typeof w === 'object' ? w.id : w;
            if (wid != null && !empSet.has(wid)) {
              issues.push({
                category: 'worker', severity: 'mid',
                date: l.productionDate, shift: l.shift,
                section: l.section, line: l.lineName, item: l.item,
                issueText: `작업자 ID ${wid}가 employees에 없음`,
                logs: [l.id],
              });
            }
          });
        });
        return issues;
      }, [filteredLogs, tcpData, feData]);

      // === 카테고리 4: 시간 논리 이상 ===
      const timeIssues = useMemo(() => {
        const issues = [];
        // 4-1: 음수/0분
        filteredLogs.forEach(l => {
          const s = parseHm(l.startTime), e = parseHm(l.endTime);
          if (s == null || e == null) {
            issues.push({
              category: 'time', severity: 'high',
              date: l.productionDate, shift: l.shift,
              section: l.section, line: l.lineName, item: l.item,
              issueText: 'startTime/endTime 누락',
              logs: [l.id],
            });
            return;
          }
          let dur = e - s;
          if (dur < 0) dur += 24*60;
          if (dur === 0) {
            issues.push({
              category: 'time', severity: 'mid',
              date: l.productionDate, shift: l.shift,
              section: l.section, line: l.lineName, item: l.item,
              issueText: '작업시간 = 0분',
              logs: [l.id],
            });
          }
          // 비가동 합계 > 작업시간 체크
          const data = l.section === 'TCP' ? tcpData : feData;
          let dtSum = 0;
          (data?.downtimeLogs || []).forEach(dt => {
            if (dt.productionLogId !== l.id) return;
            let d = parseFloat(dt.duration) || 0;
            if (!d && dt.startTime && dt.endTime) {
              const ds = parseHm(dt.startTime), de = parseHm(dt.endTime);
              if (ds != null && de != null) {
                let end = de; if (end < ds) end += 24*60;
                d = end - ds;
              }
            }
            dtSum += d;
          });
          if (dtSum > dur && dur > 0) {
            issues.push({
              category: 'time', severity: 'high',
              date: l.productionDate, shift: l.shift,
              section: l.section, line: l.lineName, item: l.item,
              issueText: `비가동 합계(${Math.round(dtSum)}분) > 작업시간(${dur}분)`,
              logs: [l.id],
            });
          }
        });
        
        // 4-2: 같은 라인 + 같은 날짜 시간 겹침 (같은 작업자가 두 로그에 있는 경우만)
        const byLineDate = {};
        filteredLogs.forEach(l => {
          if (!l.startTime || !l.endTime) return;
          const k = `${l.productionDate}|${l.section}|${l.lineName}|${l.shift||'주간'}`;
          if (!byLineDate[k]) byLineDate[k] = [];
          byLineDate[k].push(l);
        });
        const getWorkerIds = (log) => {
          const sw = log.selectedWorkers;
          if (!Array.isArray(sw)) return [];
          return sw.map(w => typeof w === 'object' ? w.id : w).filter(x => x != null);
        };
        Object.entries(byLineDate).forEach(([k, logs]) => {
          if (logs.length < 2) return;
          const intervals = logs.map(l => {
            const s = parseHm(l.startTime), e = parseHm(l.endTime);
            let end = e < s ? e + 24*60 : e;
            return { s, e: end, log: l, workers: getWorkerIds(l) };
          }).sort((a,b) => a.s - b.s);
          for (let i = 1; i < intervals.length; i++) {
            const overlapStart = Math.max(intervals[i-1].s, intervals[i].s);
            const overlapEnd = Math.min(intervals[i-1].e, intervals[i].e);
            if (overlapEnd <= overlapStart) continue;
            const overlapMin = overlapEnd - overlapStart;
            // 같은 작업자가 두 로그에 있는지 확인
            const wA = new Set(intervals[i-1].workers);
            const sharedWorkers = intervals[i].workers.filter(w => wA.has(w));
            if (sharedWorkers.length === 0) continue;
            issues.push({
              category: 'time', severity: 'high',
              date: intervals[i].log.productionDate,
              shift: intervals[i].log.shift,
              section: intervals[i].log.section,
              line: intervals[i].log.lineName,
              item: `${intervals[i-1].log.item} & ${intervals[i].log.item}`,
              issueText: `같은 작업자 ${sharedWorkers.length}명이 ${overlapMin}분 겹침: ${minToHm(intervals[i-1].s)}~${minToHm(intervals[i-1].e)} vs ${minToHm(intervals[i].s)}~${minToHm(intervals[i].e)}`,
              logs: [intervals[i-1].log.id, intervals[i].log.id],
            });
          }
        });
        return issues;
      }, [filteredLogs, tcpData, feData]);

      // === 카테고리 5: 양품/불량/재작업 비율 이상 ===
      const ratioIssues = useMemo(() => {
        const issues = [];
        filteredLogs.forEach(l => {
          const good = parseFloat(l.goodQuantity) || 0;
          const data = l.section === 'TCP' ? tcpData : feData;
          let defect = 0, rework = 0;
          (data?.defectLogs || []).forEach(d => {
            if (d.productionLogId === l.id) defect += parseFloat(d.quantity) || 0;
          });
          (data?.reworkLogs || []).forEach(r => {
            if (r.productionLogId === l.id) rework += parseFloat(r.quantity) || 0;
          });
          
          if (rework > good && good >= 0) {
            issues.push({
              category: 'ratio', severity: 'high',
              date: l.productionDate, shift: l.shift,
              section: l.section, line: l.lineName, item: l.item,
              issueText: `재작업(${Math.round(rework)}) > 양품(${Math.round(good)}) — FTFR 음수`,
              logs: [l.id],
            });
          }
          if (defect + rework > good && good > 0) {
            issues.push({
              category: 'ratio', severity: 'mid',
              date: l.productionDate, shift: l.shift,
              section: l.section, line: l.lineName, item: l.item,
              issueText: `불량(${Math.round(defect)}) + 재작업(${Math.round(rework)}) > 양품(${Math.round(good)})`,
              logs: [l.id],
            });
          }
          if (good === 0 && defect === 0 && rework === 0) {
            issues.push({
              category: 'ratio', severity: 'low',
              date: l.productionDate, shift: l.shift,
              section: l.section, line: l.lineName, item: l.item,
              issueText: '양품/불량/재작업 모두 0 (빈 로그?)',
              logs: [l.id],
            });
          }
        });
        return issues;
      }, [filteredLogs, tcpData, feData]);

      const allIssues = useMemo(() => {
        return [...planIssues, ...oeeIssues, ...workerIssues, ...timeIssues, ...ratioIssues];
      }, [planIssues, oeeIssues, workerIssues, timeIssues, ratioIssues]);

      const filteredIssues = useMemo(() => {
        return allIssues.filter(i => {
          if (selectedCategory !== 'all' && i.category !== selectedCategory) return false;
          if (severityFilter !== 'all' && i.severity !== severityFilter) return false;
          return true;
        }).sort((a,b) => {
          const sOrder = { high: 0, mid: 1, low: 2 };
          if (sOrder[a.severity] !== sOrder[b.severity]) return sOrder[a.severity] - sOrder[b.severity];
          return (a.date || '').localeCompare(b.date || '');
        });
      }, [allIssues, selectedCategory, severityFilter]);

      const catStats = useMemo(() => {
        const counts = {
          planned_downtime: planIssues.length,
          oee: oeeIssues.length,
          worker: workerIssues.length,
          time: timeIssues.length,
          ratio: ratioIssues.length,
        };
        return counts;
      }, [planIssues, oeeIssues, workerIssues, timeIssues, ratioIssues]);

      const sevBadge = (sev) => {
        if (sev === 'high') return <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-bold bg-red-100 text-red-700">🔴 심각</span>;
        if (sev === 'mid') return <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-bold bg-yellow-100 text-yellow-700">🟡 경고</span>;
        return <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-bold bg-blue-100 text-blue-700">🔵 정보</span>;
      };

      const CATEGORIES = [
        { id: 'all', label: '전체', icon: '📊', color: 'slate' },
        { id: 'planned_downtime', label: '계획비가동 누락', icon: '⏱️', color: 'indigo' },
        { id: 'oee', label: 'OEE 계산 이상', icon: '⚙️', color: 'purple' },
        { id: 'worker', label: '작업자 이상', icon: '👤', color: 'emerald' },
        { id: 'time', label: '시간 논리 이상', icon: '🕐', color: 'orange' },
        { id: 'ratio', label: '수량 비율 이상', icon: '⚖️', color: 'rose' },
      ];

      return (
        <div className="space-y-5">
          {/* 헤더 + 필터 */}
          <div className="bg-white border border-slate-200 rounded-xl p-5">
            <div className="flex items-center justify-between mb-4">
              <div>

    // ===== Formula Settings Panel =====
    function FormulaPanel({ formulaConfig, saveFormulaConfig, resetFormulaConfig, DEFAULT_FORMULAS, FORMULA_FIELDS, formulaToString, ftfrConfig, saveFtfrConfig, ftfrTaxonomy, setShowFtfrConfig }) {
      const [selectedMetric, setSelectedMetric] = useState('A');
      const [editingPart, setEditingPart] = useState('numerator'); // 'numerator' | 'denominator'
      
      const METRICS = [
        { id: 'A', label: 'A — 가동률', color: 'blue', desc: '설비/공정이 계획된 시간 동안 가동된 비율' },
        { id: 'P', label: 'P — 성능', color: 'purple', desc: '가동 중 얼마나 효율적으로 생산했는가' },
        { id: 'Q', label: 'Q — 품질', color: 'green', desc: '생산된 것 중 몇 개가 양품인가' },
        { id: 'FTFR', label: 'FTFR — 직행률', color: 'amber', desc: 'First Time Right: 재작업 없이 통과한 비율' },
      ];
      
      const currentFormula = formulaConfig[selectedMetric] || { numerator: [], denominator: [] };
      const currentTokens = currentFormula[editingPart] || [];
      
      const addToken = (token) => {
        const next = { ...formulaConfig };
        next[selectedMetric] = { ...next[selectedMetric] };
        next[selectedMetric][editingPart] = [...(next[selectedMetric][editingPart] || []), token];
        saveFormulaConfig(next);
      };
      
      const removeToken = (index) => {
        const next = { ...formulaConfig };
        next[selectedMetric] = { ...next[selectedMetric] };
        next[selectedMetric][editingPart] = currentTokens.filter((_, i) => i !== index);
        saveFormulaConfig(next);
      };
      
      const clearFormula = () => {
        if (!confirm(`${selectedMetric}의 ${editingPart === 'numerator' ? '분자' : '분모'}를 모두 지우시겠습니까?`)) return;
        const next = { ...formulaConfig };
        next[selectedMetric] = { ...next[selectedMetric] };
        next[selectedMetric][editingPart] = [];
        saveFormulaConfig(next);
      };
      
      const resetToDefault = () => {
        if (!confirm(`${selectedMetric} 수식을 기본값으로 되돌리시겠습니까?`)) return;
        const next = { ...formulaConfig };
        next[selectedMetric] = JSON.parse(JSON.stringify(DEFAULT_FORMULAS[selectedMetric]));
        saveFormulaConfig(next);
      };
      
      const metric = METRICS.find(m => m.id === selectedMetric);
      
      // 필드를 그룹별로 정리
      const fieldsByGroup = FORMULA_FIELDS.reduce((acc, f) => {
        if (!acc[f.group]) acc[f.group] = [];
        acc[f.group].push(f);
        return acc;
      }, {});
      
      return (
        <div className="space-y-5">
          {/* Header */}
          <div className="bg-white border border-slate-200 rounded-xl p-5">
            <div className="flex items-center justify-between">
              <div>
                <h2 className="text-xl font-bold text-slate-800">⚙️ OEE/FTFR 수식 설정</h2>
                <p className="text-sm text-slate-500 mt-1">지표별 분자/분모를 필드 + 연산자로 직접 구성할 수 있습니다.</p>
              </div>
              <div className="flex gap-2">
                <button onClick={() => setShowFtfrConfig && setShowFtfrConfig(true)}
                  className="px-4 py-2 bg-indigo-50 text-indigo-700 rounded-lg text-sm font-medium hover:bg-indigo-100">
                  🎯 집계 설정 (라인/스테이션/유형)
                </button>
                <button onClick={() => { if(confirm('모든 수식을 기본값으로 되돌리시겠습니까?')) resetFormulaConfig(); }}
                  className="px-4 py-2 bg-red-50 text-red-700 rounded-lg text-sm font-medium hover:bg-red-100">
                  🔄 전체 초기화
                </button>
              </div>
            </div>
          </div>
          
          {/* Metric selector */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            {METRICS.map(m => (
              <button key={m.id}
                onClick={() => setSelectedMetric(m.id)}
                className={`p-4 rounded-xl border-2 text-left transition-all ${
                  selectedMetric === m.id 
                    ? `border-${m.color}-500 bg-${m.color}-50 shadow-md`
                    : 'border-slate-200 bg-white hover:border-slate-300'
                }`}>
                <div className="text-lg font-bold text-slate-800">{m.label}</div>
                <div className="text-xs text-slate-500 mt-1">{m.desc}</div>
              </button>
            ))}
          </div>
          
          {/* Current formula display */}
          <div className="bg-white border border-slate-200 rounded-xl p-5">
            <h3 className="text-base font-bold text-slate-800 mb-3">현재 수식: {metric?.label}</h3>
            <div className="bg-slate-50 rounded-lg p-5 border border-slate-200">
              <div className="flex flex-col items-center gap-2">
                <div className={`w-full text-center px-4 py-3 rounded-lg border-2 ${editingPart === 'numerator' ? `border-${metric?.color}-500 bg-white` : 'border-slate-200 bg-white'} cursor-pointer`}
                  onClick={() => setEditingPart('numerator')}>
                  <div className="text-xs text-slate-500 mb-1">분자 (X)</div>
                  <div className="font-mono text-sm font-bold text-slate-700">
                    {formulaToString(currentFormula.numerator)}
                  </div>
                </div>
                <div className="text-2xl font-bold text-slate-400">÷</div>
                <div className={`w-full text-center px-4 py-3 rounded-lg border-2 ${editingPart === 'denominator' ? `border-${metric?.color}-500 bg-white` : 'border-slate-200 bg-white'} cursor-pointer`}
                  onClick={() => setEditingPart('denominator')}>
                  <div className="text-xs text-slate-500 mb-1">분모 (Y)</div>
                  <div className="font-mono text-sm font-bold text-slate-700">
                    {formulaToString(currentFormula.denominator)}
                  </div>
                </div>
              </div>
              <div className="mt-3 text-xs text-slate-500 text-center">
                💡 위 분자/분모 영역을 클릭해서 편집할 부분을 선택하세요
              </div>
            </div>
          </div>
          
          {/* Editor: tokens + field catalog + operators */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {/* Current tokens (being edited) */}
            <div className="bg-white border border-slate-200 rounded-xl p-4 lg:col-span-2">
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-base font-bold text-slate-800">
                  편집중: {selectedMetric}의 {editingPart === 'numerator' ? '분자' : '분모'}
                </h3>
                <div className="flex gap-2">
                  <button onClick={resetToDefault} className="px-3 py-1 text-xs bg-slate-100 text-slate-700 rounded hover:bg-slate-200">
                    기본값
                  </button>
                  <button onClick={clearFormula} className="px-3 py-1 text-xs bg-red-50 text-red-700 rounded hover:bg-red-100">
                    모두 지우기
                  </button>
                </div>
              </div>
              
              {/* 토큰 목록 */}
              <div className="min-h-[80px] border-2 border-dashed border-slate-300 rounded-lg p-3 flex flex-wrap gap-2 items-center mb-4">
                {currentTokens.length === 0 ? (
                  <div className="text-slate-400 text-sm w-full text-center">아래에서 필드 또는 연산자를 선택하여 수식을 만드세요</div>
                ) : (
                  currentTokens.map((t, i) => {
                    let display = '';
                    let bg = 'bg-slate-100';
                    if (t.type === 'field') {
                      const f = FORMULA_FIELDS.find(x => x.id === t.id);
                      display = f?.label || t.id;
                      bg = 'bg-indigo-100 text-indigo-700';
                    } else if (t.type === 'op') {
                      display = t.op;
                      bg = 'bg-orange-100 text-orange-700 font-bold';
                    } else if (t.type === 'paren') {
                      display = t.op;
                      bg = 'bg-slate-200 text-slate-700 font-bold';
                    } else if (t.type === 'num') {
                      display = String(t.value);
                      bg = 'bg-emerald-100 text-emerald-700';
                    }
                    return (
                      <span key={i} className={`px-3 py-1.5 rounded-lg text-sm ${bg} flex items-center gap-1`}>
                        {display}
                        <button onClick={() => removeToken(i)} className="ml-1 text-red-500 hover:text-red-700 font-bold">×</button>
                      </span>
                    );
                  })
                )}
              </div>
              
              {/* 연산자 */}
              <div>
                <div className="text-xs font-semibold text-slate-600 mb-2">연산자</div>
                <div className="flex flex-wrap gap-2">
                  {['+', '-', '×', '÷'].map(op => (
                    <button key={op} onClick={() => addToken({type:'op', op})}
                      className="px-4 py-2 bg-orange-50 text-orange-700 rounded-lg hover:bg-orange-100 font-bold text-base">
                      {op}
                    </button>
                  ))}
                  <button onClick={() => addToken({type:'paren', op:'('})}
                    className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 font-bold">
                    (
                  </button>
                  <button onClick={() => addToken({type:'paren', op:')'})}
                    className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 font-bold">
                    )
                  </button>
                  <button onClick={() => {
                    const v = prompt('상수값을 입력하세요 (숫자)');
                    const num = parseFloat(v);
                    if (!isNaN(num)) addToken({type:'num', value:num});
                  }} className="px-4 py-2 bg-emerald-50 text-emerald-700 rounded-lg hover:bg-emerald-100 font-medium">
                    숫자 +
                  </button>
                </div>
              </div>
            </div>
            
            {/* 필드 카탈로그 */}
            <div className="bg-white border border-slate-200 rounded-xl p-4">
              <h3 className="text-base font-bold text-slate-800 mb-3">데이터 필드</h3>
              {Object.entries(fieldsByGroup).map(([group, fields]) => (
                <div key={group} className="mb-3">
                  <div className="text-xs font-semibold text-slate-500 mb-1">{group}</div>
                  <div className="flex flex-col gap-1">
                    {fields.map(f => (
                      <button key={f.id} 
                        onClick={() => addToken({type:'field', id:f.id})}
                        title={f.desc}
                        className="text-left px-3 py-2 bg-indigo-50 text-indigo-700 rounded-lg hover:bg-indigo-100 text-sm">
                        <div className="font-medium">{f.label}</div>
                        <div className="text-xs text-indigo-400 mt-0.5">{f.desc}</div>
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
          
          {/* 모든 수식 미리보기 */}
          <div className="bg-white border border-slate-200 rounded-xl p-5">
            <h3 className="text-base font-bold text-slate-800 mb-3">전체 수식 미리보기</h3>
            <div className="space-y-2">
              {METRICS.map(m => {
                const f = formulaConfig[m.id] || { numerator: [], denominator: [] };
                return (
                  <div key={m.id} className="flex items-center gap-3 py-2 border-b last:border-b-0">
                    <div className={`w-24 px-2 py-1 rounded text-center text-sm font-bold bg-${m.color}-50 text-${m.color}-700`}>
                      {m.id}
                    </div>
                    <div className="flex-1 font-mono text-sm text-slate-700">
                      <span className="text-slate-500">( </span>
                      {formulaToString(f.numerator)}
                      <span className="text-slate-500"> ) ÷ ( </span>
                      {formulaToString(f.denominator)}
                      <span className="text-slate-500"> )</span>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="mt-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-800">
              ✅ 수식 변경 시 OEE 대시보드, OEE 비교, FTFR 탭에 즉시 반영됩니다.
            </div>
          </div>
        </div>
      );
    }

      // OEE Compare tab state

      const [fdViewMode, setFdViewMode] = useState('month'); // 'month' | 'table'
      // FTFR config: { 'TCP|1PC': { stations: [...], defectTypes: [...], reworkTypes: [...] }, ... }

      // 달성율 탭 state — 엑셀에서 로드한 계획/실적 데이터

      const [achStartDate, setAchStartDate] = useState(() => {
