<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFG Report</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body { background: #f8fafc; }
    @media print { .no-print { display: none !important; } }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    function App() {
      const [tcpData, setTcpData] = useState(null);
      const [feData, setFeData] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
      const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth() + 1);
      const today = new Date().toISOString().split('T')[0];
      const monthAgo = new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];
      const [qStartDate, setQStartDate] = useState(monthAgo);
      const [qEndDate, setQEndDate] = useState(today);
      const [qSection, setQSection] = useState('TCP');
      const [qSelectedLines, setQSelectedLines] = useState(['ALL']);
      const [oeeSection, setOeeSection] = useState('TCP');
      const [oeeYear, setOeeYear] = useState(new Date().getFullYear());
      const [oeeMonth, setOeeMonth] = useState(new Date().getMonth() + 1);
      const [oeeManual, setOeeManual] = useState(() => {
        try { return JSON.parse(localStorage.getItem('mfg_oee_manual') || '{}'); } catch { return {}; }
      });
      const [expandedLines, setExpandedLines] = useState({});
      const [showManualMonthly, setShowManualMonthly] = useState(false);
      const [showOeeSettings, setShowOeeSettings] = useState(false);
      const [qdSection, setQdSection] = useState('TCP');
      const [qdYear, setQdYear] = useState(new Date().getFullYear());
      const [qdMonth, setQdMonth] = useState(new Date().getMonth() + 1);
      const [qdLine, setQdLine] = useState('ALL');
      const [showDriveLoad, setShowDriveLoad] = useState(false);
      const [driveFiles, setDriveFiles] = useState([]);
      const [driveBusy, setDriveBusy] = useState(false);
      const todayStr = new Date().toISOString().split('T')[0];
      const monthAgoStr = new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];
      const [odStart, setOdStart] = useState(monthAgoStr);
      const [odEnd, setOdEnd] = useState(todayStr);
      const [odSections, setOdSections] = useState(['TCP','FE']);
      const [odShifts, setOdShifts] = useState(['주간','야간']);
      const [odSelectedItems, setOdSelectedItems] = useState(['ALL']);
      const [odSelectedLines, setOdSelectedLines] = useState(['ALL']);
      const [odExpanded, setOdExpanded] = useState({});
      // OEE detail drilldown modal state
      const [odDrillModal, setOdDrillModal] = useState(null); // { stage: 1|2, sec, item, logs, singleLog, focus?: 'A'|'P'|'Q' }
      const [toolYear, setToolYear] = useState(new Date().getFullYear());
      const [toolMonth, setToolMonth] = useState(new Date().getMonth() + 1);
      const [toolSection, setToolSection] = useState('TCP');
      const [toolSelectedLines, setToolSelectedLines] = useState(['ALL']);
      const [toolDetailMonth, setToolDetailMonth] = useState(null);
      const [drYear, setDrYear] = useState(new Date().getFullYear());
      const [drSection, setDrSection] = useState('TCP');
      const [drSelectedLines, setDrSelectedLines] = useState(['ALL']);
      const [drDetailMonth, setDrDetailMonth] = useState(null);
      const [defectKind, setDefectKind] = useState('process'); // 'process' | 'single'
      const [pmStart, setPmStart] = useState(() => { const d = new Date(); d.setDate(d.getDate()-30); return d.toISOString().slice(0,10); });
      const [pmEnd, setPmEnd] = useState(() => new Date().toISOString().slice(0,10));
      const [pmSection, setPmSection] = useState('TCP');
      const [pmSelectedLines, setPmSelectedLines] = useState(['ALL']);
      const [pmSelectedItems, setPmSelectedItems] = useState(['ALL']);
      const [dtYear, setDtYear] = useState(new Date().getFullYear());
      const [dtSection, setDtSection] = useState('TCP');
      const [dtSelectedLines, setDtSelectedLines] = useState(['ALL']);
      const [dtDetailMonth, setDtDetailMonth] = useState(null);
      const GAS_URL = 'https://script.google.com/macros/s/AKfycbxLFrxbAaBt1bBa3SUdDY9wY48tvt85mEDaj3tiKhyw_R7oJCC9GbOWLfWbdSohnQtB/exec';

      const saveOeeManual = (next) => {
        setOeeManual(next);
        try { localStorage.setItem('mfg_oee_manual', JSON.stringify(next)); } catch {}
      };

      const driveSave = async () => {
        setDriveBusy(true);
        try {
          const payload = {
            filename: `mfg-backup-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.json`,
            data: { version: 1, exportedAt: new Date().toISOString(), tcpData, feData, oeeManual }
          };
          const res = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          const result = await res.json();
          if (result.ok) alert(`백업 완료\n${result.name}`);
          else alert('백업 실패: ' + (result.error || 'unknown'));
        } catch (err) {
          alert('백업 오류: ' + err.message);
        } finally {
          setDriveBusy(false);
        }
      };

      const driveListOpen = async () => {
        setDriveBusy(true);
        setShowDriveLoad(true);
        try {
          const res = await fetch(GAS_URL + '?action=list');
          const result = await res.json();
          if (result.ok) setDriveFiles(result.files || []);
          else { alert('목록 조회 실패: ' + (result.error || 'unknown')); setShowDriveLoad(false); }
        } catch (err) {
          alert('조회 오류: ' + err.message);
          setShowDriveLoad(false);
        } finally {
          setDriveBusy(false);
        }
      };

      const driveLoadFile = async (id) => {
        setDriveBusy(true);
        try {
          const res = await fetch(GAS_URL + '?action=load&id=' + encodeURIComponent(id));
          const result = await res.json();
          if (result.ok && result.data) {
            const d = result.data;
            if (d.tcpData !== undefined) setTcpData(d.tcpData);
            if (d.feData !== undefined) setFeData(d.feData);
            if (d.oeeManual !== undefined) {
              setOeeManual(d.oeeManual || {});
              try { localStorage.setItem('mfg_oee_manual', JSON.stringify(d.oeeManual || {})); } catch {}
            }
            setShowDriveLoad(false);
            alert('복원 완료');
          } else {
            alert('복원 실패: ' + (result.error || 'unknown'));
          }
        } catch (err) {
          alert('복원 오류: ' + err.message);
        } finally {
          setDriveBusy(false);
        }
      };

      const driveDeleteFile = async (id, name) => {
        if (!confirm(`"${name}" 파일을 삭제하시겠습니까?`)) return;
        setDriveBusy(true);
        try {
          const res = await fetch(GAS_URL + '?action=delete&id=' + encodeURIComponent(id));
          const result = await res.json();
          if (result.ok) setDriveFiles(driveFiles.filter(f => f.id !== id));
          else alert('삭제 실패: ' + (result.error || 'unknown'));
        } catch (err) {
          alert('삭제 오류: ' + err.message);
        } finally {
          setDriveBusy(false);
        }
      };

      // Auto-load latest backup on mount (silent — no alerts)
      const [autoLoadStatus, setAutoLoadStatus] = useState('idle'); // idle | loading | done | failed
      React.useEffect(() => {
        let cancelled = false;
        (async () => {
          setAutoLoadStatus('loading');
          try {
            const listRes = await fetch(GAS_URL + '?action=list');
            const listResult = await listRes.json();
            if (cancelled) return;
            if (!listResult.ok || !listResult.files || listResult.files.length === 0) {
              setAutoLoadStatus('failed');
              return;
            }
            // Files are expected sorted by date desc; pick the first
            // (also sort by name as a safety fallback since names are timestamped)
            const sorted = [...listResult.files].sort((a, b) => (b.name || '').localeCompare(a.name || ''));
            const latest = sorted[0];
            const loadRes = await fetch(GAS_URL + '?action=load&id=' + encodeURIComponent(latest.id));
            const loadResult = await loadRes.json();
            if (cancelled) return;
            if (loadResult.ok && loadResult.data) {
              const d = loadResult.data;
              if (d.tcpData !== undefined) setTcpData(d.tcpData);
              if (d.feData !== undefined) setFeData(d.feData);
              if (d.oeeManual !== undefined) {
                setOeeManual(d.oeeManual || {});
                try { localStorage.setItem('mfg_oee_manual', JSON.stringify(d.oeeManual || {})); } catch {}
              }
              setAutoLoadStatus('done');
            } else {
              setAutoLoadStatus('failed');
            }
          } catch (err) {
            if (!cancelled) setAutoLoadStatus('failed');
          }
        })();
        return () => { cancelled = true; };
      }, []);

      const handleFileUpload = (e, type) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (type === 'tcp') setTcpData(data);
            else setFeData(data);
          } catch (error) {
            alert('JSON 파일 파싱 오류: ' + error.message);
          }
        };
        reader.readAsText(file);
      };

      const allLogs = useMemo(() => {
        const logs = [];
        if (tcpData?.productionLogs) logs.push(...tcpData.productionLogs.map(l => ({ ...l, source: 'TCP' })));
        if (feData?.productionLogs) logs.push(...feData.productionLogs.map(l => ({ ...l, source: 'FE' })));
        return logs;
      }, [tcpData, feData]);

      const getLogsForMonth = (year, month, sectionType) => {
        return allLogs.filter(log => {
          const logDate = new Date(log.productionDate);
          const matchYear = logDate.getFullYear() === year;
          const matchMonth = (logDate.getMonth() + 1) === month;
          if (sectionType === 'TCP') return matchYear && matchMonth && log.section === 'TCP' && ['1PC', '2PC', 'Nospin'].includes(log.lineName);
          if (sectionType === 'FE') return matchYear && matchMonth && log.section === 'FE' && log.lineName !== 'FTIV' && log.lineName !== 'ATV' && log.lineName !== 'ATV M/C';
          if (sectionType === 'FTIV') return matchYear && matchMonth && log.section === 'FE' && log.lineName === 'FTIV';
          return false;
        });
      };

      // ===== Dashboard helper: combines log-based and manual raw values =====
      // sectionType: 'TCP' | 'FE' | 'FTIV'
      // Maps to OEE manual section: TCP -> TCP, FE/FTIV -> FE
      const getDashboardSectionData = (year, month, sectionType) => {
        let totalGoodQty = 0, totalDefects = 0, totalRework = 0;
        let totalLoadTime = 0, totalOperatingTime = 0, totalExpectedOutput = 0;
        let logCount = 0;

        // Step 1: check manual data first (priority)
        const manualSection = sectionType === 'TCP' ? 'TCP' : (sectionType === 'FE' ? 'FE' : null);
        let usedManual = false;
        if (manualSection) {
          const key = `${year}-${String(month).padStart(2,'0')}`;
          const monthLines = oeeManual[manualSection]?.monthly?.[key]?.lines || {};
          Object.values(monthLines).forEach(d => {
            const t = parseManualTotals(d);
            if (!t) return;
            totalGoodQty += t.goodQty;
            totalDefects += t.defects;
            totalRework += t.rework;
            totalLoadTime += t.loadTime;
            totalOperatingTime += t.operatingTime;
            totalExpectedOutput += t.expectedOutput;
            usedManual = true;
          });
        }

        // Step 2: if no manual data, fall back to logs
        if (!usedManual) {
          const logs = getLogsForMonth(year, month, sectionType);
          logs.forEach(log => {
            const c = computeLogContribution(log);
            if (!c) return;
            totalGoodQty += c.goodQty;
            totalDefects += c.defects;
            totalRework += c.rework;
            totalLoadTime += c.loadTime;
            totalOperatingTime += c.operatingTime;
            totalExpectedOutput += c.expectedOutput;
            logCount++;
          });
        }

        const hasData = totalGoodQty > 0 || totalDefects > 0 || totalLoadTime > 0;
        if (!hasData) return null;

        const availability = totalLoadTime > 0 ? Math.min(100, (totalOperatingTime / totalLoadTime) * 100) : 0;
        const performance = totalExpectedOutput > 0 ? Math.min(100, (totalGoodQty / totalExpectedOutput) * 100) : 0;
        const totalOutput = totalGoodQty + totalDefects;
        const quality = totalOutput > 0 ? Math.min(100, ((totalGoodQty - totalRework) / totalOutput) * 100) : 100;
        const oee = (availability / 100) * (performance / 100) * (quality / 100) * 100;
        const fpy = totalOutput > 0 ? (totalGoodQty / totalOutput) * 100 : 100;

        return {
          goodQty: totalGoodQty,
          defects: totalDefects,
          rework: totalRework,
          oee: Math.min(100, Math.max(0, oee)),
          fpy: Math.min(100, Math.max(0, fpy)),
          logCount
        };
      };

      const calculateSectionData = (logs) => {
        if (!logs || logs.length === 0) return null;
        let totalGoodQty = 0, totalDefects = 0, totalRework = 0;
        let totalLoadTime = 0, totalOperatingTime = 0, totalExpectedOutput = 0;

        logs.forEach(log => {
          const c = computeLogContribution(log);
          if (!c) return;
          totalGoodQty += c.goodQty;
          totalDefects += c.defects;
          totalRework += c.rework;
          totalLoadTime += c.loadTime;
          totalOperatingTime += c.operatingTime;
          totalExpectedOutput += c.expectedOutput;
        });

        const availability = totalLoadTime > 0 ? Math.min(100, (totalOperatingTime / totalLoadTime) * 100) : 0;
        const performance = totalExpectedOutput > 0 ? Math.min(100, (totalGoodQty / totalExpectedOutput) * 100) : 0;
        const totalOutput = totalGoodQty + totalDefects;
        const quality = totalOutput > 0 ? Math.min(100, ((totalGoodQty - totalRework) / totalOutput) * 100) : 100;
        const oee = (availability / 100) * (performance / 100) * (quality / 100) * 100;
        const fpy = totalOutput > 0 ? (totalGoodQty / totalOutput) * 100 : 100;

        return { goodQty: totalGoodQty, defects: totalDefects, rework: totalRework, oee: Math.min(100, Math.max(0, oee)), fpy: Math.min(100, Math.max(0, fpy)), logCount: logs.length };
      };

      // ===== OEE tab helpers =====
      const computeLogContribution = (log) => {
        const data = log.source === 'TCP' ? tcpData : feData;
        const section = log.section || 'FE';
        const ctBaseMinutes = data?.settings?.[section]?.ctBaseMinutes || 435;
        const items = data?.settings?.[section]?.items || [];
        const itemData = items.find(i => i.item === log.item);
        if (itemData?.excludeFromOEE === true) return null;
        let baseQty = null;
        if (itemData?.ct && Array.isArray(itemData.ct)) {
          const wc = Array.isArray(log.selectedWorkers) ? log.selectedWorkers.length : (parseInt(log.workers) || 1);
          const ce = itemData.ct.find(c => c.workers === wc) || itemData.ct[0];
          baseQty = ce?.baseQty;
        }
        let productionTime = 0;
        if (log.startTime && log.endTime) {
          const [sh, sm] = log.startTime.split(':').map(Number);
          const [eh, em] = log.endTime.split(':').map(Number);
          let s = sh*60+sm, e = eh*60+em;
          if (e < s) e += 24*60;
          productionTime = e - s;
        }
        let plannedDt = 0, unplannedDt = 0, defects = 0, rework = 0;

        // Method 1: lotData (newer format)
        const lotData = data?.lotData;
        if (lotData && log.id && lotData[log.id]) {
          const lld = lotData[log.id];
          if (lld?.downtimes) lld.downtimes.forEach(dt => {
            const dur = parseFloat(dt.duration) || 0;
            if (dt.category === '계획') plannedDt += dur;
            else unplannedDt += dur;
          });
          if (lld?.defects) lld.defects.forEach(d => defects += parseFloat(d.quantity) || 0);
          if (lld?.processDefects) lld.processDefects.forEach(d => defects += parseFloat(d.quantity) || 0);
          if (lld?.reworks) lld.reworks.forEach(r => rework += parseFloat(r.quantity) || 0);
        } else {
          // Method 2: top-level arrays linked by productionLogId
          const parseHm = (hm) => {
            if (!hm || typeof hm !== 'string' || !hm.includes(':')) return null;
            const [h, m] = hm.split(':').map(Number);
            if (isNaN(h) || isNaN(m)) return null;
            return h*60 + m;
          };
          (data?.downtimeLogs || []).forEach(dt => {
            if (dt.productionLogId !== log.id) return;
            let dur = parseFloat(dt.duration) || 0;
            if (!dur && dt.startTime && dt.endTime) {
              const ds = parseHm(dt.startTime), de = parseHm(dt.endTime);
              if (ds != null && de != null) {
                let end = de; if (end < ds) end += 24*60;
                dur = end - ds;
              }
            }
            const cat = dt.downtimeCategory || dt.category;
            if (cat === '계획') plannedDt += dur;
            else unplannedDt += dur;
          });
          (data?.defectLogs || []).forEach(d => {
            if (d.productionLogId === log.id) defects += parseFloat(d.quantity) || 0;
          });
          (data?.processDefectLogs || []).forEach(d => {
            if (d.productionLogId === log.id) defects += parseFloat(d.quantity) || 0;
          });
          (data?.reworkLogs || []).forEach(r => {
            if (r.productionLogId === log.id) rework += parseFloat(r.quantity) || 0;
          });
        }

        const loadTime = productionTime - plannedDt;
        const operatingTime = Math.max(0, loadTime - unplannedDt);
        const goodQty = parseFloat(log.goodQuantity) || 0;
        const expectedOutput = (baseQty && ctBaseMinutes > 0) ? (operatingTime / ctBaseMinutes) * baseQty : 0;
        return { goodQty, defects, rework, loadTime, operatingTime, expectedOutput };
      };

      const computeMetricsFromTotals = (t) => {
        const A = t.loadTime > 0 ? Math.min(100, (t.operatingTime/t.loadTime)*100) : 0;
        const P = t.expectedOutput > 0 ? Math.min(100, (t.goodQty/t.expectedOutput)*100) : 0;
        const totalOut = t.goodQty + t.defects;
        const Q = totalOut > 0 ? Math.min(100, ((t.goodQty - t.rework)/totalOut)*100) : 100;
        const OEE = Math.min(100, Math.max(0, (A/100)*(P/100)*(Q/100)*100));
        return { ...t, totalQty: totalOut, A, P, Q, OEE };
      };

      const aggregateContribs = (logs) => {
        const t = { goodQty:0, defects:0, rework:0, loadTime:0, operatingTime:0, expectedOutput:0 };
        logs.forEach(l => {
          const c = computeLogContribution(l);
          if (!c) return;
          t.goodQty += c.goodQty; t.defects += c.defects; t.rework += c.rework;
          t.loadTime += c.loadTime; t.operatingTime += c.operatingTime; t.expectedOutput += c.expectedOutput;
        });
        return computeMetricsFromTotals(t);
      };

      const addTotals = (a, b) => ({
        goodQty: (a.goodQty||0) + (b.goodQty||0),
        rework: (a.rework||0) + (b.rework||0),
        defects: (a.defects||0) + (b.defects||0),
        loadTime: (a.loadTime||0) + (b.loadTime||0),
        operatingTime: (a.operatingTime||0) + (b.operatingTime||0),
        expectedOutput: (a.expectedOutput||0) + (b.expectedOutput||0),
      });

      const emptyTotals = () => ({ goodQty:0, rework:0, defects:0, loadTime:0, operatingTime:0, expectedOutput:0 });

      const parseManualTotals = (m) => {
        if (!m) return null;
        const parsed = {
          goodQty: parseFloat(m.goodQty) || 0,
          rework: parseFloat(m.rework) || 0,
          defects: parseFloat(m.defects) || 0,
          loadTime: parseFloat(m.loadTime) || 0,
          operatingTime: parseFloat(m.operatingTime) || 0,
          expectedOutput: parseFloat(m.expectedOutput) || 0,
        };
        const hasAny = Object.values(parsed).some(v => v > 0);
        return hasAny ? parsed : null;
      };

      // Get raw totals for a specific (year, month, section, lineGroup).
      // Priority: manual data → logs
      const getGroupTotals = (year, month, section, lineGroup) => {
        const key = `${year}-${String(month).padStart(2,'0')}`;
        const manual = parseManualTotals(oeeManual[section]?.monthly?.[key]?.lines?.[lineGroup]);
        if (manual) return manual;
        const logs = filterOeeLogs(monthLogs(year, month), section).filter(l => groupOfLine(section, l.lineName) === lineGroup);
        const agg = aggregateContribs(logs);
        return { goodQty: agg.goodQty, rework: agg.rework, defects: agg.defects, loadTime: agg.loadTime, operatingTime: agg.operatingTime, expectedOutput: agg.expectedOutput };
      };

      const getMonthTotals = (year, month, section) => {
        let total = emptyTotals();
        getOeeSectionLines.forEach(g => { total = addTotals(total, getGroupTotals(year, month, section, g)); });
        return total;
      };

      const filterOeeLogs = (logs, section) => {
        if (section === 'TCP') return logs.filter(l => l.section === 'TCP' && ['1PC','2PC','Nospin'].includes(l.lineName));
        return logs.filter(l => l.section === 'FE' && l.lineName !== 'ATV' && l.lineName !== 'ATV M/C');
      };

      const groupOfLine = (section, lineName) => {
        if (section === 'TCP') return lineName;
        const ln = (lineName || '').toUpperCase();
        if (ln.includes('GVV')) return 'GVV';
        if (ln.includes('FLVV')) return 'FLVV';
        if (ln.includes('ICV')) return 'ICV';
        if (ln.includes('LVS')) return 'LVS';
        if (ln.includes('MEMB')) return 'Memb';
        if (ln.includes('UCC')) return 'UCC';
        return null;
      };

      // Apply linkedLines from settings: merge lines that the user grouped together.
      // linkedLines is an array of arrays, e.g. [["OLD ICV","NEW ICV"]] → both become "ICV" (first name without OLD/NEW prefix)
      // Returns a map { originalLineName: displayName }
      const getLinkedLineMap = (section) => {
        const data = section === 'TCP' ? tcpData : feData;
        const linked = data?.settings?.[section]?.linkedLines || [];
        const map = {};
        linked.forEach(group => {
          if (!Array.isArray(group) || group.length === 0) return;
          // Pick a clean display name: strip "OLD ", "NEW " prefixes if all members share the same root
          const cleaned = group.map(n => (n || '').replace(/^(OLD|NEW)\s+/i, '').trim());
          const allSameRoot = cleaned.every(c => c === cleaned[0]);
          const display = allSameRoot ? cleaned[0] : group[0];
          group.forEach(orig => { map[orig] = display; });
        });
        return map;
      };

      // Resolve a line name to its display name, applying linkedLines and short aliases
      const LINE_ALIAS = {
        'Auto GVV': 'A/GVV',
        'AUTO GVV': 'A/GVV',
        'Manual GVV': 'M/GVV',
        'MANUAL GVV': 'M/GVV',
        'Auto FLVV': 'A/FLVV',
        'AUTO FLVV': 'A/FLVV',
        'FLVV': 'A/FLVV',
        'Manual FLVV': 'M/FLVV',
        'MANUAL FLVV': 'M/FLVV',
        'COMBO FLVV': 'C/FLVV',
        'Combo FLVV': 'C/FLVV',
        'COMOBO FLVV': 'C/FLVV',
      };
      const resolveLineName = (section, lineName) => {
        if (!lineName) return lineName;
        const map = getLinkedLineMap(section);
        const linked = map[lineName] || lineName;
        return LINE_ALIAS[linked] || linked;
      };

      const FE_LINE_ORDER = ['LVS','A/FLVV','M/FLVV','C/FLVV','A/GVV','M/GVV','FTIV','UCC','ICV','MEMBRANE'];

      // Get the unique list of display line names for a section (after applying linkedLines)
      const getSectionDisplayLines = (section) => {
        const data = section === 'TCP' ? tcpData : feData;
        if (!data) return [];
        const rawLines = new Set();
        (data.productionLogs || []).forEach(l => {
          if (section === 'TCP' && !['1PC','2PC','Nospin'].includes(l.lineName)) return;
          if (section === 'FE' && l.section !== 'FE') return;
          if (section === 'FE' && (l.lineName === 'ATV' || l.lineName === 'ATV M/C')) return;
          if (l.lineName) rawLines.add(l.lineName);
        });
        const map = getLinkedLineMap(section);
        const displaySet = new Set();
        rawLines.forEach(raw => {
          const linked = map[raw] || raw;
          displaySet.add(LINE_ALIAS[linked] || linked);
        });
        if (section === 'FE') {
          const arr = Array.from(displaySet);
          // Sort by FE_LINE_ORDER, unknowns at the end alphabetically
          arr.sort((a, b) => {
            const ia = FE_LINE_ORDER.indexOf(a);
            const ib = FE_LINE_ORDER.indexOf(b);
            if (ia === -1 && ib === -1) return a.localeCompare(b);
            if (ia === -1) return 1;
            if (ib === -1) return -1;
            return ia - ib;
          });
          return arr;
        }
        return Array.from(displaySet).sort();
      };

      const getOeeSectionLines = useMemo(() => {
        if (oeeSection === 'TCP') return ['1PC','2PC','Nospin'];
        return ['GVV','LVS','FLVV','Memb','ICV','UCC'];
      }, [oeeSection]);

      const monthLogs = (year, month) => allLogs.filter(l => {
        const d = new Date(l.productionDate);
        return d.getFullYear() === year && d.getMonth()+1 === month;
      });

      // Selected month per-line breakdown (with item-level expansion)
      // If logs exist for this month → show raw lines from logs (Auto/Manual/etc)
      // If no logs but manual group data exists → show group lines
      const oeeLineBreakdown = useMemo(() => {
        // Check manual data first (priority)
        const key = `${oeeYear}-${String(oeeMonth).padStart(2,'0')}`;
        const manualLines = oeeManual[oeeSection]?.monthly?.[key]?.lines || {};
        const hasManual = Object.values(manualLines).some(d => parseManualTotals(d));

        if (hasManual) {
          const result = {};
          let total = emptyTotals();
          getOeeSectionLines.forEach(g => {
            const t = getGroupTotals(oeeYear, oeeMonth, oeeSection, g);
            if (Object.values(t).some(v => v > 0)) {
              result[g] = { ...computeMetricsFromTotals(t), items: {} };
            }
            total = addTotals(total, t);
          });
          return { lines: result, total: computeMetricsFromTotals(total), isManual: true };
        }

        // Fall back to logs
        const logs = filterOeeLogs(monthLogs(oeeYear, oeeMonth), oeeSection);
        if (logs.length > 0) {
          const lineSet = new Set();
          logs.forEach(l => lineSet.add(l.lineName));
          const result = {};
          Array.from(lineSet).sort().forEach(line => {
            const ll = logs.filter(l => l.lineName === line);
            const agg = aggregateContribs(ll);
            const itemSet = new Set();
            ll.forEach(l => itemSet.add(l.item));
            const items = {};
            Array.from(itemSet).sort().forEach(it => {
              items[it] = aggregateContribs(ll.filter(l => l.item === it));
            });
            result[line] = { ...agg, items };
          });
          return { lines: result, total: aggregateContribs(logs), isManual: false };
        }
        return { lines: {}, total: computeMetricsFromTotals(emptyTotals()), isManual: false };
      }, [allLogs, oeeYear, oeeMonth, oeeSection, oeeManual, tcpData, feData, getOeeSectionLines]);

      // Monthly OEE array (1~12): compute from combined raw totals (manual + logs)
      const monthlyOeeArr = useMemo(() => {
        const arr = [];
        for (let m = 1; m <= 12; m++) {
          const t = getMonthTotals(oeeYear, m, oeeSection);
          const hasData = Object.values(t).some(v => v > 0);
          if (!hasData) { arr.push({ month: m, oee: null, source: 'none' }); continue; }
          // Detect if any manual value contributed
          const key = `${oeeYear}-${String(m).padStart(2,'0')}`;
          const hasManual = oeeManual[oeeSection]?.monthly?.[key]?.lines &&
            Object.values(oeeManual[oeeSection].monthly[key].lines).some(l => parseManualTotals(l));
          const hasLogs = filterOeeLogs(monthLogs(oeeYear, m), oeeSection).length > 0;
          const source = hasManual && !hasLogs ? 'manual' : (hasManual ? 'mixed' : 'calc');
          arr.push({ month: m, oee: computeMetricsFromTotals(t).OEE, source });
        }
        return arr;
      }, [allLogs, oeeYear, oeeSection, oeeManual, tcpData, feData, getOeeSectionLines]);

      // YTD 2026: aggregate all raw totals from month 1 to oeeMonth, then compute
      const ytd2026Overall = useMemo(() => {
        let total = emptyTotals();
        for (let m = 1; m <= oeeMonth; m++) {
          total = addTotals(total, getMonthTotals(oeeYear, m, oeeSection));
        }
        if (!Object.values(total).some(v => v > 0)) return null;
        return computeMetricsFromTotals(total).OEE;
      }, [allLogs, oeeYear, oeeMonth, oeeSection, oeeManual, tcpData, feData, getOeeSectionLines]);

      const ytd2026Lines = useMemo(() => {
        const result = {};
        getOeeSectionLines.forEach(g => {
          let t = emptyTotals();
          for (let m = 1; m <= oeeMonth; m++) {
            t = addTotals(t, getGroupTotals(oeeYear, m, oeeSection, g));
          }
          if (Object.values(t).some(v => v > 0)) {
            result[g] = computeMetricsFromTotals(t).OEE;
          }
        });
        return result;
      }, [allLogs, oeeYear, oeeMonth, oeeSection, oeeManual, getOeeSectionLines, tcpData, feData]);

      const updateManual = (kind, key, value, lineName, field) => {
        const next = { ...oeeManual };
        if (!next[oeeSection]) next[oeeSection] = {};
        if (kind === 'ytdTarget') {
          next[oeeSection].ytdTarget = value;
        } else if (kind === 'ytd2025' || kind === 'goal2026') {
          if (!next[oeeSection][kind]) next[oeeSection][kind] = { overall: '', lines: {} };
          if (key === 'overall') next[oeeSection][kind].overall = value;
          else {
            if (!next[oeeSection][kind].lines) next[oeeSection][kind].lines = {};
            next[oeeSection][kind].lines[lineName] = value;
          }
        } else if (kind === 'monthly') {
          // key = 'YYYY-MM', lineName = group, field = goodQty/rework/defects/loadTime/operatingTime/expectedOutput
          if (!next[oeeSection].monthly) next[oeeSection].monthly = {};
          if (!next[oeeSection].monthly[key]) next[oeeSection].monthly[key] = { lines: {} };
          if (!next[oeeSection].monthly[key].lines) next[oeeSection].monthly[key].lines = {};
          if (!next[oeeSection].monthly[key].lines[lineName]) next[oeeSection].monthly[key].lines[lineName] = {};
          next[oeeSection].monthly[key].lines[lineName][field] = value;
        }
        saveOeeManual(next);
      };

      // Excel export: download a template filled with current manual data
      const exportOeeExcel = () => {
        if (typeof XLSX === 'undefined') { alert('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }
        const rows = [['section','year','month','line','goodQty','rework','defects','loadTime','operatingTime','expectedOutput']];
        ['TCP','FE'].forEach(sec => {
          const lines = sec === 'TCP' ? ['1PC','2PC','Nospin'] : ['GVV','LVS','FLVV','Memb','ICV','UCC'];
          for (let m = 1; m <= 12; m++) {
            const key = `${oeeYear}-${String(m).padStart(2,'0')}`;
            lines.forEach(line => {
              const d = oeeManual[sec]?.monthly?.[key]?.lines?.[line] || {};
              rows.push([sec, oeeYear, m, line, d.goodQty ?? '', d.rework ?? '', d.defects ?? '', d.loadTime ?? '', d.operatingTime ?? '', d.expectedOutput ?? '']);
            });
          }
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'OEE');
        XLSX.writeFile(wb, `oee_manual_${oeeYear}.xlsx`);
      };

      const importOeeExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (typeof XLSX === 'undefined') { alert('엑셀 라이브러리 로딩 중입니다.'); return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const wb = XLSX.read(ev.target.result, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
            if (rows.length < 2) { alert('데이터가 없습니다.'); return; }
            const header = rows[0].map(h => String(h).trim());
            const idx = (name) => header.indexOf(name);
            const next = { ...oeeManual };
            let count = 0;
            for (let i = 1; i < rows.length; i++) {
              const r = rows[i];
              if (!r || r.length === 0) continue;
              const sec = String(r[idx('section')] || '').trim();
              const year = parseInt(r[idx('year')]);
              const month = parseInt(r[idx('month')]);
              const line = String(r[idx('line')] || '').trim();
              if (!['TCP','FE'].includes(sec) || !year || !month || !line) continue;
              const key = `${year}-${String(month).padStart(2,'0')}`;
              if (!next[sec]) next[sec] = {};
              if (!next[sec].monthly) next[sec].monthly = {};
              if (!next[sec].monthly[key]) next[sec].monthly[key] = { lines: {} };
              if (!next[sec].monthly[key].lines) next[sec].monthly[key].lines = {};
              next[sec].monthly[key].lines[line] = {
                goodQty: r[idx('goodQty')] ?? '',
                rework: r[idx('rework')] ?? '',
                defects: r[idx('defects')] ?? '',
                loadTime: r[idx('loadTime')] ?? '',
                operatingTime: r[idx('operatingTime')] ?? '',
                expectedOutput: r[idx('expectedOutput')] ?? '',
              };
              count++;
            }
            saveOeeManual(next);
            alert(`${count}행 불러오기 완료`);
          } catch (err) {
            alert('엑셀 파일 읽기 오류: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
        e.target.value = '';
      };

      // ===== /OEE helpers =====

      const getPrevMonth = (year, month) => month === 1 ? { year: year - 1, month: 12 } : { year, month: month - 1 };

      // ===== Quantity tab helpers =====
      const availableLines = useMemo(() => {
        if (qSection === 'TCP') {
          const lines = new Set();
          allLogs.forEach(log => {
            if (log.section === 'TCP' && ['1PC', '2PC', 'Nospin'].includes(log.lineName)) lines.add(log.lineName);
          });
          return Array.from(lines).sort();
        }
        return getSectionDisplayLines('FE');
      }, [allLogs, qSection, feData, tcpData]);

      const quantityData = useMemo(() => {
        const start = new Date(qStartDate);
        const end = new Date(qEndDate);
        end.setHours(23,59,59,999);
        const itemMap = {};
        allLogs.forEach(log => {
          const d = new Date(log.productionDate);
          if (d < start || d > end) return;
          if (qSection === 'TCP' && !(log.section === 'TCP' && ['1PC','2PC','Nospin'].includes(log.lineName))) return;
          if (qSection === 'FE' && !(log.section === 'FE')) return;
          if (qSection === 'FE' && (log.lineName === 'ATV' || log.lineName === 'ATV M/C')) return;
          const displayLine = resolveLineName(qSection, log.lineName);
          if (!qSelectedLines.includes('ALL') && !qSelectedLines.includes(displayLine)) return;
          const item = log.item || '미지정';
          itemMap[item] = (itemMap[item] || 0) + (parseFloat(log.goodQuantity) || 0);
        });
        const arr = Object.entries(itemMap).map(([item, qty]) => ({ item, qty })).filter(d => d.qty > 0).sort((a,b) => b.qty - a.qty);
        const total = arr.reduce((s,d) => s + d.qty, 0);
        return { items: arr, total };
      }, [allLogs, qStartDate, qEndDate, qSection, qSelectedLines, feData, tcpData]);

      const DONUT_COLORS = ['#22d3ee','#3b82f6','#1e3a8a','#f97316','#60a5fa','#a855f7','#ec4899','#fb923c','#8b5cf6','#06b6d4','#ef4444','#84cc16','#eab308','#14b8a6','#f43f5e','#6366f1','#10b981','#d946ef'];

      const DonutChart = ({ data, total }) => {
        const W = 1000, H = 700;
        const cx = W/2, cy = H/2, r = 180, ir = 110;
        const labelR = r + 35;
        let cumAngle = -Math.PI / 2;
        const raw = data.map((d, i) => {
          const frac = d.qty / total;
          const angle = frac * Math.PI * 2;
          const startA = cumAngle;
          const endA = cumAngle + angle;
          cumAngle = endA;
          const x1 = cx + r * Math.cos(startA), y1 = cy + r * Math.sin(startA);
          const x2 = cx + r * Math.cos(endA), y2 = cy + r * Math.sin(endA);
          const x3 = cx + ir * Math.cos(endA), y3 = cy + ir * Math.sin(endA);
          const x4 = cx + ir * Math.cos(startA), y4 = cy + ir * Math.sin(startA);
          const large = angle > Math.PI ? 1 : 0;
          const path = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${ir} ${ir} 0 ${large} 0 ${x4} ${y4} Z`;
          const midA = (startA + endA) / 2;
          const sx = cx + r * Math.cos(midA);
          const sy = cy + r * Math.sin(midA);
          const lx = cx + labelR * Math.cos(midA);
          const ly = cy + labelR * Math.sin(midA);
          const isRight = Math.cos(midA) >= 0;
          return { path, color: DONUT_COLORS[i % DONUT_COLORS.length], sx, sy, lx, ly, isRight, frac, label: `${d.item} ${Math.round(d.qty).toLocaleString()} (${(frac*100).toFixed(2)}%)`, show: true };
        });

        // Skip overlapping labels: walk each side sorted by angle, hide smaller ones that collide
        const minGap = 22;
        const processSide = (sideSlices) => {
          // Sort by y position (top to bottom)
          const sorted = sideSlices.slice().sort((a,b) => a.ly - b.ly);
          let lastY = -Infinity;
          sorted.forEach(s => {
            if (s.ly - lastY < minGap) {
              s.show = false;
            } else {
              lastY = s.ly;
            }
          });
        };
        processSide(raw.filter(s => s.isRight));
        processSide(raw.filter(s => !s.isRight));

        return (
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-full">
            {raw.map((s, i) => <path key={i} d={s.path} fill={s.color} stroke="white" strokeWidth="1" />)}
            {raw.map((s, i) => {
              if (!s.show) return null;
              const tx = s.lx + (s.isRight ? 6 : -6);
              return (
                <g key={'l'+i}>
                  <polyline points={`${s.sx},${s.sy} ${s.lx},${s.ly}`} fill="none" stroke={s.color} strokeWidth="1.2" />
                  <text x={tx} y={s.ly + 4} textAnchor={s.isRight ? 'start' : 'end'} fontSize="13" fontWeight="700" fill="#1e3a8a">{s.label}</text>
                </g>
              );
            })}
          </svg>
        );
      };

      const availableYears = useMemo(() => {
        const years = new Set();
        allLogs.forEach(log => years.add(new Date(log.productionDate).getFullYear()));
        if (years.size === 0) years.add(new Date().getFullYear());
        return Array.from(years).sort((a, b) => b - a);
      }, [allLogs]);

      const formatNumber = (num) => (num === null || num === undefined) ? '-' : Math.round(num).toLocaleString();

      const renderDiff = (current, prev, isPercent = false, invertColor = false) => {
        if (current === null || prev === null) return <span className="text-slate-400">-</span>;
        const diff = current - prev;
        const color = invertColor ? (diff <= 0 ? 'text-blue-600' : 'text-red-500') : (diff >= 0 ? 'text-blue-600' : 'text-red-500');
        const sign = diff >= 0 ? '+' : '';
        const value = isPercent ? `${sign}${diff.toFixed(1)}%` : `${sign}${formatNumber(diff)}`;
        return <span className={`font-medium ${color}`}>{value}</span>;
      };

      const KpiCell = ({ label, value, prevValue, diff }) => (
        <div className="rounded-md overflow-hidden shadow-sm border border-slate-200 bg-white">
          <div className="bg-indigo-800 text-white text-center py-1.5 text-xs font-bold tracking-wide">{label}</div>
          <div className="px-3 py-2 text-center">
            <div className="text-2xl font-bold text-slate-800 py-1">{value}</div>
            <div className="flex justify-between text-xs mt-2 gap-1">
              <span className="flex-1 px-2 py-1 bg-yellow-50 text-slate-700 rounded">{prevValue}</span>
              <span className="flex-1 px-2 py-1 bg-blue-50 text-blue-700 rounded">{diff}</span>
            </div>
          </div>
        </div>
      );

      const SectionCard = ({ title, bgColor, currentData, prevData, onJump }) => (
        <div className="border-2 border-slate-300 rounded-xl p-5 bg-white/40 cursor-pointer hover:border-indigo-400 hover:shadow-lg transition-all" onClick={onJump} title="클릭하여 OEE 탭으로 이동">
          <div className="grid grid-cols-3 gap-x-10 gap-y-3">
            <div className={`${bgColor} rounded-md shadow-sm border border-slate-200 flex items-center justify-center py-3`}>
              <h2 className="text-2xl font-black text-slate-800 tracking-wider">{title}</h2>
            </div>
          <KpiCell label="FG(Q'ty)" value={formatNumber(currentData?.goodQty)} prevValue={formatNumber(prevData?.goodQty)} diff={renderDiff(currentData?.goodQty, prevData?.goodQty)} />
          <KpiCell label="FPY" value={`${currentData?.fpy?.toFixed(1) || '-'}%`} prevValue={`${prevData?.fpy?.toFixed(1) || '-'}%`} diff={renderDiff(currentData?.fpy, prevData?.fpy, true)} />
          <KpiCell label="OEE" value={`${currentData?.oee?.toFixed(1) || '-'}%`} prevValue={`${prevData?.oee?.toFixed(1) || '-'}%`} diff={renderDiff(currentData?.oee, prevData?.oee, true)} />
          <KpiCell label="Retest(Q'ty)" value={formatNumber(currentData?.rework)} prevValue={formatNumber(prevData?.rework)} diff={renderDiff(currentData?.rework, prevData?.rework, false, true)} />
          <KpiCell label="NG(Q'ty)" value={formatNumber(currentData?.defects)} prevValue={formatNumber(prevData?.defects)} diff={renderDiff(currentData?.defects, prevData?.defects, false, true)} />
          </div>
        </div>
      );

      const TABS = [
        { id: 'dashboard', icon: '📈', label: '대시보드' },
        { id: 'oee',       icon: '⚙️', label: 'OEE' },
        { id: 'oeedetail', icon: '🔍', label: 'OEE(상세)' },
        { id: 'quantity',  icon: '🍩', label: '수량' },
        { id: 'qdetail',   icon: '📋', label: '수량(상세)' },
        { id: 'defect',    icon: '🔴', label: '불량' },
        { id: 'rework',    icon: '♻️', label: '재작업' },
        { id: 'downtime',  icon: '⏸️', label: '비가동' },
        { id: 'pcsmh',     icon: '👤', label: 'PCS/MH' },
        { id: 'tool',      icon: '🔧', label: 'Tool 교체' },
        { id: 'upload',    icon: '📁', label: '데이터' },
      ];

      return (
        <div className="min-h-screen flex bg-slate-50">
          {/* Sidebar */}
          <aside className="w-64 flex-shrink-0 flex flex-col no-print" style={{background: 'linear-gradient(180deg, #0f172a 0%, #1e293b 100%)'}}>
            <div className="px-6 py-6 border-b border-white/5">
              <div className="flex items-center gap-3">
                <div className="w-11 h-11 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg" style={{background: 'linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%)', boxShadow: '0 4px 14px rgba(99,102,241,0.4)'}}>M</div>
                <div className="text-lg font-bold text-white tracking-tight leading-none">MFG Report</div>
              </div>
            </div>
            <nav className="flex-1 py-5 px-3 space-y-1 overflow-y-auto">
              {(() => {
                // Compute simple alerts
                const alerts = {};
                try {
                  const now = new Date();
                  const thisY = now.getFullYear(), thisM = now.getMonth() + 1;
                  const inThisMonth = (d) => { const x = new Date(d); return x.getFullYear() === thisY && x.getMonth()+1 === thisM; };
                  // Defect spike: this month count > last month * 1.5
                  const defThis = (tcpData?.defectLogs || []).concat(feData?.defectLogs || []).concat(tcpData?.processDefectLogs || [], feData?.processDefectLogs || []).filter(d => {
                    const log = (d.productionLogId && (tcpData?.productionLogs || feData?.productionLogs || []).find(l => l.id === d.productionLogId));
                    return log && inThisMonth(log.productionDate);
                  }).reduce((s,d) => s + (parseFloat(d.quantity) || 0), 0);
                  if (defThis > 1000) alerts.defect = true;
                  // OEE low flag: check manual data for this month
                  const key = `${thisY}-${String(thisM).padStart(2,'0')}`;
                  ['TCP','FE'].forEach(sec => {
                    const m = oeeManual[sec]?.monthly?.[key];
                    if (m && m.lines) {
                      const vals = Object.values(m.lines).map(l => l?.oee).filter(v => v != null && v < 70);
                      if (vals.length > 0) alerts.oee = true;
                    }
                  });
                } catch {}
                return TABS.map(tab => {
                  const isActive = activeTab === tab.id;
                  const hasAlert = (tab.id === 'defect' && alerts.defect) || (tab.id === 'oee' && alerts.oee);
                  return (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}

              // Filter logs by date range and section
              const baseLogs = allLogs.filter(l => {
                const d = new Date(l.productionDate);
                if (d < startD || d > endD) return false;
                if (!odSections.includes(l.section)) return false;
                if (l.section === 'TCP' && !['1PC','2PC','Nospin'].includes(l.lineName)) return false;
                if (l.section === 'FE' && (l.lineName === 'ATV' || l.lineName === 'ATV M/C')) return false;
                const shift = l.shift || '주간';
                if (!odShifts.includes(shift)) return false;
                return true;
              });

              // Available lines (within section filter)
              const odLines = (() => {
                const s = new Set();
                allLogs.forEach(l => {
                  if (!odSections.includes(l.section)) return;
                  if (l.section === 'TCP' && !['1PC','2PC','Nospin'].includes(l.lineName)) return;
                  if (l.section === 'FE' && (l.lineName === 'ATV' || l.lineName === 'ATV M/C')) return;
                  s.add(l.lineName);
                });
                return Array.from(s).sort();
              })();

              // Available items (within section + line filter)
              const odItems = (() => {
                const s = new Set();
                allLogs.forEach(l => {
                  if (!odSections.includes(l.section)) return;
                  if (l.section === 'TCP' && !['1PC','2PC','Nospin'].includes(l.lineName)) return;
                  if (l.section === 'FE' && (l.lineName === 'ATV' || l.lineName === 'ATV M/C')) return;
                  if (!odSelectedLines.includes('ALL') && !odSelectedLines.includes(l.lineName)) return;
                  if (l.item) s.add(l.item);
                });
                return Array.from(s).sort();
              })();

              // Apply line + item filters
              const logs = baseLogs.filter(l => {
                if (!odSelectedLines.includes('ALL') && !odSelectedLines.includes(l.lineName)) return false;
                if (!odSelectedItems.includes('ALL') && !odSelectedItems.includes(l.item)) return false;
                return true;
              });

              // Aggregate per section -> per item
              const sectionData = {};
              ['TCP','FE'].forEach(sec => {
                if (!odSections.includes(sec)) return;
                const sLogs = logs.filter(l => l.section === sec);
                if (sLogs.length === 0) return;
                const itemMap = {};
                sLogs.forEach(l => {
                  const it = l.item || '(미지정)';
                  if (!itemMap[it]) itemMap[it] = [];
                  itemMap[it].push(l);
                });
                const items = {};
                Object.keys(itemMap).sort().forEach(it => {
                  items[it] = aggregateContribs(itemMap[it]);
                });
                sectionData[sec] = {
                  agg: aggregateContribs(sLogs),
                  items
                };
              });

              // Grand total
              const grandTotal = aggregateContribs(logs);

              const Gauge = ({ label, value, color, onClick }) => {
                const pct = Math.max(0, Math.min(100, value));
                const r = 70, cx = 90, cy = 90;
                const startA = Math.PI, endA = 2*Math.PI;
                const valA = startA + (endA - startA) * (pct/100);
                const arcPath = (a1, a2) => {
                  const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
                  const x2 = cx + r*Math.cos(a2), y2 = cy + r*Math.sin(a2);
                  const large = (a2 - a1) > Math.PI ? 1 : 0;
                  return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
                };
                return (
                  <div className={`bg-white border border-slate-200 rounded-lg overflow-hidden flex flex-col ${onClick ? 'cursor-pointer hover:border-indigo-400 hover:shadow-md transition-all' : ''}`} onClick={onClick} title={onClick ? '클릭하여 상세 분석' : undefined}>
                    <div className="bg-gradient-to-b from-gray-100 to-gray-50 text-center py-2 font-bold text-slate-700 border-b">{label}</div>
                    <div className="relative flex-1 flex items-center justify-center">
                      <svg viewBox="0 0 180 110" className="w-full">
                        <path d={arcPath(startA, endA)} fill="none" stroke="#e5e7eb" strokeWidth="18" strokeLinecap="round" />
                        <path d={arcPath(startA, valA)} fill="none" stroke={color} strokeWidth="18" strokeLinecap="round" />
                        <text x={cx} y={cy + 15} textAnchor="middle" fontSize="26" fontWeight="bold" fill="#1f2937">{pct.toFixed(1)}%</text>
                      </svg>
                    </div>
                  </div>
                );
              };

              const toggleArr = (arr, val, all) => {
                if (arr.includes('ALL')) return [val];
                if (arr.includes(val)) {
                  const next = arr.filter(v => v !== val);
                  return next.length === 0 ? ['ALL'] : next;
                }
                const next = [...arr, val];
                return next.length === all.length ? ['ALL'] : next;
              };

              return (
                <div className="flex gap-3">
                  {/* Left filter panel */}
                  <div className="w-64 flex-shrink-0 space-y-2">
                    <div className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 text-center py-1.5 font-bold text-sm">생산일자</div>
                      <div className="p-3 space-y-2">
                        <input type="date" value={odStart} onChange={(e) => setOdStart(e.target.value)} className="w-full px-2 py-1 border rounded text-xs" />
                        <input type="date" value={odEnd} onChange={(e) => setOdEnd(e.target.value)} className="w-full px-2 py-1 border rounded text-xs" />
                      </div>
                    </div>
                    <div className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">

                    const computeFromLogs = (logArr) => {
                      let lt=0, ot=0, gq=0, df=0, rw=0, exp=0, totalQ=0;
                      logArr.forEach(l => {
                        const c = computeLogContribution(l);
                        if (!c) return;
                        lt += c.loadTime || 0;
                        ot += c.operatingTime || 0;
                        gq += c.goodQty || 0;
                        df += c.defects || 0;
                        rw += c.rework || 0;
                        exp += c.expectedOutput || 0;
                      });
                      totalQ = gq + df;
                      const A = lt > 0 ? Math.min(100, ot/lt*100) : 0;
                      const P = exp > 0 ? Math.min(100, gq/exp*100) : 0;
                      const Q = totalQ > 0 ? Math.min(100, (gq-rw)/totalQ*100) : 100;
                      return { lt, ot, gq, df, rw, exp, totalQ, A, P, Q, OEE: A*P*Q/10000 };
                    };

                    const m = odDrillModal;
                    const isStage1 = m.stage === 1;
                    // For Stage 2, prefer single log's section; else use sec
                    const effectiveSec = !isStage1 && m.singleLog ? m.singleLog.section : m.sec;
                    const data = effectiveSec === 'TCP' ? tcpData : feData;
                    const items = data?.settings?.[effectiveSec]?.items || [];
                    const ctBase = data?.settings?.[effectiveSec]?.ctBaseMinutes || 440;

                    let agg, title, subtitle;
                    if (isStage1) {
                      agg = computeFromLogs(m.logs);
                      const focusLabel = m.focus === 'A' ? 'A (가동률) 분석' : m.focus === 'P' ? 'P (성능) 분석' : m.focus === 'Q' ? 'Q (품질) 분석' : '기간 합산';

                      subtitle = `${m.sec === '전체' ? '필터 적용된 모든 데이터' : m.sec} · ${m.logs.length}건의 작업 합산`;
                    } else {
                      agg = computeFromLogs([m.singleLog]);
                      title = `${m.singleLog.item || m.item} · ${m.singleLog.productionDate}`;
                      subtitle = `${m.singleLog.section} · ${m.singleLog.lineName} · ${m.singleLog.shift || '-'}`;
                    }

                    // For stage 2: extract details from single log
                    const log = !isStage1 ? m.singleLog : null;
                    const dts = !isStage1 ? (data.downtimeLogs || []).filter(d => d.productionLogId === log.id) : [];
                    const itemDef = !isStage1 ? items.find(i => i.item === log.item) : null;
                    const wcount = !isStage1 ? (Array.isArray(log.selectedWorkers) ? log.selectedWorkers.length : (parseFloat(log.workers) || 1)) : 0;
                    const ctEntry = !isStage1 && itemDef && Array.isArray(itemDef.ct) ? (itemDef.ct.find(c => c.workers === Math.round(wcount)) || itemDef.ct[0]) : null;
                    const baseQty = ctEntry?.baseQty;

                    // Focus mode aggregations (only computed when needed)
                    let focusDts = {}, focusItems = {}, focusDefects = {};
                    if (isStage1 && m.focus) {
                      const idsSet = new Set(m.logs.map(l => l.id));
                      // Downtime by type for A focus
                      if (m.focus === 'A') {
                        ['TCP','FE'].forEach(s => {
                          const d = s === 'TCP' ? tcpData : feData;
                          (d?.downtimeLogs || []).forEach(dt => {
                            if (!idsSet.has(dt.productionLogId)) return;
                            const t = dt.downtimeType || '미분류';
                            const cat = dt.downtimeCategory || dt.category || '비계획';
                            let dur = parseFloat(dt.duration) || 0;
                            if (!dur && dt.startTime && dt.endTime) {
                              const [sh,sm] = dt.startTime.split(':').map(Number);
                              const [eh,em] = dt.endTime.split(':').map(Number);
                              let ds = sh*60+sm, de = eh*60+em;
                              if (de < ds) de += 1440;
                              dur = de - ds;
                            }
                            if (!focusDts[t]) focusDts[t] = { count: 0, mins: 0, category: cat };
                            focusDts[t].count++;
                            focusDts[t].mins += dur;
                          });
                        });
                      }
                      // Per-item P breakdown
                      if (m.focus === 'P') {
                        m.logs.forEach(l => {
                          const c = computeLogContribution(l);
                          if (!c) return;
                          const it = l.item || '미지정';
                          if (!focusItems[it]) focusItems[it] = { ot: 0, exp: 0, gq: 0 };
                          focusItems[it].ot += c.operatingTime || 0;
                          focusItems[it].exp += c.expectedOutput || 0;
                          focusItems[it].gq += c.goodQty || 0;
                        });
                      }
                      // Defect type breakdown
                      if (m.focus === 'Q') {
                        ['TCP','FE'].forEach(s => {
                          const d = s === 'TCP' ? tcpData : feData;
                          [...(d?.defectLogs || []), ...(d?.processDefectLogs || [])].forEach(df => {
                            if (!idsSet.has(df.productionLogId)) return;
                            const t = df.defectType || df.type || '미분류';
                            if (!focusDefects[t]) focusDefects[t] = { count: 0, qty: 0 };
                            focusDefects[t].count++;
                            focusDefects[t].qty += parseFloat(df.quantity) || 0;
                          });
                        });
                      }
                    }
                    const showA = !m.focus || m.focus === 'A';
                    const showP = !m.focus || m.focus === 'P';
                    const showQ = !m.focus || m.focus === 'Q';
                    const showOEEHeader = !m.focus;
                    const showLogList = isStage1 && !m.focus;

                    return (
                      <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background: 'rgba(15,23,42,0.6)'}} onClick={() => setOdDrillModal(null)}>

                            </div>
                          </div>

                          <div className="p-5 overflow-y-auto space-y-4">
                            {/* OEE Header */}
                            {showOEEHeader && (
                              <div className="bg-slate-50 rounded-xl p-4 text-center">
                                <div className="text-xs text-slate-500 mb-1">최종 OEE</div>

                                <div className="font-bold text-blue-900">▶ A (가동률)</div>

                              </div>
                              <div className="p-4 text-sm space-y-1.5">
                                {!isStage1 && log && (
                                  <>
                                    <div className="flex justify-between"><span className="text-slate-600">총 근무시간:</span><span>{(agg.lt + dts.filter(d => (d.downtimeCategory||d.category)==='계획').reduce((s,d) => s + (parseFloat(d.duration)||0), 0)).toFixed(0)}분 ({log.startTime || '-'} ~ {log.endTime || '-'})</span></div>
                                    <div className="flex justify-between"><span className="text-slate-600">계획 비가동:</span><span className="text-blue-600 font-medium">{dts.filter(d => (d.downtimeCategory||d.category)==='계획').reduce((s,d) => s + (parseFloat(d.duration)||0), 0).toFixed(0)}분</span></div>
                                    {dts.filter(d => (d.downtimeCategory||d.category)==='계획').map((d,i) => (
                                      <div key={i} className="text-xs text-slate-500 ml-4">• {d.downtimeType}: {d.startTime||'-'}~{d.endTime||'-'} ({(parseFloat(d.duration)||0).toFixed(0)}분)</div>
                                    ))}
                                    <div className="flex justify-between"><span className="text-slate-600">비계획 비가동:</span><span className="text-rose-600 font-medium">{dts.filter(d => (d.downtimeCategory||d.category)!=='계획').reduce((s,d) => s + (parseFloat(d.duration)||0), 0).toFixed(0)}분</span></div>
                                    {dts.filter(d => (d.downtimeCategory||d.category)!=='계획').map((d,i) => (
                                      <div key={i} className="text-xs text-slate-500 ml-4">• {d.downtimeType}: {d.startTime||'-'}~{d.endTime||'-'} ({(parseFloat(d.duration)||0).toFixed(0)}분)</div>
                                    ))}
                                  </>
                                )}
                                <div className="flex justify-between"><span className="text-slate-600">부하시간 (Load Time):</span><span>{Math.round(agg.lt).toLocaleString()}분</span></div>
                                <div className="flex justify-between"><span className="text-slate-600">실제 가동시간:</span><span className="text-emerald-600 font-medium">{Math.round(agg.ot).toLocaleString()}분</span></div>
                                <div className="bg-slate-50 mt-2 px-3 py-1.5 rounded text-xs text-slate-500">계산식: {Math.round(agg.ot).toLocaleString()}분 ÷ {Math.round(agg.lt).toLocaleString()}분 × 100 = {agg.A.toFixed(1)}%</div>
                                {m.focus === 'A' && Object.keys(focusDts).length > 0 && (
                                  <div className="mt-4 border-t border-slate-200 pt-3">
                                    <div className="font-bold text-slate-700 mb-2">비가동 유형별 합계</div>
                                    <table className="w-full text-xs">
                                      <thead className="bg-slate-50 text-slate-600">
                                        <tr>
                                          <th className="px-3 py-1.5 text-left font-semibold">유형</th>

                                          <th className="px-3 py-1.5 text-right font-semibold">횟수</th>

                                        </tr>
                                      </thead>
                                      <tbody>
                                        {Object.entries(focusDts).sort((a,b)=>b[1].mins-a[1].mins).map(([t,v],i) => (
                                          <tr key={i} className="border-t border-slate-100">
                                            <td className="px-3 py-1.5 font-medium">{t}</td>
                                            <td className="px-3 py-1.5 text-center"><span className={`px-2 py-0.5 rounded text-[10px] ${v.category==='계획'?'bg-emerald-50 text-emerald-700':'bg-amber-50 text-amber-700'}`}>{v.category}</span></td>

                            {/* P */}

                                <div className="flex justify-between"><span className="text-slate-600">실제 생산량 (양품):</span><span className="text-emerald-600 font-medium">{Math.round(agg.gq).toLocaleString()}개</span></div>
                                <div className="bg-slate-50 mt-2 px-3 py-1.5 rounded text-xs text-slate-500">계산식: {Math.round(agg.gq).toLocaleString()}개 ÷ {Math.round(agg.exp).toLocaleString()}개 × 100 = {agg.P.toFixed(1)}%</div>
                                {m.focus === 'P' && Object.keys(focusItems).length > 0 && (
                                  <div className="mt-4 border-t border-slate-200 pt-3">
                                    <div className="font-bold text-slate-700 mb-2">아이템별 P</div>
                                    <table className="w-full text-xs">
                                      <thead className="bg-slate-50 text-slate-600">
                                        <tr>

                                          <th className="px-3 py-1.5 text-right font-semibold">가동(분)</th>
                                          <th className="px-3 py-1.5 text-right font-semibold">기대</th>
                                          <th className="px-3 py-1.5 text-right font-semibold">양품</th>
                                          <th className="px-3 py-1.5 text-right font-semibold">P</th>
                                        </tr>
                                      </thead>
                                      <tbody>
                                        {Object.entries(focusItems).sort((a,b)=>b[1].exp-a[1].exp).map(([it,v],i) => {

                                      </tbody>
                                    </table>
                                  </div>

                              </div>
                            </div>

                            {/* Q */}
                            {showQ && (

                                <div className="text-2xl font-black text-emerald-700">{agg.Q.toFixed(1)}%</div>
                              </div>
                              <div className="p-4 text-sm space-y-1.5">

                                <div className="flex justify-between"><span className="text-slate-600">양품:</span><span className="text-emerald-600 font-medium">{Math.round(agg.gq).toLocaleString()}개</span></div>
                                <div className="flex justify-between"><span className="text-slate-600">불량 (OEE 반영):</span><span className="text-rose-600 font-medium">{Math.round(agg.df).toLocaleString()}개</span></div>
                                <div className="flex justify-between"><span className="text-slate-600">재작업:</span><span className="text-amber-600 font-medium">{Math.round(agg.rw).toLocaleString()}개</span></div>
                                <div className="bg-slate-50 mt-2 px-3 py-1.5 rounded text-xs text-slate-500">계산식: ({Math.round(agg.gq).toLocaleString()}개 − {Math.round(agg.rw).toLocaleString()}개) ÷ {Math.round(agg.totalQ).toLocaleString()}개 × 100 = {agg.Q.toFixed(1)}%</div>
                                {m.focus === 'Q' && Object.keys(focusDefects).length > 0 && (

                                          <th className="px-3 py-1.5 text-left font-semibold">유형</th>

                                    </table>

                            </div>
