                            );
                          })}
                          {Object.keys(sectionData).length > 0 && (
                            <tr className="border-t-2 border-slate-500 bg-slate-200 font-bold">
                              <td></td>
                              <td className="px-3 py-2">합계</td>
                              <td className="px-3 py-2 text-right">{Math.round(grandTotal.totalQty).toLocaleString()}</td>
                              <td className="px-3 py-2 text-right">{Math.round(grandTotal.expectedOutput).toLocaleString()}</td>
                              <td className="px-3 py-2 text-right">{Math.round(grandTotal.goodQty).toLocaleString()}</td>
                              <td className="px-3 py-2 text-right">{Math.round(grandTotal.rework).toLocaleString()}</td>
                              <td className="px-3 py-2 text-right">{Math.round(grandTotal.defects).toLocaleString()}</td>
                              <td className="px-3 py-2 text-right">{Math.round(grandTotal.operatingTime).toLocaleString()}</td>
                              <td className="px-3 py-2 text-right">{Math.round(grandTotal.loadTime).toLocaleString()}</td>
                              <td className="px-3 py-2 text-right bg-blue-100">{grandTotal.A.toFixed(1)}%</td>
                              <td className="px-3 py-2 text-right bg-yellow-100">{grandTotal.P.toFixed(1)}%</td>
                              <td className="px-3 py-2 text-right bg-green-100">{grandTotal.Q.toFixed(1)}%</td>
                              <td className="px-3 py-2 text-right bg-indigo-100 text-indigo-700">{grandTotal.OEE.toFixed(1)}%</td>
                            </tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Drilldown modal */}
                  {odDrillModal && (() => {
                    const computeFromLogs = (logArr) => {
                      let lt=0, ot=0, gq=0, df=0, rw=0, exp=0, totalQ=0;
                      logArr.forEach(l => {
                        const c = computeLogContribution(l);
                        if (!c) return;
                        lt += c.loadTime || 0;
                        ot += c.operatingTime || 0;
                        gq += c.goodQty || 0;
                        df += c.defects || 0;
                        rw += c.rework || 0;
                        exp += c.expectedOutput || 0;
                      });
                      totalQ = gq + df;
                      const A = lt > 0 ? Math.min(100, ot/lt*100) : 0;
                      const P = exp > 0 ? Math.min(100, gq/exp*100) : 0;
                      const Q = totalQ > 0 ? Math.min(100, (gq-rw)/totalQ*100) : 100;
                      return { lt, ot, gq, df, rw, exp, totalQ, A, P, Q, OEE: A*P*Q/10000 };
                    };

                    const m = odDrillModal;
                    const isStage1 = m.stage === 1;
                    // For Stage 2, prefer single log's section; else use sec
                    const effectiveSec = !isStage1 && m.singleLog ? m.singleLog.section : m.sec;
                    const data = effectiveSec === 'TCP' ? tcpData : feData;
                    const items = data?.settings?.[effectiveSec]?.items || [];
                    const ctBase = data?.settings?.[effectiveSec]?.ctBaseMinutes || 440;

                    let agg, title, subtitle;
                    if (isStage1) {
                      agg = computeFromLogs(m.logs);
                      const focusLabel = m.focus === 'A' ? 'A (가동률) 분석' : m.focus === 'P' ? 'P (성능) 분석' : m.focus === 'Q' ? 'Q (품질) 분석' : '기간 합산';
                      title = `${m.item} · ${focusLabel}`;
                      subtitle = `${m.sec === '전체' ? '필터 적용된 모든 데이터' : m.sec} · ${m.logs.length}건의 작업 합산`;
                    } else {
                      agg = computeFromLogs([m.singleLog]);
                      title = `${m.singleLog.item || m.item} · ${m.singleLog.productionDate}`;
                      subtitle = `${m.singleLog.section} · ${m.singleLog.lineName} · ${m.singleLog.shift || '-'}`;
                    }

                    // For stage 2: extract details from single log
                    const log = !isStage1 ? m.singleLog : null;
                    const dts = !isStage1 ? (data.downtimeLogs || []).filter(d => d.productionLogId === log.id) : [];
                    const itemDef = !isStage1 ? items.find(i => i.item === log.item) : null;
                    const wcount = !isStage1 ? (Array.isArray(log.selectedWorkers) ? log.selectedWorkers.length : (parseFloat(log.workers) || 1)) : 0;
                    const ctEntry = !isStage1 && itemDef && Array.isArray(itemDef.ct) ? (itemDef.ct.find(c => c.workers === Math.round(wcount)) || itemDef.ct[0]) : null;
                    const baseQty = ctEntry?.baseQty;

                    // Focus mode aggregations (only computed when needed)
                    let focusDts = {}, focusItems = {}, focusDefects = {};
                    if (isStage1 && m.focus) {
                      const idsSet = new Set(m.logs.map(l => l.id));
                      // Downtime by type for A focus
                      if (m.focus === 'A') {
                        ['TCP','FE'].forEach(s => {
                          const d = s === 'TCP' ? tcpData : feData;
                          (d?.downtimeLogs || []).forEach(dt => {
                            if (!idsSet.has(dt.productionLogId)) return;
                            const t = dt.downtimeType || '미분류';
                            const cat = dt.downtimeCategory || dt.category || '비계획';
                            let dur = parseFloat(dt.duration) || 0;
                            if (!dur && dt.startTime && dt.endTime) {
                              const [sh,sm] = dt.startTime.split(':').map(Number);
                              const [eh,em] = dt.endTime.split(':').map(Number);
                              let ds = sh*60+sm, de = eh*60+em;
                              if (de < ds) de += 1440;
                              dur = de - ds;
                            }
                            if (!focusDts[t]) focusDts[t] = { count: 0, mins: 0, category: cat };
                            focusDts[t].count++;
                            focusDts[t].mins += dur;
                          });
                        });
                      }
                      // Per-item P breakdown
                      if (m.focus === 'P') {
                        m.logs.forEach(l => {
                          const c = computeLogContribution(l);
                          if (!c) return;
                          const it = l.item || '미지정';
                          if (!focusItems[it]) focusItems[it] = { ot: 0, exp: 0, gq: 0 };
                          focusItems[it].ot += c.operatingTime || 0;
                          focusItems[it].exp += c.expectedOutput || 0;
                          focusItems[it].gq += c.goodQty || 0;
                        });
                      }
                      // Defect type breakdown
                      if (m.focus === 'Q') {
                        ['TCP','FE'].forEach(s => {
                          const d = s === 'TCP' ? tcpData : feData;
                          // 공정불량은 OEE 집계에서 제외
                          (d?.defectLogs || []).forEach(df => {
                            if (!idsSet.has(df.productionLogId)) return;
                            const t = df.defectType || df.type || '미분류';
                            if (!focusDefects[t]) focusDefects[t] = { count: 0, qty: 0 };
                            focusDefects[t].count++;
                            focusDefects[t].qty += parseFloat(df.quantity) || 0;
                          });
                        });
                      }
                    }
                    const showA = !m.focus || m.focus === 'A';
                    const showP = !m.focus || m.focus === 'P';
                    const showQ = !m.focus || m.focus === 'Q';
                    const showOEEHeader = !m.focus;
                    const showLogList = isStage1 && !m.focus;

                    return (
                      <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background: 'rgba(15,23,42,0.6)'}} onClick={() => setOdDrillModal(null)}>
                        <div className="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
                          <div className="px-6 py-4 flex items-center justify-between" style={{background: 'linear-gradient(135deg, #14b8a6, #0d9488)'}}>
                            <div>
                              <div className="text-white font-bold text-lg flex items-center gap-2">📊 OEE 상세 분석</div>
                              <div className="text-emerald-50 text-xs mt-0.5">{title}</div>
                              <div className="text-emerald-100 text-xs">{subtitle}</div>
                            </div>
                            <div className="flex items-center gap-2">
                              {!isStage1 && <button onClick={() => setOdDrillModal({ ...m, stage: 1, singleLog: null })} className="text-white text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg">← 합산</button>}
                              <button onClick={() => setOdDrillModal(null)} className="text-white text-2xl leading-none px-2">×</button>
                            </div>
                          </div>

                          <div className="p-5 overflow-y-auto space-y-4">
                            {/* OEE Header */}
                            {showOEEHeader && (
                              <div className="bg-slate-50 rounded-xl p-4 text-center">
                                <div className="text-xs text-slate-500 mb-1">최종 OEE</div>
                                <div className="text-5xl font-black" style={{color: '#10b981'}}>{agg.OEE.toFixed(1)}<span className="text-2xl">%</span></div>
                                <div className="text-xs text-slate-500 mt-2">= A({agg.A.toFixed(1)}%) × P({agg.P.toFixed(1)}%) × Q({agg.Q.toFixed(1)}%)</div>
                              </div>
                            )}

                            {/* A */}
                            {showA && (
                            <div className="border border-blue-200 rounded-xl overflow-hidden">
                              <div className="bg-blue-50 px-4 py-2 flex items-center justify-between">
                                <div className="font-bold text-blue-900">▶ <Info term="A" label="A (가동률)" /></div>
                                <div className="text-2xl font-black text-blue-700">{agg.A.toFixed(1)}%</div>
                              </div>
                              <div className="p-4 text-sm space-y-1.5">
                                {!isStage1 && log && (() => {
                                  // Calculate downtime duration from startTime/endTime (duration 필드가 없는 경우 대비)
                                  const dtMin = (d) => {
                                    let dur = parseFloat(d.duration) || 0;
                                    if (!dur && d.startTime && d.endTime) {
                                      const parseHmLocal = (hm) => {
                                        if (!hm || !hm.includes(':')) return null;
                                        const [h, m] = hm.split(':').map(Number);
                                        return isNaN(h) || isNaN(m) ? null : h * 60 + m;
                                      };
                                      const s = parseHmLocal(d.startTime);
                                      const e = parseHmLocal(d.endTime);
                                      if (s != null && e != null) {
                                        let end = e < s ? e + 24*60 : e;
                                        dur = end - s;
                                      }
                                    }
                                    return dur;
                                  };
                                  const planDts = dts.filter(d => (d.downtimeCategory||d.category)==='계획');
                                  const unplanDts = dts.filter(d => (d.downtimeCategory||d.category)!=='계획');
                                  const planSum = planDts.reduce((s,d) => s + dtMin(d), 0);
                                  const unplanSum = unplanDts.reduce((s,d) => s + dtMin(d), 0);
                                  return (
                                    <>
                                      <div className="flex justify-between"><span className="text-slate-600">총 근무시간:</span><span>{(agg.lt + planSum).toFixed(0)}분 ({log.startTime || '-'} ~ {log.endTime || '-'})</span></div>
                                      <div className="flex justify-between"><span className="text-slate-600">계획 비가동:</span><span className="text-blue-600 font-medium">{planSum.toFixed(0)}분</span></div>
                                      {planDts.map((d,i) => (
                                        <div key={i} className="text-xs text-slate-500 ml-4">• {d.downtimeType}: {d.startTime||'-'}~{d.endTime||'-'} ({dtMin(d).toFixed(0)}분)</div>
                                      ))}
                                      <div className="flex justify-between"><span className="text-slate-600">비계획 비가동:</span><span className="text-rose-600 font-medium">{unplanSum.toFixed(0)}분</span></div>
                                      {unplanDts.map((d,i) => (
                                        <div key={i} className="text-xs text-slate-500 ml-4">• {d.downtimeType}: {d.startTime||'-'}~{d.endTime||'-'} ({dtMin(d).toFixed(0)}분)</div>
                                      ))}
                                    </>
                                  );
                                })()}
                                <div className="flex justify-between"><span className="text-slate-600"><Info term="계획시간" label="계획시간" />:</span><span>{Math.round(agg.lt).toLocaleString()}분</span></div>
                                <div className="flex justify-between"><span className="text-slate-600"><Info term="작업시간" label="작업시간" />:</span><span className="text-emerald-600 font-medium">{Math.round(agg.ot).toLocaleString()}분</span></div>

                                <div className="max-h-72 overflow-y-auto">
                                  <table className="w-full text-xs">

                                      <tr>
                                        <th className="px-3 py-1.5 text-left font-semibold">일자</th>
                                        {m.sec === '전체' && <th className="px-3 py-1.5 text-left font-semibold">아이템</th>}
                                        <th className="px-3 py-1.5 text-left font-semibold">라인·주야</th>

                                        <th className="px-3 py-1.5 text-right font-semibold bg-purple-50">P</th>

                                      {m.logs.slice().sort((a,b) => (a.productionDate||'').localeCompare(b.productionDate||'')).map((l, i) => {
                                        const c = computeFromLogs([l]);
                                        return (
                                          <tr key={i} className="border-t border-slate-100 hover:bg-indigo-50 cursor-pointer" onClick={() => setOdDrillModal({ ...m, stage: 2, singleLog: l })}>
                                            <td className="px-3 py-1.5 font-medium">{l.productionDate}</td>
                                            {m.sec === '전체' && <td className="px-3 py-1.5 text-slate-600 truncate max-w-xs">{l.item || '-'}</td>}

                                            <td className="px-3 py-1.5 text-right text-blue-700">{c.A.toFixed(1)}%</td>
                                            <td className="px-3 py-1.5 text-right text-purple-700">{c.P.toFixed(1)}%</td>
                                            <td className="px-3 py-1.5 text-right text-emerald-700">{c.Q.toFixed(1)}%</td>
                                            <td className="px-3 py-1.5 text-right text-indigo-700 font-bold">{c.OEE.toFixed(1)}%</td>
                                          </tr>
                                        );
                                      })}

                              </div>
                            )}
                          </div>

                          <div className="px-6 py-3 border-t border-slate-200 bg-slate-50 flex justify-end">
                            <button onClick={() => setOdDrillModal(null)} className="px-5 py-2 bg-slate-700 hover:bg-slate-800 text-white rounded-lg text-sm font-bold">닫기</button>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              );
            })()}

            {activeTab === 'pcsmh' && (tcpData || feData) && (() => {
              const targetData = pmSection === 'TCP' ? tcpData : feData;
              const ctBase = targetData?.settings?.[pmSection]?.ctBaseMinutes || 440;
              const items = targetData?.settings?.[pmSection]?.items || [];

              const pmLines = (() => {
                if (pmSection === 'TCP') return ['1PC','2PC','Nospin'];
                return getSectionDisplayLines('FE');
              })();

              // Items list filtered by selected lines (compare against display names)
              const linesEffective = pmSelectedLines.includes('ALL') ? pmLines : pmSelectedLines;
              const pmItems = (() => {
                const set = new Set();
                items.forEach(it => {
                  if (it.excludeFromOEE === true) return;
                  const displayLine = resolveLineName(pmSection, it.lineName);
                  if (linesEffective.includes(displayLine)) set.add(it.item);
                });
                return Array.from(set).sort();
              })();

              const isDateInRange = (dateStr) => {
                if (!dateStr) return false;
                return dateStr >= pmStart && dateStr <= pmEnd;
              };

              const itemsEffective = pmSelectedItems.includes('ALL') ? null : pmSelectedItems;

              const filteredLogs = (targetData?.productionLogs || []).filter(l => {
                if (!isDateInRange(l.productionDate)) return false;
                if (pmSection === 'TCP' && !(l.section === 'TCP' && ['1PC','2PC','Nospin'].includes(l.lineName))) return false;
                if (pmSection === 'FE' && l.section !== 'FE') return false;
                if (pmSection === 'FE' && (l.lineName === 'ATV' || l.lineName === 'ATV M/C')) return false;
                const displayLine = resolveLineName(pmSection, l.lineName);
                if (!pmSelectedLines.includes('ALL') && !pmSelectedLines.includes(displayLine)) return false;
                if (itemsEffective && !itemsEffective.includes(l.item)) return false;
                const itemDef = items.find(it => it.item === l.item);
                if (itemDef?.excludeFromOEE === true) return false;
                return true;
              });

              const parseHm = (hm) => {
                if (!hm || typeof hm !== 'string' || !hm.includes(':')) return null;
                const [h,m] = hm.split(':').map(Number);
                if (isNaN(h)||isNaN(m)) return null;
                return h*60+m;
              };
              const workerCount = (log) => {
                if (Array.isArray(log.selectedWorkers) && log.selectedWorkers.length > 0) return log.selectedWorkers.length;
                const w = parseInt(log.workers);
                return isNaN(w) ? 1 : w;
              };

              // Compute per-log: opTime, manMinutes, goodQty, planExpected
              const computed = filteredLogs.map(log => {
                const wc = workerCount(log);
                const s = parseHm(log.startTime), e = parseHm(log.endTime);
                let prodTime = 0;
                if (s != null && e != null) {
                  let end = e; if (end < s) end += 24*60;
                  prodTime = end - s;
                }
                let planned=0, unplanned=0;
                (targetData?.downtimeLogs || []).forEach(dt => {
                  if (dt.productionLogId !== log.id) return;
                  let dur = parseFloat(dt.duration) || 0;
                  if (!dur && dt.startTime && dt.endTime) {
                    const ds = parseHm(dt.startTime), de = parseHm(dt.endTime);
                    if (ds != null && de != null) {
                      let end = de; if (end < ds) end += 24*60;
                      dur = end - ds;
                    }
                  }
                  const cat = dt.downtimeCategory || dt.category;
                  if (cat === '계획') planned += dur;
                  else unplanned += dur;
                });
                const opTime = Math.max(0, prodTime - planned - unplanned);
                const manMinutes = opTime * wc;

                // Find planQty for this item/workers
                const itemDef = items.find(it => it.item === log.item);
                let planQty = null;
                if (itemDef && Array.isArray(itemDef.ct) && itemDef.ct.length > 0) {
                  const ce = itemDef.ct.find(c => c.workers === wc) || itemDef.ct[0];
                  planQty = ce.planQty;
                }
                const planExpected = (planQty != null && ctBase > 0) ? (opTime / ctBase) * planQty : 0;
                const goodQty = parseFloat(log.goodQuantity || 0);

                return {
                  log, wc, opTime, manMinutes, goodQty, planExpected,
                  planQty,
                  date: log.productionDate,
                  item: log.item,
                  lineName: resolveLineName(pmSection, log.lineName),
                };
              });

              // Aggregate totals
              const totals = computed.reduce((acc, r) => {
                acc.manMinutes += r.manMinutes;
                acc.goodQty += r.goodQty;
                acc.planExpected += r.planExpected;
                return acc;
              }, { manMinutes: 0, goodQty: 0, planExpected: 0 });

              const actualPcsMh = totals.manMinutes > 0 ? totals.goodQty / (totals.manMinutes / 60) : 0;
              const planPcsMh = totals.manMinutes > 0 ? totals.planExpected / (totals.manMinutes / 60) : 0;
              const efficiency = planPcsMh > 0 ? (actualPcsMh / planPcsMh) * 100 : 0;

              // Daily aggregation for chart
              const byDay = {};
              computed.forEach(r => {
                if (!byDay[r.date]) byDay[r.date] = { manMinutes: 0, goodQty: 0, planExpected: 0 };
                byDay[r.date].manMinutes += r.manMinutes;
                byDay[r.date].goodQty += r.goodQty;
                byDay[r.date].planExpected += r.planExpected;
              });
              const dayList = Object.keys(byDay).sort();
              const dayPoints = dayList.map(d => {
                const a = byDay[d];
                return {
                  date: d,
                  actual: a.manMinutes > 0 ? a.goodQty / (a.manMinutes / 60) : 0,
                  plan: a.manMinutes > 0 ? a.planExpected / (a.manMinutes / 60) : 0,
                };
              });

              // By item table
              const byItem = {};
              computed.forEach(r => {
                if (!byItem[r.item]) byItem[r.item] = { manMinutes: 0, goodQty: 0, planExpected: 0, lineName: r.lineName, planQtyDisplay: r.planQty };
                byItem[r.item].manMinutes += r.manMinutes;
                byItem[r.item].goodQty += r.goodQty;
                byItem[r.item].planExpected += r.planExpected;
              });
              const itemRows = Object.entries(byItem).map(([item, a]) => ({
                item,
                lineName: a.lineName,
                planQty: a.planQtyDisplay,
                manHours: a.manMinutes / 60,
                goodQty: a.goodQty,
                planExpected: a.planExpected,
                actualPcsMh: a.manMinutes > 0 ? a.goodQty / (a.manMinutes / 60) : 0,
                planPcsMh: a.manMinutes > 0 ? a.planExpected / (a.manMinutes / 60) : 0,
                eff: a.planExpected > 0 ? (a.goodQty / a.planExpected) * 100 : 0,
              })).sort((a,b) => b.manHours - a.manHours);

              const togglePmLine = (line) => {
                if (pmSelectedLines.includes('ALL')) {
                  setPmSelectedLines(pmLines.filter(l => l !== line));
                } else if (pmSelectedLines.includes(line)) {
                  const next = pmSelectedLines.filter(l => l !== line);
                  setPmSelectedLines(next.length === 0 ? ['ALL'] : next);
                } else {
                  const next = [...pmSelectedLines, line];
                  setPmSelectedLines(next.length === pmLines.length ? ['ALL'] : next);
                }
                setPmSelectedItems(['ALL']);
              };
              const togglePmItem = (item) => {
                if (pmSelectedItems.includes('ALL')) {
                  setPmSelectedItems(pmItems.filter(i => i !== item));
                } else if (pmSelectedItems.includes(item)) {
                  const next = pmSelectedItems.filter(i => i !== item);
                  setPmSelectedItems(next.length === 0 ? ['ALL'] : next);
                } else {
                  const next = [...pmSelectedItems, item];
                  setPmSelectedItems(next.length === pmItems.length ? ['ALL'] : next);
                }
              };

              // Chart geometry
              const W = 1100, H = 320, padL = 60, padR = 30, padT = 30, padB = 50;
              const maxY = Math.max(...dayPoints.map(p => Math.max(p.actual, p.plan)), 1);
              const xStep = dayPoints.length > 1 ? (W - padL - padR) / (dayPoints.length - 1) : 0;
              const xOf = (i) => padL + xStep * i;
              const yOf = (v) => H - padB - (H - padT - padB) * (v / maxY);

              return (
                <div className="flex gap-3">
                  {/* Left filter */}
                  <div className="w-56 flex-shrink-0 space-y-2">
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">기간</div>
                      <div className="p-3 space-y-2">
                        <div>
                          <label className="text-[10px] text-slate-500 font-medium">시작일</label>
                          <input type="date" value={pmStart} onChange={(e) => setPmStart(e.target.value)} className="w-full px-2 py-1 border border-slate-200 rounded text-xs" />
                        </div>
                        <div>
                          <label className="text-[10px] text-slate-500 font-medium">종료일</label>
                          <input type="date" value={pmEnd} onChange={(e) => setPmEnd(e.target.value)} className="w-full px-2 py-1 border border-slate-200 rounded text-xs" />
                        </div>
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">공정</div>
                      <div className="p-2 grid grid-cols-2 gap-1">
                        {['TCP','FE'].map(s => (
                          <button key={s} onClick={() => { setPmSection(s); setPmSelectedLines(['ALL']); setPmSelectedItems(['ALL']); }} className={`py-1.5 rounded-lg text-xs font-bold transition-colors ${pmSection === s ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{s}</button>
                        ))}
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">라인</div>
                      <div className="p-3 space-y-1.5">
                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                          <input type="checkbox" checked={pmSelectedLines.includes('ALL')} onChange={(e) => { setPmSelectedLines(e.target.checked ? ['ALL'] : []); setPmSelectedItems(['ALL']); }} className="accent-indigo-600" />
                          <span className="font-bold">모두 선택</span>
                        </label>
                        {pmLines.map(line => (
                          <label key={line} className="flex items-center gap-2 text-xs cursor-pointer">
                            <input type="checkbox" checked={pmSelectedLines.includes('ALL') || pmSelectedLines.includes(line)} onChange={() => togglePmLine(line)} className="accent-indigo-600" />
                            <span>{line}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">제품</div>
                      <div className="p-3 space-y-1.5">
                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                          <input type="checkbox" checked={pmSelectedItems.includes('ALL')} onChange={(e) => setPmSelectedItems(e.target.checked ? ['ALL'] : [])} className="accent-indigo-600" />
                          <span className="font-bold">모두 선택</span>
                        </label>
                        {pmItems.map(it => (
                          <label key={it} className="flex items-center gap-2 text-xs cursor-pointer">
                            <input type="checkbox" checked={pmSelectedItems.includes('ALL') || pmSelectedItems.includes(it)} onChange={() => togglePmItem(it)} className="accent-indigo-600" />
                            <span className="truncate">{it}</span>

                              <th className="px-3 py-2 text-right font-semibold">계획 PCS/MH</th>

                                <td className="px-3 py-2 text-right text-indigo-700">{actualPcsMh.toFixed(1)}</td>

            {(activeTab === 'defect' || activeTab === 'rework') && (tcpData || feData) && (() => {
              const kind = activeTab; // 'defect' or 'rework'
              const isDefect = kind === 'defect';
              const labelMain = isDefect ? '불량' : '재작업';
              const accent = isDefect ? 'rose' : 'emerald';
              const accentHex = isDefect ? '#f43f5e' : '#10b981';
              const accentLight = isDefect ? '#fecdd3' : '#a7f3d0';
              const accentDark = isDefect ? '#9f1239' : '#065f46';

              const drLines = (() => {
                if (drSection === 'TCP') return ['1PC','2PC','Nospin'];
                return getSectionDisplayLines('FE');
              })();

              const targetData = drSection === 'TCP' ? tcpData : feData;

              const isLineMatch = (log) => {
                if (drSection === 'TCP' && !(log.section === 'TCP' && ['1PC','2PC','Nospin'].includes(log.lineName))) return false;
                if (drSection === 'FE' && log.section !== 'FE') return false;
                if (drSection === 'FE' && (log.lineName === 'ATV' || log.lineName === 'ATV M/C')) return false;
                const displayLine = resolveLineName(drSection, log.lineName);
                if (!drSelectedLines.includes('ALL') && !drSelectedLines.includes(displayLine)) return false;
                return true;
              };

              const yearLogs = (targetData?.productionLogs || []).filter(l => {
                const d = new Date(l.productionDate);
                if (d.getFullYear() !== drYear) return false;
                return isLineMatch(l);
              });
              const logById = {};
              yearLogs.forEach(l => { logById[l.id] = l; });

              // Source records
              const sourceRecords = isDefect
                ? ((targetData?.defectLogs || []).map(d => ({ ...d, _src: d.originalType === 'process' ? '공정불량' : '불량' }))).filter(d => d.productionLogId != null && logById[d.productionLogId])
                : (targetData?.reworkLogs || []).filter(r => r.productionLogId != null && logById[r.productionLogId]);

              // Aggregate by month
              const monthAgg = {};
              for (let m = 1; m <= 12; m++) monthAgg[m] = { qty: 0, count: 0 };
              sourceRecords.forEach(r => {
                const log = logById[r.productionLogId];
                if (!log) return;
                const m = new Date(log.productionDate).getMonth() + 1;
                monthAgg[m].qty += parseFloat(r.quantity || 0);
                monthAgg[m].count += 1;
              });

              const maxQty = Math.max(...Object.values(monthAgg).map(a => a.qty), 1);
              const totalYearQty = Object.values(monthAgg).reduce((s, a) => s + a.qty, 0);
              const totalYearCount = Object.values(monthAgg).reduce((s, a) => s + a.count, 0);

              // Detail for clicked month
              let detailByLine = {};
              if (drDetailMonth) {
                drLines.forEach(line => { detailByLine[line] = { qty: 0, count: 0, items: [] }; });
                sourceRecords.forEach(r => {
                  const log = logById[r.productionLogId];
                  if (!log) return;
                  const m = new Date(log.productionDate).getMonth() + 1;
                  if (m !== drDetailMonth) return;
                  const line = resolveLineName(drSection, log.lineName);
                  if (!detailByLine[line]) detailByLine[line] = { qty: 0, count: 0, items: [] };
                  const q = parseFloat(r.quantity || 0);
                  detailByLine[line].qty += q;
                  detailByLine[line].count++;
                  detailByLine[line].items.push({
                    date: log.productionDate,
                    shift: log.shift || '-',
                    item: log.item,
                    src: r._src || (isDefect ? '불량' : '재작업'),
                    type: r.defectType || r.type || '-',
                    subType: r.defectSubType || '-',
                    station: r.station || '-',
                    qty: q,
                  });
                });
                Object.values(detailByLine).forEach(b => {
                  b.items.sort((a, b) => a.date.localeCompare(b.date));
                });
              }

              const toggleLine = (line) => {
                if (drSelectedLines.includes('ALL')) {
                  setDrSelectedLines(drLines.filter(l => l !== line));
                } else if (drSelectedLines.includes(line)) {
                  const next = drSelectedLines.filter(l => l !== line);
                  setDrSelectedLines(next.length === 0 ? ['ALL'] : next);
                } else {
                  const next = [...drSelectedLines, line];
                  setDrSelectedLines(next.length === drLines.length ? ['ALL'] : next);
                }
              };

              const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
              const W = 1100, H = 360, padL = 60, padR = 30, padT = 40, padB = 50;
              const cw = (W - padL - padR) / 12;

              return (
                <div className="flex gap-3">
                  {/* Left filter */}
                  <div className="w-56 flex-shrink-0 space-y-2">
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">연도</div>
                      <div className="p-3">
                        <select value={drYear} onChange={(e) => { setDrYear(Number(e.target.value)); setDrDetailMonth(null); }} className="w-full px-2 py-1.5 border border-slate-200 rounded-lg text-sm">
                          {[drYear-1, drYear, drYear+1].map(y => <option key={y} value={y}>{y}</option>)}
                        </select>
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">공정 구분</div>
                      <div className="p-2 grid grid-cols-2 gap-1">
                        {['TCP','FE'].map(s => (
                          <button key={s} onClick={() => { setDrSection(s); setDrSelectedLines(['ALL']); setDrDetailMonth(null); }} className={`py-1.5 rounded-lg text-xs font-bold transition-colors ${drSection === s ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{s}</button>
                        ))}
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">라인</div>
                      <div className="p-3 space-y-1.5">
                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                          <input type="checkbox" checked={drSelectedLines.includes('ALL')} onChange={(e) => { setDrSelectedLines(e.target.checked ? ['ALL'] : []); setDrDetailMonth(null); }} className="accent-indigo-600" />
                          <span className="font-bold">모두 선택</span>
                        </label>
                        {drLines.map(line => (
                          <label key={line} className="flex items-center gap-2 text-xs cursor-pointer">
                            <input type="checkbox" checked={drSelectedLines.includes('ALL') || drSelectedLines.includes(line)} onChange={() => { toggleLine(line); setDrDetailMonth(null); }} className="accent-indigo-600" />
                            <span>{line}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Right: chart + detail */}
                  <div className="flex-1 min-w-0 space-y-3">
                    {/* Summary cards */}
                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-white rounded-xl border border-slate-200 p-4">
                        <div className="text-xs text-slate-500 font-medium">{drYear}년 총 {labelMain}</div>
                        <div className="text-2xl font-bold mt-1" style={{color: accentDark}}>{totalYearQty.toLocaleString()}<span className="text-sm ml-1 font-medium text-slate-500">개</span></div>
                      </div>
                      <div className="bg-white rounded-xl border border-slate-200 p-4">
                        <div className="text-xs text-slate-500 font-medium">총 입력 건수</div>
                        <div className="text-2xl font-bold text-slate-800 mt-1">{totalYearCount.toLocaleString()}<span className="text-sm ml-1 font-medium text-slate-500">건</span></div>
                      </div>
                    </div>

                    {/* Year chart */}
                    <div className="bg-white rounded-xl border border-slate-200 p-4">
                      <h3 className="text-center text-base font-bold text-slate-800 mb-2">{drYear}년 월별 {labelMain} 수량</h3>
                      <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
                        {[0,0.25,0.5,0.75,1].map((f,i) => {
                          const y = padT + (H - padT - padB) * (1 - f);
                          const v = Math.round(maxQty * f);
                          return (
                            <g key={'gl'+i}>
                              <line x1={padL} y1={y} x2={W-padR} y2={y} stroke="#e2e8f0" strokeWidth="1" />
                              <text x={padL-6} y={y+4} textAnchor="end" fontSize="11" fill="#94a3b8">{v.toLocaleString()}</text>
                            </g>
                          );
                        })}
                        {Array.from({length: 12}, (_, i) => i+1).map(m => {
                          const a = monthAgg[m];
                          const x = padL + cw * (m - 1) + cw * 0.2;
                          const bw = cw * 0.6;
                          const bh = (H - padT - padB) * (a.qty / maxQty);
                          const by = H - padB - bh;
                          const isSelected = drDetailMonth === m;
                          return (
                            <g key={'bar'+m} className="cursor-pointer" onClick={() => setDrDetailMonth(drDetailMonth === m ? null : m)}>
                              <rect x={padL + cw*(m-1)} y={padT} width={cw} height={H-padT-padB} fill={isSelected ? '#f1f5f9' : 'transparent'} />
                              {a.qty > 0 && (
                                <>
                                  <rect x={x} y={by} width={bw} height={bh} fill={isSelected ? accentDark : accentHex} rx="3" />
                                  <text x={x + bw/2} y={by - 5} textAnchor="middle" fontSize="12" fontWeight="bold" fill={accentDark}>{Math.round(a.qty).toLocaleString()}</text>
                                </>
                              )}
                              <text x={padL + cw*(m-1) + cw/2} y={H - padB + 18} textAnchor="middle" fontSize="11" fontWeight={isSelected ? 'bold' : 'normal'} fill={isSelected ? '#0f172a' : '#64748b'}>{monthNames[m-1]}</text>
                            </g>
                          );
                        })}
                      </svg>
                      <p className="text-xs text-slate-400 text-center mt-1">월 막대를 클릭하면 해당 월 상세가 아래에 표시됩니다</p>
                    </div>

                    {/* Top 10 Items Pareto */}
                    {(() => {
                      const itemAgg = {};
                      sourceRecords.forEach(r => {
                        const log = logById[r.productionLogId];
                        if (!log) return;
                        if (new Date(log.productionDate).getFullYear() !== drYear) return;
                        const it = log.item || '미지정';
                        itemAgg[it] = (itemAgg[it] || 0) + (parseFloat(r.quantity) || 0);
                      });
                      const top = Object.entries(itemAgg).map(([item, qty]) => ({ item, qty })).sort((a,b) => b.qty - a.qty).slice(0, 10);
                      if (top.length === 0) return null;
                      const maxQ = top[0].qty;
                      const totalQ = Object.values(itemAgg).reduce((s, v) => s + v, 0);
                      let cum = 0;
                      return (
                        <div className="bg-white rounded-xl border border-slate-200 p-4">
                          <h3 className="text-center text-base font-bold text-slate-800 mb-3">{drYear}년 Top 10 아이템 {labelMain}</h3>
                          <div className="space-y-1.5">
                            {top.map((t, i) => {
                              cum += t.qty;
                              const pct = (t.qty/maxQ)*100;
                              const cumPct = (cum/totalQ)*100;
                              return (
                                <div key={i} className="flex items-center gap-2 text-xs">
                                  <div className="w-6 text-right font-bold text-slate-400">{i+1}</div>
                                  <div className="w-32 truncate font-medium">{t.item}</div>
                                  <div className="flex-1 bg-slate-100 rounded h-6 relative overflow-hidden">
                                    <div className="h-full rounded" style={{width: `${pct}%`, background: accentHex}}></div>
                                    <div className="absolute inset-0 flex items-center px-2 font-bold" style={{color: pct > 40 ? 'white' : '#334155'}}>{Math.round(t.qty).toLocaleString()}개</div>
                                  </div>
                                  <div className="w-16 text-right text-slate-500 font-medium">누적 {cumPct.toFixed(0)}%</div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })()}

                    {/* Detail */}
                    {drDetailMonth && (() => {
                      const monthTotal = Object.values(detailByLine).reduce((s,b) => s + b.qty, 0);
                      const monthCount = Object.values(detailByLine).reduce((s,b) => s + b.count, 0);
                      // Aggregate by type for donut (rework: by item, defect: by type)
                      const typeAgg = {};
                      Object.values(detailByLine).forEach(b => {
                        b.items.forEach(it => {
                          const t = isDefect ? (it.type || '미분류') : (it.item || '미분류');
                          if (!typeAgg[t]) typeAgg[t] = { qty: 0, count: 0 };
                          typeAgg[t].qty += it.qty;
                          typeAgg[t].count++;
                        });
                      });
                      const typeRows = Object.entries(typeAgg).map(([type,v]) => ({ type, ...v })).sort((a,b) => b.qty - a.qty);
                      const COLORS = ['#3b82f6','#8b5cf6','#ec4899','#f97316','#10b981','#06b6d4','#eab308','#f43f5e','#84cc16','#a855f7','#14b8a6','#f59e0b','#6366f1','#ef4444'];
                      return (
                        <>
                          <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                            <div className="bg-slate-50 px-4 py-2.5 font-semibold text-slate-700 flex items-center justify-between border-b border-slate-200">
                              <span>{drYear}년 {drDetailMonth}월 · {drSection} {isDefect ? '유형별' : '아이템별'} {labelMain}</span>
                              <button onClick={() => setDrDetailMonth(null)} className="text-xs px-2 py-1 bg-white border border-slate-200 rounded hover:bg-slate-50">닫기</button>
                            </div>
                            <div className="grid grid-cols-2 gap-4 p-4 border-b border-slate-200">
                              <div className="flex items-center justify-center">
                                {(() => {
                                  const cx=160, cy=160, r=110, ir=70;
                                  let cum = -Math.PI/2;
                                  const slices = typeRows.map((row, i) => {
                                    const frac = monthTotal > 0 ? row.qty/monthTotal : 0;
                                    const ang = frac * Math.PI * 2;
                                    const sa = cum, ea = cum + ang;
                                    cum = ea;
                                    const x1 = cx + r*Math.cos(sa), y1 = cy + r*Math.sin(sa);
                                    const x2 = cx + r*Math.cos(ea), y2 = cy + r*Math.sin(ea);
                                    const ix1 = cx + ir*Math.cos(ea), iy1 = cy + ir*Math.sin(ea);
                                    const ix2 = cx + ir*Math.cos(sa), iy2 = cy + ir*Math.sin(sa);
                                    const large = ang > Math.PI ? 1 : 0;
                                    const path = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix1} ${iy1} A ${ir} ${ir} 0 ${large} 0 ${ix2} ${iy2} Z`;
                                    const midA = (sa+ea)/2;
                                    const lr = (r+ir)/2;
                                    return { path, frac, color: COLORS[i % COLORS.length], lx: cx + lr*Math.cos(midA), ly: cy + lr*Math.sin(midA) };

                  const buf = await file.arrayBuffer();
                  const wb = XLSX.read(buf, { cellDates: false, cellNF: false });
                  const result = {};
                  let sheetCount = 0;
                  
                  wb.SheetNames.forEach(sn => {

                    const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true });
                    if (aoa.length < 14) return;
                    
                    // R3(idx 2): 일자 헤더, K열(idx 10)부터
                    const dateRow = aoa[2] || [];
                    const planRow = aoa[11] || [];   // R12: Total Plan
                    const actualRow = aoa[12] || []; // R13: Total Actual
                    
                    // 일자→컬럼 매핑
                    const dateColMap = {}; // {dateStr: colIdx}
                    for (let c = 10; c < dateRow.length; c++) {
                      const dv = dateRow[c];
                      let dateStr = null;
                      if (dv instanceof Date) {
                        dateStr = `${dv.getFullYear()}-${String(dv.getMonth()+1).padStart(2,'0')}-${String(dv.getDate()).padStart(2,'0')}`;
                      } else if (typeof dv === 'number') {
                        const d = XLSX.SSF.parse_date_code(dv);
                        if (d) dateStr = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
                      } else if (typeof dv === 'string') {
                        const mm = dv.match(/(\d{4})-(\d{2})-(\d{2})/);
                        if (mm) dateStr = `${mm[1]}-${mm[2]}-${mm[3]}`;
                      }
                      if (!dateStr) continue;
                      const [yy, mn] = dateStr.split('-').map(Number);
                      if (yy !== year || mn !== month) continue;
                      dateColMap[dateStr] = c;
                    }
                    
                    // R12/R13에서 Total 추출
                    Object.entries(dateColMap).forEach(([dateStr, c]) => {
                      const plan = parseFloat(planRow[c]) || 0;
                      const actual = parseFloat(actualRow[c]) || 0;
                      if (!result[dateStr]) result[dateStr] = { plan: 0, actual: 0, items: [] };
                      result[dateStr].plan = plan;
                      result[dateStr].actual = actual;
                    });
                    
                    // R19+ per P/No 데이터 추출
                    // Column: P/No=idx 3, Line(Part)=idx 4, P/A=idx 6
                    // 행 그룹: 같은 P/No의 plan 행들 합산, actual 행들 합산
                    const itemAcc = {}; // {dateStr: {pno|line: {plan, actual, pno, line}}}
                    for (let r = 18; r < aoa.length; r++) {  // 0-indexed 18 = R19
                      const row = aoa[r];
                      if (!row) continue;
                      const pno = String(row[3] || '').trim();
                      const line = String(row[4] || '').trim();
                      const pa = String(row[6] || '').trim();
                      if (!pno || !pa) continue;
                      
                      let kind = null;
                      if (pa.includes('P/Plan')) kind = 'plan';
                      else if (pa.includes('Actual')) kind = 'actual';
                      else continue;
                      
                      Object.entries(dateColMap).forEach(([dateStr, c]) => {
                        const v = parseFloat(row[c]) || 0;
                        if (v === 0) return;
                        if (!itemAcc[dateStr]) itemAcc[dateStr] = {};
                        const key = `${pno}__${line}`;
                        if (!itemAcc[dateStr][key]) {
                          itemAcc[dateStr][key] = { pno, line, plan: 0, actual: 0 };
                        }
                        itemAcc[dateStr][key][kind] += v;
                      });
                    }
                    
                    // items 저장
                    Object.entries(itemAcc).forEach(([dateStr, kvMap]) => {
                      if (!result[dateStr]) result[dateStr] = { plan: 0, actual: 0, items: [] };
                      result[dateStr].items = Object.values(kvMap).filter(it => it.plan > 0 || it.actual > 0);
                    });
                  });
                  
                  const dateCount = Object.keys(result).length;
                  if (sheetCount === 0) {
                    alert('TCP 월별 시트(예: 26_05월)를 찾지 못했습니다.');
                    return;
                  }
                  if (dateCount === 0) {
                    alert(`시트 ${sheetCount}개 발견했지만 데이터를 추출하지 못했습니다.\nR12(Total Plan)/R13(Total Actual) 행 형식을 확인해주세요.`);
                    return;
                  }
                  const newAchData = { ...achPlanData, tcp: { ...(achPlanData.tcp || {}), ...result } };
                  saveAchPlanData(newAchData);
                  autoSaveAchToDrive(newAchData);
                  alert(`TCP 계획 로드 완료: ${dateCount}일 (${sheetCount}개 시트)\n※ 기존 데이터에 병합됨\n※ Drive 자동 저장 중`);
                } catch (err) {
                  alert('TCP 엑셀 파싱 오류: ' + err.message);
                }
              };
              
              // FE 엑셀 파싱
              const handleFePlanUpload = async (file) => {
                try {
                  if (typeof XLSX === 'undefined') { alert('엑셀 라이브러리 로딩 중입니다'); return; }
                  const buf = await file.arrayBuffer();
                  const wb = XLSX.read(buf, { cellDates: false });
                  if (!wb.SheetNames.includes('계획검토')) {
                    alert('FE 파일에 "계획검토" 시트가 없습니다.');
                    return;
                  }
                  const ws = wb.Sheets['계획검토'];
                  const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true });
                  if (aoa.length < 6) return;
                  
                  // R5(idx 4): 일자 헤더, N열(idx 13)부터
                  // 컬럼: 대분류=idx 5, 중분류=idx 6, 품명=idx 7, 품번=idx 8, 라벨=idx 11
                  const dateRow = aoa[4] || [];
                  const dateColMap = {};
                  for (let c = 13; c < dateRow.length; c++) {
                    const dv = dateRow[c];
                    let dateStr = null;
                    if (dv instanceof Date) {
                      dateStr = `${dv.getFullYear()}-${String(dv.getMonth()+1).padStart(2,'0')}-${String(dv.getDate()).padStart(2,'0')}`;
                    } else if (typeof dv === 'number') {
                      const d = XLSX.SSF.parse_date_code(dv);
                      if (d) dateStr = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
                    } else if (typeof dv === 'string') {
                      const mm = dv.match(/(\d{4})-(\d{2})-(\d{2})/);
                      if (mm) dateStr = `${mm[1]}-${mm[2]}-${mm[3]}`;
                    }
                    if (dateStr) dateColMap[dateStr] = c;
                  }
                  
                  // 일자별 totals + per-item 누적
                  const totals = {}; // {dateStr: {plan, actual}}
                  const itemAcc = {}; // {dateStr: {pno: {pno, line, plan, actual}}}
                  
                  for (let r = 5; r < aoa.length; r++) {
                    const row = aoa[r];
                    if (!row) continue;
                    const label = String(row[11] || '').trim();
                    if (label !== '계획합계' && label !== '실적합계') continue;
                    
                    const line = String(row[5] || '').trim() || '(미지정)'; // 대분류
                    const pno = String(row[8] || '').trim();
                    if (!pno) continue;
                    
                    const kind = label === '계획합계' ? 'plan' : 'actual';
                    
                    Object.entries(dateColMap).forEach(([dateStr, c]) => {
                      const v = parseFloat(row[c]) || 0;
                      if (v === 0) return;
                      
                      // totals 누적
                      if (!totals[dateStr]) totals[dateStr] = { plan: 0, actual: 0 };
                      totals[dateStr][kind] += v;
                      
                      // per-item 누적
                      if (!itemAcc[dateStr]) itemAcc[dateStr] = {};
                      const key = `${pno}__${line}`;
                      if (!itemAcc[dateStr][key]) {
                        itemAcc[dateStr][key] = { pno, line, plan: 0, actual: 0 };
                      }
                      itemAcc[dateStr][key][kind] += v;
                    });
                  }
                  
                  const result = {};
                  Object.entries(totals).forEach(([dateStr, t]) => {
                    result[dateStr] = {
                      plan: t.plan,
                      actual: t.actual,
                      items: Object.values(itemAcc[dateStr] || {}).filter(it => it.plan > 0 || it.actual > 0)
                    };
                  });
                  
                  const dateCount = Object.keys(result).length;
                  if (dateCount === 0) {
                    alert('FE 계획/실적 데이터를 찾지 못했습니다.\n"계획검토" 시트의 "계획합계"/"실적합계" 행을 확인해주세요.');
                    return;
                  }
                  const newAchData = { ...achPlanData, fe: { ...(achPlanData.fe || {}), ...result } };
                  saveAchPlanData(newAchData);
                  autoSaveAchToDrive(newAchData);
                  alert(`FE 계획 로드 완료: ${dateCount}일\n※ 기존 데이터에 병합됨\n※ Drive 자동 저장 중`);
                } catch (err) {
                  alert('FE 엑셀 파싱 오류: ' + err.message);
                }
              };
              
              // 기간 내 날짜 목록
              const getDatesInRange = (start, end) => {
                const dates = [];
                const sd = new Date(start);
                const ed = new Date(end);
                for (let d = new Date(sd); d <= ed; d.setDate(d.getDate()+1)) {
                  dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
                }
                return dates;
              };
              
              // 일자별 합계
              const getDailyData = () => {
                const dates = getDatesInRange(achStartDate, achEndDate);
                return dates.map(dateStr => {
                  let plan = 0, actual = 0;
                  if (achSections.includes('TCP')) {
                    const t = achPlanData.tcp?.[dateStr];
                    if (t) { plan += t.plan || 0; actual += t.actual || 0; }
                  }
                  if (achSections.includes('FE')) {
                    const f = achPlanData.fe?.[dateStr];
                    if (f) { plan += f.plan || 0; actual += f.actual || 0; }
                  }
                  return { date: dateStr, plan, actual, ach: plan > 0 ? (actual / plan * 100) : 0 };
                });
              };
              
              // 일자별 + 라인별 분해 (선택된 섹션의 모든 라인)
              const getDailyByLine = () => {
                const dates = getDatesInRange(achStartDate, achEndDate);
                const rows = [];
                dates.forEach(dateStr => {
                  const lineMap = {}; // {section|line: {plan, actual}}
                  ['TCP','FE'].forEach(sec => {
                    if (!achSections.includes(sec)) return;
                    const dayData = achPlanData[sec.toLowerCase()]?.[dateStr];
                    if (!dayData?.items) return;
                    dayData.items.forEach(it => {
                      const key = `${sec}|${it.line || '(미지정)'}`;
                      if (!lineMap[key]) lineMap[key] = { section: sec, line: it.line || '(미지정)', plan: 0, actual: 0 };
                      lineMap[key].plan += it.plan || 0;
                      lineMap[key].actual += it.actual || 0;
                    });
                  });
                  Object.values(lineMap).forEach(lm => {
                    rows.push({
                      date: dateStr, section: lm.section, line: lm.line,
                      plan: lm.plan, actual: lm.actual,
                      ach: lm.plan > 0 ? (lm.actual / lm.plan * 100) : 0
                    });
                  });
                });
                return rows;
              };
              
              // 일자별 + 아이템별 분해
              const getDailyByItem = () => {
                const dates = getDatesInRange(achStartDate, achEndDate);
                const rows = [];
                dates.forEach(dateStr => {
                  ['TCP','FE'].forEach(sec => {
                    if (!achSections.includes(sec)) return;
                    const dayData = achPlanData[sec.toLowerCase()]?.[dateStr];
                    if (!dayData?.items) return;
                    dayData.items.forEach(it => {
                      if ((it.plan || 0) === 0 && (it.actual || 0) === 0) return;
                      rows.push({
                        date: dateStr, section: sec, line: it.line || '(미지정)', pno: it.pno,
                        plan: it.plan || 0, actual: it.actual || 0,
                        ach: (it.plan || 0) > 0 ? ((it.actual || 0) / it.plan * 100) : 0
                      });
                    });
                  });
                });
                return rows;
              };
              
              // 주별 (월요일 시작) - 합계
              const getWeeklyData = () => {
                const daily = getDailyData();
                const weekMap = {};
                daily.forEach(d => {
                  const dt = new Date(d.date);
                  const dow = dt.getDay();
                  const monOffset = dow === 0 ? -6 : 1 - dow;
                  const monday = new Date(dt);
                  monday.setDate(dt.getDate() + monOffset);
                  const wkKey = `${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`;
                  if (!weekMap[wkKey]) weekMap[wkKey] = { week: wkKey, plan: 0, actual: 0 };
                  weekMap[wkKey].plan += d.plan;
                  weekMap[wkKey].actual += d.actual;
                });
                return Object.values(weekMap)
                  .map(w => ({ ...w, ach: w.plan > 0 ? (w.actual / w.plan * 100) : 0 }))
                  .sort((a,b) => a.week.localeCompare(b.week));
              };
              
              // 주별 + 라인별
              const getWeeklyByLine = () => {
                const lineRows = getDailyByLine();
                const map = {};
                lineRows.forEach(d => {
                  const dt = new Date(d.date);
                  const dow = dt.getDay();
                  const monOffset = dow === 0 ? -6 : 1 - dow;
                  const monday = new Date(dt);
                  monday.setDate(dt.getDate() + monOffset);
                  const wkKey = `${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`;
                  const k = `${wkKey}|${d.section}|${d.line}`;
                  if (!map[k]) map[k] = { week: wkKey, section: d.section, line: d.line, plan: 0, actual: 0 };
                  map[k].plan += d.plan;
                  map[k].actual += d.actual;
                });
                return Object.values(map)
                  .map(w => ({ ...w, ach: w.plan > 0 ? (w.actual / w.plan * 100) : 0 }))
                  .sort((a,b) => a.week.localeCompare(b.week) || a.section.localeCompare(b.section) || a.line.localeCompare(b.line));
              };
              
              // 주별 + 아이템별
              const getWeeklyByItem = () => {
                const itemRows = getDailyByItem();
                const map = {};
                itemRows.forEach(d => {
                  const dt = new Date(d.date);
                  const dow = dt.getDay();
                  const monOffset = dow === 0 ? -6 : 1 - dow;
                  const monday = new Date(dt);
                  monday.setDate(dt.getDate() + monOffset);
                  const wkKey = `${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`;
                  const k = `${wkKey}|${d.section}|${d.line}|${d.pno}`;
                  if (!map[k]) map[k] = { week: wkKey, section: d.section, line: d.line, pno: d.pno, plan: 0, actual: 0 };
                  map[k].plan += d.plan;
                  map[k].actual += d.actual;
                });
                return Object.values(map)
                  .map(w => ({ ...w, ach: w.plan > 0 ? (w.actual / w.plan * 100) : 0 }))
                  .sort((a,b) => a.week.localeCompare(b.week) || a.section.localeCompare(b.section) || a.line.localeCompare(b.line) || a.pno.localeCompare(b.pno));
              };
              
              // 월별 합계
              const getMonthlyData = () => {
                const daily = getDailyData();
                const monthMap = {};
                daily.forEach(d => {
                  const mKey = d.date.slice(0,7);
                  if (!monthMap[mKey]) monthMap[mKey] = { month: mKey, plan: 0, actual: 0 };
                  monthMap[mKey].plan += d.plan;
                  monthMap[mKey].actual += d.actual;
                });
                return Object.values(monthMap)
                  .map(m => ({ ...m, ach: m.plan > 0 ? (m.actual / m.plan * 100) : 0 }))
                  .sort((a,b) => a.month.localeCompare(b.month));
              };
              
              // 월별 + 라인별
              const getMonthlyByLine = () => {
                const lineRows = getDailyByLine();
                const map = {};
                lineRows.forEach(d => {
                  const mKey = d.date.slice(0,7);
                  const k = `${mKey}|${d.section}|${d.line}`;
                  if (!map[k]) map[k] = { month: mKey, section: d.section, line: d.line, plan: 0, actual: 0 };
                  map[k].plan += d.plan;
                  map[k].actual += d.actual;
                });
                return Object.values(map)
                  .map(m => ({ ...m, ach: m.plan > 0 ? (m.actual / m.plan * 100) : 0 }))
                  .sort((a,b) => a.month.localeCompare(b.month) || a.section.localeCompare(b.section) || a.line.localeCompare(b.line));
              };
              
              // 월별 + 아이템별
              const getMonthlyByItem = () => {
                const itemRows = getDailyByItem();
                const map = {};
                itemRows.forEach(d => {
                  const mKey = d.date.slice(0,7);
                  const k = `${mKey}|${d.section}|${d.line}|${d.pno}`;
                  if (!map[k]) map[k] = { month: mKey, section: d.section, line: d.line, pno: d.pno, plan: 0, actual: 0 };
                  map[k].plan += d.plan;
                  map[k].actual += d.actual;
                });
                return Object.values(map)
                  .map(m => ({ ...m, ach: m.plan > 0 ? (m.actual / m.plan * 100) : 0 }))
                  .sort((a,b) => a.month.localeCompare(b.month) || a.section.localeCompare(b.section) || a.line.localeCompare(b.line) || a.pno.localeCompare(b.pno));
              };
              
              // 현재 표시할 데이터 선택
              const rows = (() => {
                if (achViewMode === 'daily') {
                  if (achBreakdown === 'line') return getDailyByLine();
                  if (achBreakdown === 'item') return getDailyByItem();
                  return getDailyData();
                }
                if (achViewMode === 'weekly') {
                  if (achBreakdown === 'line') return getWeeklyByLine();
                  if (achBreakdown === 'item') return getWeeklyByItem();
                  return getWeeklyData();
                }
                // monthly
                if (achBreakdown === 'line') return getMonthlyByLine();
                if (achBreakdown === 'item') return getMonthlyByItem();
                return getMonthlyData();
              })();
              
              const total = rows.reduce((acc, r) => ({
                plan: acc.plan + r.plan,
                actual: acc.actual + r.actual
              }), { plan: 0, actual: 0 });
              total.ach = total.plan > 0 ? (total.actual / total.plan * 100) : 0;
              
              const achColorClass = (pct) => {
                if (pct >= 100) return 'text-emerald-600';
                if (pct >= 80) return 'text-amber-600';
                return 'text-rose-600';
              };
              
              const tcpDays = Object.keys(achPlanData.tcp || {}).length;
              const feDays = Object.keys(achPlanData.fe || {}).length;
              
              return (
                <div className="space-y-4">
                  {/* 헤더 + 업로드 + 필터 */}
                  <div className="bg-white border rounded-lg p-4">
                    <h2 className="text-lg font-bold text-slate-800 mb-3">🎯 계획 대비 실적 달성율</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                      <div className="border rounded p-3">
                        <div className="flex items-center justify-between mb-2">
                          <span className="font-semibold text-slate-700">📊 TCP 계획 엑셀</span>
                          <span className="text-xs text-slate-500">{tcpDays}일 로드됨</span>
                        </div>
                        <input type="file" accept=".xlsx,.xls"
                          onChange={e => { const f = e.target.files?.[0]; if (f) handleTcpPlanUpload(f); e.target.value = ''; }}
                          className="block w-full text-sm text-slate-600 file:mr-3 file:py-1 file:px-3 file:rounded file:border-0 file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200" />
                        <div className="text-xs text-slate-500 mt-1">시트명: 26_05월 형식. R12=Total Plan, R13=Total Actual · 모든 월 자동 인식 (누적 병합)</div>
                      </div>
                      <div className="border rounded p-3">
                        <div className="flex items-center justify-between mb-2">
                          <span className="font-semibold text-slate-700">📊 FE 계획 엑셀</span>
                          <span className="text-xs text-slate-500">{feDays}일 로드됨</span>
                        </div>
                        <input type="file" accept=".xlsx,.xls"
                          onChange={e => { const f = e.target.files?.[0]; if (f) handleFePlanUpload(f); e.target.value = ''; }}
                          className="block w-full text-sm text-slate-600 file:mr-3 file:py-1 file:px-3 file:rounded file:border-0 file:bg-emerald-100 file:text-emerald-700 hover:file:bg-emerald-200" />
                        <div className="text-xs text-slate-500 mt-1">시트명: 계획검토. L열 라벨=계획합계/실적합계 · 매월 따로 업로드 (누적 병합)</div>
                      </div>
                    </div>
                    
                    <div className="flex flex-wrap items-center gap-3 pt-3 border-t">
                      <label className="flex items-center gap-2 text-sm">
                        <span className="text-slate-600">기간:</span>
                        <input type="date" value={achStartDate} onChange={e => setAchStartDate(e.target.value)} className="border rounded px-2 py-1" />
                        <span>~</span>
                        <input type="date" value={achEndDate} onChange={e => setAchEndDate(e.target.value)} className="border rounded px-2 py-1" />
                      </label>
                      <div className="flex gap-1">
                        {['TCP','FE'].map(s => (
                          <button key={s}
                            onClick={() => setAchSections(prev => prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s])}
                            className={`px-3 py-1 rounded text-sm ${achSections.includes(s) ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-600'}`}>
                            {s}
                          </button>
                        ))}
                      </div>
                      <div className="flex gap-1 ml-auto">
                        {[['daily','일별'],['weekly','주별'],['monthly','월별']].map(([k,l]) => (
                          <button key={k}
                            onClick={() => setAchViewMode(k)}
                            className={`px-3 py-1 rounded text-sm ${achViewMode === k ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-600'}`}>
                            {l}
                          </button>
                        ))}
                      </div>
                      <div className="flex gap-1">
                        <span className="text-xs text-slate-500 self-center">분해:</span>
                        {[['total','합계'],['line','라인별'],['item','아이템별']].map(([k,l]) => (
                          <button key={k}
                            onClick={() => setAchBreakdown(k)}
                            className={`px-3 py-1 rounded text-sm ${achBreakdown === k ? 'bg-purple-600 text-white' : 'bg-slate-200 text-slate-600'}`}>
                            {l}
                          </button>
                        ))}
                      </div>
                      {(tcpDays > 0 || feDays > 0) && (
                        <button onClick={() => {
