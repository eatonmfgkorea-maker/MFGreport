                            {/* Stage 1: log list */}
                            {showLogList && m.logs.length > 0 && (
                              <div className="border border-slate-200 rounded-xl overflow-hidden">
                                <div className="bg-slate-50 px-4 py-2 font-bold text-slate-700 text-sm">📅 일자별 보기 (클릭하여 단일 로그 분석)</div>
                                <div className="max-h-72 overflow-y-auto">
                                  <table className="w-full text-xs">
                                    <thead className="bg-slate-100 text-slate-600 sticky top-0">
                                      <tr>
                                        <th className="px-3 py-1.5 text-left font-semibold">일자</th>
                                        {m.sec === '전체' && <th className="px-3 py-1.5 text-left font-semibold">아이템</th>}
                                        <th className="px-3 py-1.5 text-left font-semibold">라인·주야</th>
                                        <th className="px-3 py-1.5 text-right font-semibold bg-blue-50">A</th>
                                        <th className="px-3 py-1.5 text-right font-semibold bg-purple-50">P</th>
                                        <th className="px-3 py-1.5 text-right font-semibold bg-emerald-50">Q</th>
                                        <th className="px-3 py-1.5 text-right font-semibold bg-indigo-50">OEE</th>
                                      </tr>
                                    </thead>
                                    <tbody>
                                      {m.logs.slice().sort((a,b) => (a.productionDate||'').localeCompare(b.productionDate||'')).map((l, i) => {
                                        const c = computeFromLogs([l]);
                                        return (
                                          <tr key={i} className="border-t border-slate-100 hover:bg-indigo-50 cursor-pointer" onClick={() => setOdDrillModal({ ...m, stage: 2, singleLog: l })}>
                                            <td className="px-3 py-1.5 font-medium">{l.productionDate}</td>
                                            {m.sec === '전체' && <td className="px-3 py-1.5 text-slate-600 truncate max-w-xs">{l.item || '-'}</td>}
                                            <td className="px-3 py-1.5 text-slate-600">{l.lineName} · {l.shift || '-'}</td>
                                            <td className="px-3 py-1.5 text-right text-blue-700">{c.A.toFixed(1)}%</td>
                                            <td className="px-3 py-1.5 text-right text-purple-700">{c.P.toFixed(1)}%</td>
                                            <td className="px-3 py-1.5 text-right text-emerald-700">{c.Q.toFixed(1)}%</td>
                                            <td className="px-3 py-1.5 text-right text-indigo-700 font-bold">{c.OEE.toFixed(1)}%</td>
                                          </tr>
                                        );
                                      })}
                                    </tbody>
                                  </table>
                                </div>
                              </div>
                            )}
                          </div>

                          <div className="px-6 py-3 border-t border-slate-200 bg-slate-50 flex justify-end">
                            <button onClick={() => setOdDrillModal(null)} className="px-5 py-2 bg-slate-700 hover:bg-slate-800 text-white rounded-lg text-sm font-bold">닫기</button>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              );
            })()}

            {activeTab === 'pcsmh' && (tcpData || feData) && (() => {
              const targetData = pmSection === 'TCP' ? tcpData : feData;
              const ctBase = targetData?.settings?.[pmSection]?.ctBaseMinutes || 440;
              const items = targetData?.settings?.[pmSection]?.items || [];

              const pmLines = (() => {
                if (pmSection === 'TCP') return ['1PC','2PC','Nospin'];
                return getSectionDisplayLines('FE');
              })();

              // Items list filtered by selected lines (compare against display names)
              const linesEffective = pmSelectedLines.includes('ALL') ? pmLines : pmSelectedLines;
              const pmItems = (() => {
                const set = new Set();
                items.forEach(it => {
                  if (it.excludeFromOEE === true) return;
                  const displayLine = resolveLineName(pmSection, it.lineName);
                  if (linesEffective.includes(displayLine)) set.add(it.item);
                });
                return Array.from(set).sort();
              })();

              const isDateInRange = (dateStr) => {
                if (!dateStr) return false;
                return dateStr >= pmStart && dateStr <= pmEnd;
              };

              const itemsEffective = pmSelectedItems.includes('ALL') ? null : pmSelectedItems;

              const filteredLogs = (targetData?.productionLogs || []).filter(l => {
                if (!isDateInRange(l.productionDate)) return false;
                if (pmSection === 'TCP' && !(l.section === 'TCP' && ['1PC','2PC','Nospin'].includes(l.lineName))) return false;
                if (pmSection === 'FE' && l.section !== 'FE') return false;
                if (pmSection === 'FE' && (l.lineName === 'ATV' || l.lineName === 'ATV M/C')) return false;
                const displayLine = resolveLineName(pmSection, l.lineName);
                if (!pmSelectedLines.includes('ALL') && !pmSelectedLines.includes(displayLine)) return false;
                if (itemsEffective && !itemsEffective.includes(l.item)) return false;
                const itemDef = items.find(it => it.item === l.item);
                if (itemDef?.excludeFromOEE === true) return false;
                return true;
              });

              const parseHm = (hm) => {
                if (!hm || typeof hm !== 'string' || !hm.includes(':')) return null;
                const [h,m] = hm.split(':').map(Number);
                if (isNaN(h)||isNaN(m)) return null;
                return h*60+m;
              };
              const workerCount = (log) => {
                if (Array.isArray(log.selectedWorkers) && log.selectedWorkers.length > 0) return log.selectedWorkers.length;
                const w = parseInt(log.workers);
                return isNaN(w) ? 1 : w;
              };

              // Compute per-log: opTime, manMinutes, goodQty, planExpected
              const computed = filteredLogs.map(log => {
                const wc = workerCount(log);
                const s = parseHm(log.startTime), e = parseHm(log.endTime);
                let prodTime = 0;
                if (s != null && e != null) {
                  let end = e; if (end < s) end += 24*60;
                  prodTime = end - s;
                }
                let planned=0, unplanned=0;
                (targetData?.downtimeLogs || []).forEach(dt => {
                  if (dt.productionLogId !== log.id) return;
                  let dur = parseFloat(dt.duration) || 0;
                  if (!dur && dt.startTime && dt.endTime) {
                    const ds = parseHm(dt.startTime), de = parseHm(dt.endTime);
                    if (ds != null && de != null) {
                      let end = de; if (end < ds) end += 24*60;
                      dur = end - ds;
                    }
                  }
                  const cat = dt.downtimeCategory || dt.category;
                  if (cat === '계획') planned += dur;
                  else unplanned += dur;
                });
                const opTime = Math.max(0, prodTime - planned - unplanned);
                const manMinutes = opTime * wc;

                // Find planQty for this item/workers
                const itemDef = items.find(it => it.item === log.item);
                let planQty = null;
                if (itemDef && Array.isArray(itemDef.ct) && itemDef.ct.length > 0) {
                  const ce = itemDef.ct.find(c => c.workers === wc) || itemDef.ct[0];
                  planQty = ce.planQty;
                }
                const planExpected = (planQty != null && ctBase > 0) ? (opTime / ctBase) * planQty : 0;
                const goodQty = parseFloat(log.goodQuantity || 0);

                return {
                  log, wc, opTime, manMinutes, goodQty, planExpected,
                  planQty,
                  date: log.productionDate,
                  item: log.item,
                  lineName: resolveLineName(pmSection, log.lineName),
                };
              });

              // Aggregate totals
              const totals = computed.reduce((acc, r) => {
                acc.manMinutes += r.manMinutes;
                acc.goodQty += r.goodQty;
                acc.planExpected += r.planExpected;
                return acc;
              }, { manMinutes: 0, goodQty: 0, planExpected: 0 });

              const actualPcsMh = totals.manMinutes > 0 ? totals.goodQty / (totals.manMinutes / 60) : 0;
              const planPcsMh = totals.manMinutes > 0 ? totals.planExpected / (totals.manMinutes / 60) : 0;
              const efficiency = planPcsMh > 0 ? (actualPcsMh / planPcsMh) * 100 : 0;

              // Daily aggregation for chart
              const byDay = {};
              computed.forEach(r => {
                if (!byDay[r.date]) byDay[r.date] = { manMinutes: 0, goodQty: 0, planExpected: 0 };
                byDay[r.date].manMinutes += r.manMinutes;
                byDay[r.date].goodQty += r.goodQty;
                byDay[r.date].planExpected += r.planExpected;
              });
              const dayList = Object.keys(byDay).sort();
              const dayPoints = dayList.map(d => {
                const a = byDay[d];
                return {
                  date: d,
                  actual: a.manMinutes > 0 ? a.goodQty / (a.manMinutes / 60) : 0,
                  plan: a.manMinutes > 0 ? a.planExpected / (a.manMinutes / 60) : 0,
                };
              });

              // By item table
              const byItem = {};
              computed.forEach(r => {
                if (!byItem[r.item]) byItem[r.item] = { manMinutes: 0, goodQty: 0, planExpected: 0, lineName: r.lineName, planQtyDisplay: r.planQty };
                byItem[r.item].manMinutes += r.manMinutes;
                byItem[r.item].goodQty += r.goodQty;
                byItem[r.item].planExpected += r.planExpected;
              });
              const itemRows = Object.entries(byItem).map(([item, a]) => ({
                item,
                lineName: a.lineName,
                planQty: a.planQtyDisplay,
                manHours: a.manMinutes / 60,
                goodQty: a.goodQty,
                planExpected: a.planExpected,
                actualPcsMh: a.manMinutes > 0 ? a.goodQty / (a.manMinutes / 60) : 0,
                planPcsMh: a.manMinutes > 0 ? a.planExpected / (a.manMinutes / 60) : 0,
                eff: a.planExpected > 0 ? (a.goodQty / a.planExpected) * 100 : 0,
              })).sort((a,b) => b.manHours - a.manHours);

              const togglePmLine = (line) => {
                if (pmSelectedLines.includes('ALL')) {
                  setPmSelectedLines(pmLines.filter(l => l !== line));
                } else if (pmSelectedLines.includes(line)) {
                  const next = pmSelectedLines.filter(l => l !== line);
                  setPmSelectedLines(next.length === 0 ? ['ALL'] : next);
                } else {
                  const next = [...pmSelectedLines, line];
                  setPmSelectedLines(next.length === pmLines.length ? ['ALL'] : next);
                }
                setPmSelectedItems(['ALL']);
              };
              const togglePmItem = (item) => {
                if (pmSelectedItems.includes('ALL')) {
                  setPmSelectedItems(pmItems.filter(i => i !== item));
                } else if (pmSelectedItems.includes(item)) {
                  const next = pmSelectedItems.filter(i => i !== item);
                  setPmSelectedItems(next.length === 0 ? ['ALL'] : next);
                } else {
                  const next = [...pmSelectedItems, item];
                  setPmSelectedItems(next.length === pmItems.length ? ['ALL'] : next);
                }
              };

              // Chart geometry
              const W = 1100, H = 320, padL = 60, padR = 30, padT = 30, padB = 50;
              const maxY = Math.max(...dayPoints.map(p => Math.max(p.actual, p.plan)), 1);
              const xStep = dayPoints.length > 1 ? (W - padL - padR) / (dayPoints.length - 1) : 0;
              const xOf = (i) => padL + xStep * i;
              const yOf = (v) => H - padB - (H - padT - padB) * (v / maxY);

              return (
                <div className="flex gap-3">
                  {/* Left filter */}
                  <div className="w-56 flex-shrink-0 space-y-2">
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">기간</div>
                      <div className="p-3 space-y-2">
                        <div>
                          <label className="text-[10px] text-slate-500 font-medium">시작일</label>
                          <input type="date" value={pmStart} onChange={(e) => setPmStart(e.target.value)} className="w-full px-2 py-1 border border-slate-200 rounded text-xs" />
                        </div>
                        <div>
                          <label className="text-[10px] text-slate-500 font-medium">종료일</label>
                          <input type="date" value={pmEnd} onChange={(e) => setPmEnd(e.target.value)} className="w-full px-2 py-1 border border-slate-200 rounded text-xs" />
                        </div>
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">공정</div>
                      <div className="p-2 grid grid-cols-2 gap-1">
                        {['TCP','FE'].map(s => (
                          <button key={s} onClick={() => { setPmSection(s); setPmSelectedLines(['ALL']); setPmSelectedItems(['ALL']); }} className={`py-1.5 rounded-lg text-xs font-bold transition-colors ${pmSection === s ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{s}</button>
                        ))}
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">라인</div>
                      <div className="p-3 space-y-1.5">
                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                          <input type="checkbox" checked={pmSelectedLines.includes('ALL')} onChange={(e) => { setPmSelectedLines(e.target.checked ? ['ALL'] : []); setPmSelectedItems(['ALL']); }} className="accent-indigo-600" />
                          <span className="font-bold">모두 선택</span>
                        </label>
                        {pmLines.map(line => (
                          <label key={line} className="flex items-center gap-2 text-xs cursor-pointer">
                            <input type="checkbox" checked={pmSelectedLines.includes('ALL') || pmSelectedLines.includes(line)} onChange={() => togglePmLine(line)} className="accent-indigo-600" />
                            <span>{line}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">제품</div>
                      <div className="p-3 space-y-1.5 max-h-72 overflow-y-auto">
                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                          <input type="checkbox" checked={pmSelectedItems.includes('ALL')} onChange={(e) => setPmSelectedItems(e.target.checked ? ['ALL'] : [])} className="accent-indigo-600" />
                          <span className="font-bold">모두 선택</span>
                        </label>
                        {pmItems.map(it => (
                          <label key={it} className="flex items-center gap-2 text-xs cursor-pointer">
                            <input type="checkbox" checked={pmSelectedItems.includes('ALL') || pmSelectedItems.includes(it)} onChange={() => togglePmItem(it)} className="accent-indigo-600" />
                            <span className="truncate">{it}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Right: cards + chart + table */}
                  <div className="flex-1 min-w-0 space-y-3">
                    {/* Summary cards */}
                    <div className="grid grid-cols-3 gap-3">
                      <div className="bg-white rounded-xl border border-slate-200 p-4">
                        <div className="text-xs text-slate-500 font-medium">실제 PCS/MH</div>
                        <div className="text-3xl font-bold text-indigo-700 mt-1">{actualPcsMh.toFixed(1)}</div>
                        <div className="text-[10px] text-slate-400 mt-1">양품 {Math.round(totals.goodQty).toLocaleString()}개 / {(totals.manMinutes/60).toFixed(1)} MH</div>
                      </div>
                      <div className="bg-white rounded-xl border border-slate-200 p-4">
                        <div className="text-xs text-slate-500 font-medium">계획 PCS/MH</div>
                        <div className="text-3xl font-bold text-slate-700 mt-1">{planPcsMh.toFixed(1)}</div>
                        <div className="text-[10px] text-slate-400 mt-1">계획 {Math.round(totals.planExpected).toLocaleString()}개 / {(totals.manMinutes/60).toFixed(1)} MH</div>
                      </div>
                      <div className="bg-white rounded-xl border border-slate-200 p-4">
                        <div className="text-xs text-slate-500 font-medium">달성률</div>
                        <div className="text-3xl font-bold mt-1" style={{color: efficiency >= 100 ? '#059669' : efficiency >= 80 ? '#0284c7' : '#dc2626'}}>{efficiency.toFixed(1)}<span className="text-base ml-1">%</span></div>
                        <div className="text-[10px] text-slate-400 mt-1">실제 / 계획</div>
                      </div>
                    </div>

                    {/* Daily trend chart */}
                    <div className="bg-white rounded-xl border border-slate-200 p-4">
                      <div className="flex items-center justify-between mb-2">
                        <h3 className="text-base font-bold text-slate-800">일자별 PCS/MH 추이</h3>
                        <div className="flex items-center gap-3 text-xs">
                          <div className="flex items-center gap-1"><span className="w-3 h-0.5 bg-indigo-600"></span><span>실제</span></div>
                          <div className="flex items-center gap-1"><span className="w-3 h-0.5 bg-slate-400" style={{borderTop:'1px dashed'}}></span><span>계획</span></div>
                        </div>
                      </div>
                      {dayPoints.length === 0 ? (
                        <div className="text-center py-12 text-slate-400 text-sm">선택한 기간에 데이터가 없습니다</div>
                      ) : (
                        <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
                          {[0,0.25,0.5,0.75,1].map((f,i) => {
                            const y = padT + (H - padT - padB) * (1 - f);
                            const v = (maxY * f).toFixed(0);
                            return (
                              <g key={'gl'+i}>
                                <line x1={padL} y1={y} x2={W-padR} y2={y} stroke="#e2e8f0" strokeWidth="1" />
                                <text x={padL-6} y={y+4} textAnchor="end" fontSize="11" fill="#94a3b8">{v}</text>
                              </g>
                            );
                          })}
                          {/* Plan line (dashed) */}
                          <path d={dayPoints.map((p,i) => `${i===0?'M':'L'} ${xOf(i)} ${yOf(p.plan)}`).join(' ')} fill="none" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4 4" />
                          {/* Actual line */}
                          <path d={dayPoints.map((p,i) => `${i===0?'M':'L'} ${xOf(i)} ${yOf(p.actual)}`).join(' ')} fill="none" stroke="#4f46e5" strokeWidth="2.5" />
                          {dayPoints.map((p,i) => (
                            <g key={'pt'+i}>
                              <circle cx={xOf(i)} cy={yOf(p.actual)} r="3" fill="#4f46e5" />
                              {(dayPoints.length <= 31 || i % Math.ceil(dayPoints.length/15) === 0) && (
                                <text x={xOf(i)} y={H - padB + 18} textAnchor="middle" fontSize="9" fill="#64748b" transform={dayPoints.length > 15 ? `rotate(-35 ${xOf(i)} ${H-padB+18})` : ''}>{p.date.slice(5)}</text>
                              )}
                            </g>
                          ))}
                        </svg>
                      )}
                    </div>

                    {/* Item table */}
                    <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 px-4 py-2.5 font-semibold text-slate-700 border-b border-slate-200">제품별 상세 ({itemRows.length}개)</div>
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                          <thead className="bg-slate-50 text-slate-600">
                            <tr>
                              <th className="px-3 py-2 text-left font-semibold">라인</th>
                              <th className="px-3 py-2 text-left font-semibold">제품</th>
                              <th className="px-3 py-2 text-right font-semibold">공수(MH)</th>
                              <th className="px-3 py-2 text-right font-semibold">양품수량</th>
                              <th className="px-3 py-2 text-right font-semibold">계획수량</th>
                              <th className="px-3 py-2 text-right font-semibold">실제 PCS/MH</th>
                              <th className="px-3 py-2 text-right font-semibold">계획 PCS/MH</th>
                              <th className="px-3 py-2 text-right font-semibold">달성률</th>
                            </tr>
                          </thead>
                          <tbody>
                            {itemRows.map((r, i) => (
                              <tr key={i} className="border-t border-slate-100 hover:bg-slate-50">
                                <td className="px-3 py-1.5 text-slate-500">{r.lineName}</td>
                                <td className="px-3 py-1.5 font-medium">{r.item}</td>
                                <td className="px-3 py-1.5 text-right">{r.manHours.toFixed(1)}</td>
                                <td className="px-3 py-1.5 text-right">{Math.round(r.goodQty).toLocaleString()}</td>
                                <td className="px-3 py-1.5 text-right text-slate-500">{Math.round(r.planExpected).toLocaleString()}</td>
                                <td className="px-3 py-1.5 text-right font-bold text-indigo-700">{r.actualPcsMh.toFixed(1)}</td>
                                <td className="px-3 py-1.5 text-right text-slate-600">{r.planPcsMh.toFixed(1)}</td>
                                <td className="px-3 py-1.5 text-right font-bold" style={{color: r.eff >= 100 ? '#059669' : r.eff >= 80 ? '#0284c7' : '#dc2626'}}>{r.eff.toFixed(1)}%</td>
                              </tr>
                            ))}
                            {itemRows.length === 0 && (
                              <tr><td colSpan="8" className="px-3 py-8 text-center text-slate-400">선택한 조건에 해당하는 데이터가 없습니다</td></tr>
                            )}
                            {itemRows.length > 0 && (
                              <tr className="border-t-2 border-slate-300 bg-slate-50 font-bold">
                                <td className="px-3 py-2" colSpan="2">합계</td>
                                <td className="px-3 py-2 text-right">{(totals.manMinutes/60).toFixed(1)}</td>
                                <td className="px-3 py-2 text-right">{Math.round(totals.goodQty).toLocaleString()}</td>
                                <td className="px-3 py-2 text-right">{Math.round(totals.planExpected).toLocaleString()}</td>
                                <td className="px-3 py-2 text-right text-indigo-700">{actualPcsMh.toFixed(1)}</td>
                                <td className="px-3 py-2 text-right">{planPcsMh.toFixed(1)}</td>
                                <td className="px-3 py-2 text-right" style={{color: efficiency >= 100 ? '#059669' : efficiency >= 80 ? '#0284c7' : '#dc2626'}}>{efficiency.toFixed(1)}%</td>
                              </tr>
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })()}

            {(activeTab === 'defect' || activeTab === 'rework') && (tcpData || feData) && (() => {
              const kind = activeTab; // 'defect' or 'rework'
              const isDefect = kind === 'defect';
              const labelMain = isDefect ? '불량' : '재작업';
              const accent = isDefect ? 'rose' : 'emerald';
              const accentHex = isDefect ? '#f43f5e' : '#10b981';
              const accentLight = isDefect ? '#fecdd3' : '#a7f3d0';
              const accentDark = isDefect ? '#9f1239' : '#065f46';

              const drLines = (() => {
                if (drSection === 'TCP') return ['1PC','2PC','Nospin'];
                return getSectionDisplayLines('FE');
              })();

              const targetData = drSection === 'TCP' ? tcpData : feData;

              const isLineMatch = (log) => {
                if (drSection === 'TCP' && !(log.section === 'TCP' && ['1PC','2PC','Nospin'].includes(log.lineName))) return false;
                if (drSection === 'FE' && log.section !== 'FE') return false;
                if (drSection === 'FE' && (log.lineName === 'ATV' || log.lineName === 'ATV M/C')) return false;
                const displayLine = resolveLineName(drSection, log.lineName);
                if (!drSelectedLines.includes('ALL') && !drSelectedLines.includes(displayLine)) return false;
                return true;
              };

              const yearLogs = (targetData?.productionLogs || []).filter(l => {
                const d = new Date(l.productionDate);
                if (d.getFullYear() !== drYear) return false;
                return isLineMatch(l);
              });
              const logById = {};
              yearLogs.forEach(l => { logById[l.id] = l; });

              // Source records
              const sourceRecords = isDefect
                ? (defectKind === 'process'
                    ? ((targetData?.processDefectLogs || []).map(d => ({ ...d, _src: '공정불량' }))).filter(d => d.productionLogId != null && logById[d.productionLogId])
                    : ((targetData?.defectLogs || []).map(d => ({ ...d, _src: '단품불량' }))).filter(d => d.productionLogId != null && logById[d.productionLogId]))
                : (targetData?.reworkLogs || []).filter(r => r.productionLogId != null && logById[r.productionLogId]);

              // Aggregate by month
              const monthAgg = {};
              for (let m = 1; m <= 12; m++) monthAgg[m] = { qty: 0, count: 0 };
              sourceRecords.forEach(r => {
                const log = logById[r.productionLogId];
                if (!log) return;
                const m = new Date(log.productionDate).getMonth() + 1;
                monthAgg[m].qty += parseFloat(r.quantity || 0);
                monthAgg[m].count += 1;
              });

              const maxQty = Math.max(...Object.values(monthAgg).map(a => a.qty), 1);
              const totalYearQty = Object.values(monthAgg).reduce((s, a) => s + a.qty, 0);
              const totalYearCount = Object.values(monthAgg).reduce((s, a) => s + a.count, 0);

              // Detail for clicked month
              let detailByLine = {};
              if (drDetailMonth) {
                drLines.forEach(line => { detailByLine[line] = { qty: 0, count: 0, items: [] }; });
                sourceRecords.forEach(r => {
                  const log = logById[r.productionLogId];
                  if (!log) return;
                  const m = new Date(log.productionDate).getMonth() + 1;
                  if (m !== drDetailMonth) return;
                  const line = resolveLineName(drSection, log.lineName);
                  if (!detailByLine[line]) detailByLine[line] = { qty: 0, count: 0, items: [] };
                  const q = parseFloat(r.quantity || 0);
                  detailByLine[line].qty += q;
                  detailByLine[line].count++;
                  detailByLine[line].items.push({
                    date: log.productionDate,
                    shift: log.shift || '-',
                    item: log.item,
                    src: r._src || (isDefect ? '단품불량' : '재작업'),
                    type: r.defectType || r.type || '-',
                    subType: r.defectSubType || '-',
                    station: r.station || '-',
                    qty: q,
                  });
                });
                Object.values(detailByLine).forEach(b => {
                  b.items.sort((a, b) => a.date.localeCompare(b.date));
                });
              }

              const toggleLine = (line) => {
                if (drSelectedLines.includes('ALL')) {
                  setDrSelectedLines(drLines.filter(l => l !== line));
                } else if (drSelectedLines.includes(line)) {
                  const next = drSelectedLines.filter(l => l !== line);
                  setDrSelectedLines(next.length === 0 ? ['ALL'] : next);
                } else {
                  const next = [...drSelectedLines, line];
                  setDrSelectedLines(next.length === drLines.length ? ['ALL'] : next);
                }
              };

              const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
              const W = 1100, H = 360, padL = 60, padR = 30, padT = 40, padB = 50;
              const cw = (W - padL - padR) / 12;

              return (
                <div className="flex gap-3">
                  {/* Left filter */}
                  <div className="w-56 flex-shrink-0 space-y-2">
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">연도</div>
                      <div className="p-3">
                        <select value={drYear} onChange={(e) => { setDrYear(Number(e.target.value)); setDrDetailMonth(null); }} className="w-full px-2 py-1.5 border border-slate-200 rounded-lg text-sm">
                          {[drYear-1, drYear, drYear+1].map(y => <option key={y} value={y}>{y}</option>)}
                        </select>
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">공정 구분</div>
                      <div className="p-2 grid grid-cols-2 gap-1">
                        {['TCP','FE'].map(s => (
                          <button key={s} onClick={() => { setDrSection(s); setDrSelectedLines(['ALL']); setDrDetailMonth(null); }} className={`py-1.5 rounded-lg text-xs font-bold transition-colors ${drSection === s ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{s}</button>
                        ))}
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 px-4 py-2 font-semibold text-sm">라인</div>
                      <div className="p-3 space-y-1.5">
                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                          <input type="checkbox" checked={drSelectedLines.includes('ALL')} onChange={(e) => { setDrSelectedLines(e.target.checked ? ['ALL'] : []); setDrDetailMonth(null); }} className="accent-indigo-600" />
                          <span className="font-bold">모두 선택</span>
                        </label>
                        {drLines.map(line => (
                          <label key={line} className="flex items-center gap-2 text-xs cursor-pointer">
                            <input type="checkbox" checked={drSelectedLines.includes('ALL') || drSelectedLines.includes(line)} onChange={() => { toggleLine(line); setDrDetailMonth(null); }} className="accent-indigo-600" />
                            <span>{line}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Right: chart + detail */}
                  <div className="flex-1 min-w-0 space-y-3">
                    {/* Defect kind toggle (only for defect tab) */}
                    {isDefect && (
                      <div className="bg-white rounded-xl border border-slate-200 p-2 inline-flex gap-1">
                        <button onClick={() => { setDefectKind('process'); setDrDetailMonth(null); }} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${defectKind === 'process' ? 'bg-rose-600 text-white' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`}>공정불량</button>
                        <button onClick={() => { setDefectKind('single'); setDrDetailMonth(null); }} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${defectKind === 'single' ? 'bg-rose-600 text-white' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`}>단품불량</button>
                      </div>
                    )}
                    {/* Summary cards */}
                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-white rounded-xl border border-slate-200 p-4">
                        <div className="text-xs text-slate-500 font-medium">{drYear}년 총 {labelMain}</div>
                        <div className="text-2xl font-bold mt-1" style={{color: accentDark}}>{totalYearQty.toLocaleString()}<span className="text-sm ml-1 font-medium text-slate-500">개</span></div>
                      </div>
                      <div className="bg-white rounded-xl border border-slate-200 p-4">
                        <div className="text-xs text-slate-500 font-medium">총 입력 건수</div>
                        <div className="text-2xl font-bold text-slate-800 mt-1">{totalYearCount.toLocaleString()}<span className="text-sm ml-1 font-medium text-slate-500">건</span></div>
                      </div>
                    </div>

                    {/* Year chart */}
                    <div className="bg-white rounded-xl border border-slate-200 p-4">
                      <h3 className="text-center text-base font-bold text-slate-800 mb-2">{drYear}년 월별 {labelMain} 수량</h3>
                      <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
                        {[0,0.25,0.5,0.75,1].map((f,i) => {
                          const y = padT + (H - padT - padB) * (1 - f);
                          const v = Math.round(maxQty * f);
                          return (
                            <g key={'gl'+i}>
                              <line x1={padL} y1={y} x2={W-padR} y2={y} stroke="#e2e8f0" strokeWidth="1" />
                              <text x={padL-6} y={y+4} textAnchor="end" fontSize="11" fill="#94a3b8">{v.toLocaleString()}</text>
                            </g>
                          );
                        })}
                        {Array.from({length: 12}, (_, i) => i+1).map(m => {
                          const a = monthAgg[m];
                          const x = padL + cw * (m - 1) + cw * 0.2;
                          const bw = cw * 0.6;
                          const bh = (H - padT - padB) * (a.qty / maxQty);
                          const by = H - padB - bh;
                          const isSelected = drDetailMonth === m;
                          return (
                            <g key={'bar'+m} className="cursor-pointer" onClick={() => setDrDetailMonth(drDetailMonth === m ? null : m)}>
                              <rect x={padL + cw*(m-1)} y={padT} width={cw} height={H-padT-padB} fill={isSelected ? '#f1f5f9' : 'transparent'} />
                              {a.qty > 0 && (
                                <>
                                  <rect x={x} y={by} width={bw} height={bh} fill={isSelected ? accentDark : accentHex} rx="3" />
                                  <text x={x + bw/2} y={by - 5} textAnchor="middle" fontSize="12" fontWeight="bold" fill={accentDark}>{Math.round(a.qty).toLocaleString()}</text>
                                </>
                              )}
                              <text x={padL + cw*(m-1) + cw/2} y={H - padB + 18} textAnchor="middle" fontSize="11" fontWeight={isSelected ? 'bold' : 'normal'} fill={isSelected ? '#0f172a' : '#64748b'}>{monthNames[m-1]}</text>
                            </g>
                          );
                        })}
                      </svg>
                      <p className="text-xs text-slate-400 text-center mt-1">월 막대를 클릭하면 해당 월 상세가 아래에 표시됩니다</p>
                    </div>

                    {/* Top 10 Items Pareto */}
                    {(() => {
                      const itemAgg = {};
                      sourceRecords.forEach(r => {
                        const log = logById[r.productionLogId];
                        if (!log) return;
                        if (new Date(log.productionDate).getFullYear() !== drYear) return;
                        const it = log.item || '미지정';
                        itemAgg[it] = (itemAgg[it] || 0) + (parseFloat(r.quantity) || 0);
                      });
                      const top = Object.entries(itemAgg).map(([item, qty]) => ({ item, qty })).sort((a,b) => b.qty - a.qty).slice(0, 10);
                      if (top.length === 0) return null;
                      const maxQ = top[0].qty;
                      const totalQ = Object.values(itemAgg).reduce((s, v) => s + v, 0);
                      let cum = 0;
                      return (
                        <div className="bg-white rounded-xl border border-slate-200 p-4">
                          <h3 className="text-center text-base font-bold text-slate-800 mb-3">{drYear}년 Top 10 아이템 {labelMain}</h3>
                          <div className="space-y-1.5">
                            {top.map((t, i) => {
                              cum += t.qty;
                              const pct = (t.qty/maxQ)*100;
                              const cumPct = (cum/totalQ)*100;
                              return (
                                <div key={i} className="flex items-center gap-2 text-xs">
                                  <div className="w-6 text-right font-bold text-slate-400">{i+1}</div>
                                  <div className="w-32 truncate font-medium">{t.item}</div>
                                  <div className="flex-1 bg-slate-100 rounded h-6 relative overflow-hidden">
                                    <div className="h-full rounded" style={{width: `${pct}%`, background: accentHex}}></div>
                                    <div className="absolute inset-0 flex items-center px-2 font-bold" style={{color: pct > 40 ? 'white' : '#334155'}}>{Math.round(t.qty).toLocaleString()}개</div>
                                  </div>
                                  <div className="w-16 text-right text-slate-500 font-medium">누적 {cumPct.toFixed(0)}%</div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })()}

                    {/* Detail */}
                    {drDetailMonth && (() => {
                      const monthTotal = Object.values(detailByLine).reduce((s,b) => s + b.qty, 0);
                      const monthCount = Object.values(detailByLine).reduce((s,b) => s + b.count, 0);
                      // Aggregate by type for donut (rework: by item, defect: by type)
                      const typeAgg = {};
                      Object.values(detailByLine).forEach(b => {
                        b.items.forEach(it => {
                          const t = isDefect ? (it.type || '미분류') : (it.item || '미분류');
                          if (!typeAgg[t]) typeAgg[t] = { qty: 0, count: 0 };
                          typeAgg[t].qty += it.qty;
                          typeAgg[t].count++;
                        });
                      });
                      const typeRows = Object.entries(typeAgg).map(([type,v]) => ({ type, ...v })).sort((a,b) => b.qty - a.qty);
                      const COLORS = ['#3b82f6','#8b5cf6','#ec4899','#f97316','#10b981','#06b6d4','#eab308','#f43f5e','#84cc16','#a855f7','#14b8a6','#f59e0b','#6366f1','#ef4444'];
                      return (
                        <>
                          <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                            <div className="bg-slate-50 px-4 py-2.5 font-semibold text-slate-700 flex items-center justify-between border-b border-slate-200">
                              <span>{drYear}년 {drDetailMonth}월 · {drSection} {isDefect ? '유형별' : '아이템별'} {labelMain}</span>
                              <button onClick={() => setDrDetailMonth(null)} className="text-xs px-2 py-1 bg-white border border-slate-200 rounded hover:bg-slate-50">닫기</button>
                            </div>
                            <div className="grid grid-cols-2 gap-4 p-4 border-b border-slate-200">
                              <div className="flex items-center justify-center">
                                {(() => {
                                  const cx=160, cy=160, r=110, ir=70;
                                  let cum = -Math.PI/2;
                                  const slices = typeRows.map((row, i) => {
                                    const frac = monthTotal > 0 ? row.qty/monthTotal : 0;
                                    const ang = frac * Math.PI * 2;
                                    const sa = cum, ea = cum + ang;
                                    cum = ea;
                                    const x1 = cx + r*Math.cos(sa), y1 = cy + r*Math.sin(sa);
                                    const x2 = cx + r*Math.cos(ea), y2 = cy + r*Math.sin(ea);
                                    const ix1 = cx + ir*Math.cos(ea), iy1 = cy + ir*Math.sin(ea);
                                    const ix2 = cx + ir*Math.cos(sa), iy2 = cy + ir*Math.sin(sa);
                                    const large = ang > Math.PI ? 1 : 0;
                                    const path = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix1} ${iy1} A ${ir} ${ir} 0 ${large} 0 ${ix2} ${iy2} Z`;
                                    const midA = (sa+ea)/2;
                                    const lr = (r+ir)/2;
                                    return { path, frac, color: COLORS[i % COLORS.length], lx: cx + lr*Math.cos(midA), ly: cy + lr*Math.sin(midA) };
                                  });
                                  return (
                                    <svg viewBox="0 0 320 320" className="w-full max-w-xs">
                                      {slices.map((s,i) => <path key={i} d={s.path} fill={s.color} stroke="white" strokeWidth="2" />)}
                                      {slices.filter(s => s.frac >= 0.04).map((s,i) => (
                                        <text key={'l'+i} x={s.lx} y={s.ly} textAnchor="middle" dominantBaseline="middle" fontSize="11" fontWeight="bold" fill="white">{(s.frac*100).toFixed(0)}%</text>
                                      ))}
                                      <text x={cx} y={cy-8} textAnchor="middle" fontSize="12" fill="#64748b">총 {labelMain}</text>
                                      <text x={cx} y={cy+14} textAnchor="middle" fontSize="18" fontWeight="bold" fill="#0f172a">{Math.round(monthTotal).toLocaleString()}</text>
                                      <text x={cx} y={cy+30} textAnchor="middle" fontSize="11" fill="#94a3b8">개</text>
                                    </svg>
                                  );
                                })()}
                              </div>
                              <div className="flex flex-col justify-center space-y-1.5 text-xs">
                                {typeRows.map((r,i) => (
                                  <div key={i} className="flex items-center gap-2">
                                    <span className="w-3 h-3 rounded-sm flex-shrink-0" style={{background: COLORS[i % COLORS.length]}}></span>
                                    <span className="flex-1 truncate">{r.type}</span>
                                    <span className="text-slate-500 font-medium">{Math.round(r.qty).toLocaleString()}개 ({monthTotal>0?(r.qty/monthTotal*100).toFixed(1):'-'}%)</span>
                                  </div>
                                ))}

              let detailByLine = {};
              if (toolDetailMonth) {
                toolLines.forEach(line => { detailByLine[line] = { count: 0, manMinutes: 0, items: [] }; });
                yearToolDowntimes.forEach(dt => {
                  const log = logById[dt.productionLogId];
                  if (!log) return;
                  const m = new Date(log.productionDate).getMonth() + 1;
                  if (m !== toolDetailMonth) return;
                  const line = resolveLineName(toolSection, log.lineName);
                  if (!detailByLine[line]) detailByLine[line] = { count: 0, manMinutes: 0, items: [] };
                  const wc = workerCount(log);
                  let raw = parseFloat(dt.duration) || 0;
                  if (!raw && dt.startTime && dt.endTime) {
                    const ds = parseHm(dt.startTime), de = parseHm(dt.endTime);
                    if (ds != null && de != null) {
                      let end = de; if (end < ds) end += 24*60;
                      raw = end - ds;
                    }
                  }
                  detailByLine[line].count++;
                  detailByLine[line].manMinutes += raw * wc;
                  detailByLine[line].items.push({
                    date: log.productionDate,
                    shift: log.shift || '-',
                    item: log.item,
                    type: dt.downtimeType,
                    startTime: dt.startTime,
                    endTime: dt.endTime,
                    rawDuration: raw,
                    workers: wc,
                    manMinutes: raw * wc,
                    content: dt.content || ''
                  });
                });
                Object.values(detailByLine).forEach(b => {
                  b.items.sort((a,b) => {
                    if (a.date !== b.date) return a.date.localeCompare(b.date);
                    return (a.startTime || '').localeCompare(b.startTime || '');
                  });
                });
              }

              const toggleLine = (line) => {
                if (toolSelectedLines.includes('ALL')) {
                  setToolSelectedLines(toolLines.filter(l => l !== line));
                } else if (toolSelectedLines.includes(line)) {
                  const next = toolSelectedLines.filter(l => l !== line);
                  setToolSelectedLines(next.length === 0 ? ['ALL'] : next);
                } else {
                  const next = [...toolSelectedLines, line];
                  setToolSelectedLines(next.length === toolLines.length ? ['ALL'] : next);
                }
              };

              const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

              // Chart dimensions
              const W = 1100, H = 360, padL = 60, padR = 60, padT = 40, padB = 50;
              const cw = (W - padL - padR) / 12;

              return (
                <div className="flex gap-3">
                  {/* Left filter */}
                  <div className="w-56 flex-shrink-0 space-y-2">
                    <div className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 text-center py-1.5 font-bold text-sm">연도</div>
                      <div className="p-3">
                        <select value={toolYear} onChange={(e) => { setToolYear(Number(e.target.value)); setToolDetailMonth(null); }} className="w-full px-2 py-1 border rounded text-sm">
                          {[toolYear-1, toolYear, toolYear+1].map(y => <option key={y} value={y}>{y}</option>)}
                        </select>
                      </div>
                    </div>
                    <div className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 text-center py-1.5 font-bold text-sm">공정 구분</div>
                      <div className="p-2 grid grid-cols-2 gap-1">
                        {['TCP','FE'].map(s => (
                          <button key={s} onClick={() => { setToolSection(s); setToolSelectedLines(['ALL']); setToolDetailMonth(null); }} className={`py-1.5 rounded text-xs font-bold ${toolSection === s ? 'bg-slate-700 text-white' : 'bg-slate-100 text-slate-700'}`}>{s}</button>
                        ))}
                      </div>
                    </div>
                    <div className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 text-slate-700 border-b border-slate-200 text-center py-1.5 font-bold text-sm">라 인</div>
                      <div className="p-3 space-y-1">
                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                          <input type="checkbox" checked={toolSelectedLines.includes('ALL')} onChange={(e) => { setToolSelectedLines(e.target.checked ? ['ALL'] : []); setToolDetailMonth(null); }} />
                          <span className="font-bold">모두 선택</span>
                        </label>
                        {toolLines.map(line => (
                          <label key={line} className="flex items-center gap-2 text-xs cursor-pointer">
                            <input type="checkbox" checked={toolSelectedLines.includes('ALL') || toolSelectedLines.includes(line)} onChange={() => { toggleLine(line); setToolDetailMonth(null); }} />
                            <span>{line}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Right: chart + detail */}
                  <div className="flex-1 min-w-0 space-y-3">
                    {/* Year chart */}
                    <div className="bg-white rounded-lg shadow-sm border border-slate-200 border border-slate-200 p-4">
                      <h3 className="text-center text-lg font-bold text-slate-800 mb-2">{toolYear}년 월별 TOOL 교체시간 / 횟수</h3>
                      <div className="flex gap-4 text-xs mb-1 ml-2">
                        <div className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-sky-400"></span>비가동시간 (인원반영, 분)</div>
                        <div className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-indigo-800"></span>TOOL 교체 횟수</div>
                      </div>
                      <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
                        {/* Y-axis grid (left: minutes) */}
                        {[0,0.25,0.5,0.75,1].map((f,i) => {
                          const y = padT + (H - padT - padB) * (1 - f);
                          const v = Math.round(maxMin * f);
                          return (
                            <g key={'gl'+i}>
                              <line x1={padL} y1={y} x2={W-padR} y2={y} stroke="#e5e7eb" strokeWidth="1" />
                              <text x={padL-6} y={y+4} textAnchor="end" fontSize="11" fill="#64748b">{v.toLocaleString()}</text>
                            </g>
                          );
                        })}
                        {/* Y-axis right (count) */}
                        {[0,0.25,0.5,0.75,1].map((f,i) => {
                          const y = padT + (H - padT - padB) * (1 - f);
                          const v = Math.round(maxCount * f);
                          return (
                            <text key={'gr'+i} x={W-padR+6} y={y+4} textAnchor="start" fontSize="11" fill="#94a3b8">{v}</text>
                          );
                        })}
                        {/* Bars + month labels */}
                        {Array.from({length: 12}, (_, i) => i+1).map(m => {
                          const a = monthAgg[m];
                          const x = padL + cw * (m - 1) + cw * 0.2;
                          const bw = cw * 0.6;
                          const bh = (H - padT - padB) * (a.manMinutes / maxMin);
                          const by = H - padB - bh;
                          const isSelected = toolDetailMonth === m;
                          return (
                            <g key={'bar'+m} className="cursor-pointer" onClick={() => setToolDetailMonth(toolDetailMonth === m ? null : m)}>
                              <rect x={padL + cw*(m-1)} y={padT} width={cw} height={H-padT-padB} fill={isSelected ? '#dbeafe' : 'transparent'} />
                              {a.manMinutes > 0 && (
                                <>
                                  <rect x={x} y={by} width={bw} height={bh} fill={isSelected ? '#0284c7' : '#38bdf8'} rx="2" />
                                  <text x={x + bw/2} y={by - 5} textAnchor="middle" fontSize="13" fontWeight="bold" fill="#0c4a6e">{Math.round(a.manMinutes).toLocaleString()}</text>
                                </>
                              )}
                              <text x={padL + cw*(m-1) + cw/2} y={H - padB + 18} textAnchor="middle" fontSize="11" fontWeight={isSelected ? 'bold' : 'normal'} fill={isSelected ? '#0c4a6e' : '#64748b'}>{monthNames[m-1]}</text>
                            </g>
                          );
                        })}
                        {/* Count line */}
                        {(() => {
                          const pts = Array.from({length: 12}, (_, i) => i+1).map(m => {
                            const a = monthAgg[m];
                            const x = padL + cw*(m-1) + cw/2;
                            const y = H - padB - (H - padT - padB) * (a.count / maxCount);
                            return { x, y, count: a.count, m };
                          });
                          const path = pts.filter(p => p.count > 0).map((p, i) => `${i===0?'M':'L'} ${p.x} ${p.y}`).join(' ');
                          return (
                            <g>
                              <path d={path} fill="none" stroke="#1e3a8a" strokeWidth="2" />
                              {pts.filter(p => p.count > 0).map((p, i) => (
                                <g key={'pt'+i}>
                                  <circle cx={p.x} cy={p.y} r="4" fill="#1e3a8a" />
                                  <rect x={p.x - 14} y={p.y - 22} width="28" height="16" fill="#e0f2fe" rx="3" />
                                  <text x={p.x} y={p.y - 10} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#0c4a6e">{p.count}</text>
                                </g>
                              ))}
                            </g>
                          );
                        })()}
                      </svg>
                      <p className="text-xs text-slate-500 text-center mt-1">월 막대를 클릭하면 해당 월 상세가 아래에 표시됩니다</p>
                    </div>

                    {/* Detail for selected month */}
                    {toolDetailMonth && (() => {
                      const totalCount = Object.values(detailByLine).reduce((s,b) => s + b.count, 0);
                      const totalMin = Object.values(detailByLine).reduce((s,b) => s + b.manMinutes, 0);
                      return (
                        <>
                          <div className="bg-white rounded-lg shadow-sm border border-slate-200 border border-slate-200 overflow-hidden">
                            <div className="bg-slate-100 px-4 py-2 font-bold text-slate-700 flex items-center justify-between">
                              <span>{toolYear}년 {toolDetailMonth}월 · {toolSection} 라인별 Tool 교체</span>
                              <button onClick={() => setToolDetailMonth(null)} className="text-xs px-2 py-1 bg-slate-200 rounded hover:bg-slate-300">닫기</button>
                            </div>
                            <table className="w-full text-sm">
                              <thead className="bg-slate-50">
                                <tr>
                                  <th className="px-3 py-2 text-left">라인</th>
                                  <th className="px-3 py-2 text-right">교체 횟수</th>
                                  <th className="px-3 py-2 text-right">총 공수(인원×분)</th>
                                  <th className="px-3 py-2 text-right">1회 평균(인원×분)</th>
                                </tr>
                              </thead>
                              <tbody>
                                {toolLines.map(line => {
                                  const b = detailByLine[line] || { count: 0, manMinutes: 0 };
                                  return (
                                    <tr key={line} className="border-t border-slate-100">
                                      <td className="px-3 py-2 font-bold">{line}</td>
                                      <td className="px-3 py-2 text-right">{b.count}회</td>
                                      <td className="px-3 py-2 text-right">{Math.round(b.manMinutes).toLocaleString()}</td>
                                      <td className="px-3 py-2 text-right">{b.count > 0 ? (b.manMinutes/b.count).toFixed(1) : '-'}</td>
                                    </tr>
                                  );
                                })}
                                <tr className="border-t-2 border-slate-400 bg-slate-100 font-bold">
                                  <td className="px-3 py-2">합계</td>
                                  <td className="px-3 py-2 text-right text-indigo-700">{totalCount}회</td>
                                  <td className="px-3 py-2 text-right">{Math.round(totalMin).toLocaleString()}</td>
                                  <td className="px-3 py-2 text-right">{totalCount > 0 ? (totalMin/totalCount).toFixed(1) : '-'}</td>
                                </tr>
                              </tbody>
                            </table>
                          </div>

                          {toolLines.filter(line => (detailByLine[line]?.count || 0) > 0).map(line => (
                            <div key={line} className="bg-white rounded-lg shadow-sm border border-slate-200 border border-slate-200 overflow-hidden">
                              <div className="bg-sky-50 px-4 py-2 font-bold text-slate-700 border-b border-sky-100">{line} 상세 ({detailByLine[line].count}회)</div>
                              <table className="w-full text-xs">
                                <thead className="bg-slate-50">
                                  <tr>
                                    <th className="px-3 py-1.5 text-left">일자</th>
                                    <th className="px-3 py-1.5 text-left">주야</th>
                                    <th className="px-3 py-1.5 text-left">아이템</th>
                                    <th className="px-3 py-1.5 text-left">유형</th>
                                    <th className="px-3 py-1.5 text-center">시간</th>
                                    <th className="px-3 py-1.5 text-right">소요(분)</th>
                                    <th className="px-3 py-1.5 text-right">인원</th>
                                    <th className="px-3 py-1.5 text-right">공수</th>
                                    <th className="px-3 py-1.5 text-left">내용</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {detailByLine[line].items.map((it, i) => (
                                    <tr key={i} className="border-t border-slate-100">
                                      <td className="px-3 py-1">{it.date}</td>
                                      <td className="px-3 py-1">{it.shift}</td>
                                      <td className="px-3 py-1">{it.item}</td>
                                      <td className="px-3 py-1">{it.type}</td>
                                      <td className="px-3 py-1 text-center">{it.startTime}~{it.endTime}</td>
                                      <td className="px-3 py-1 text-right">{Math.round(it.rawDuration)}</td>
                                      <td className="px-3 py-1 text-right">{it.workers}</td>
                                      <td className="px-3 py-1 text-right font-medium">{Math.round(it.manMinutes)}</td>
                                      <td className="px-3 py-1 text-slate-600">{it.content}</td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          ))}
                        </>
                      );
                    })()}
                  </div>
                </div>
              );
            })()}

            {activeTab === 'dashboard' && !tcpData && !feData && autoLoadStatus === 'loading' && (
              <div className="bg-white border border-slate-200 rounded-xl p-16 text-center">
                <div className="inline-block w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                <h3 className="text-base font-semibold text-slate-700">데이터를 불러오는 중...</h3>
                <p className="text-xs text-slate-500 mt-1">잠시만 기다려주세요</p>
              </div>
            )}

            {activeTab === 'dashboard' && !tcpData && !feData && autoLoadStatus !== 'loading' && (
              <div className="bg-white border border-slate-200 rounded-xl p-16 text-center">
                <div className="text-5xl mb-4">📁</div>
                <h3 className="text-lg font-semibold text-slate-700 mb-2">데이터를 먼저 업로드해주세요</h3>
                <p className="text-xs text-slate-500 mb-4">자동 복원이 실패했거나 백업 파일이 없습니다</p>
                <button onClick={() => setActiveTab('upload')} className="mt-2 px-5 py-2 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors">데이터 업로드</button>
              </div>
            )}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
