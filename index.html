<script>
(function() {
  const AUTH_URL = 'https://script.google.com/macros/s/AKfycbyhM1MJAEflRpDIKa0vWKQdcY4h1WVkI8KZqGuKjgOQDCt7iRwcsexXSmhtSdTwwepH/exec';
  const PORTAL_URL = 'https://eatonmfgkorea-maker.github.io/MFGManagement/';
  
  function isAuthed() {
    if (localStorage.getItem('mfg_guest') === '1') return true;
    const token = localStorage.getItem('mfg_auth_token');
    const expiry = parseInt(localStorage.getItem('mfg_auth_expiry') || '0');
    return token && Date.now() < expiry;
  }
  
  if (isAuthed()) return;
  
  function injectModal() {
    const div = document.createElement('div');
    div.id = 'mfgAuthOverlay';
    div.style.cssText = 'position:fixed;inset:0;background:rgba(10,14,26,0.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:Pretendard,"Malgun Gothic",-apple-system,sans-serif;padding:1rem;';
    div.innerHTML = `
      <div style="background:#0f172a;border:1px solid rgba(255,255,255,0.1);border-radius:1rem;padding:2rem;width:100%;max-width:28rem;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">
        <div style="text-align:center;margin-bottom:1.5rem;">
          <div style="display:inline-flex;align-items:center;justify-content:center;width:4rem;height:4rem;border-radius:1rem;background:rgba(59,130,246,0.2);border:1px solid rgba(96,165,250,0.3);margin-bottom:1rem;">
            <svg style="width:2rem;height:2rem;color:#60a5fa;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
          </div>
          <h2 style="font-size:1.5rem;font-weight:bold;color:#fff;margin:0;">로그인이 필요합니다</h2>
          <p style="font-size:0.875rem;color:#94a3b8;margin-top:0.5rem;margin-bottom:0;">이 앱을 사용하려면 로그인해주세요</p>
        </div>
        <label style="display:block;font-size:0.875rem;color:#cbd5e1;margin-bottom:0.375rem;">ID</label>
        <input id="mfgAuthUserId" type="text" autocomplete="username" placeholder="ID" style="width:100%;padding:0.625rem 1rem;background:#1e293b;border:1px solid #334155;border-radius:0.5rem;color:#fff;outline:none;font-size:1rem;margin-bottom:1rem;box-sizing:border-box;" />
        <label style="display:block;font-size:0.875rem;color:#cbd5e1;margin-bottom:0.375rem;">비밀번호</label>
        <input id="mfgAuthPassword" type="password" autocomplete="current-password" placeholder="••••••••" style="width:100%;padding:0.625rem 1rem;background:#1e293b;border:1px solid #334155;border-radius:0.5rem;color:#fff;outline:none;font-size:1rem;margin-bottom:1rem;box-sizing:border-box;" />
        <div id="mfgAuthError" style="display:none;font-size:0.875rem;color:#f87171;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:0.5rem;padding:0.5rem 0.75rem;margin-bottom:1rem;"></div>
        <button id="mfgAuthBtn" style="width:100%;padding:0.625rem;background:#2563eb;color:#fff;font-weight:600;border:none;border-radius:0.5rem;cursor:pointer;font-size:1rem;">로그인</button>
        <button id="mfgGuestBtn" style="width:100%;padding:0.625rem;margin-top:0.625rem;background:transparent;color:#cbd5e1;font-weight:600;border:1px solid #334155;border-radius:0.5rem;cursor:pointer;font-size:0.95rem;">게스트로 둘러보기</button>
        <p style="font-size:0.75rem;color:#64748b;text-align:center;margin-top:0.5rem;margin-bottom:0;">게스트는 일부 화면만 조회할 수 있습니다</p>
        <div style="margin-top:1rem;text-align:center;">
          <a href="${PORTAL_URL}" style="font-size:0.875rem;color:#94a3b8;text-decoration:none;">← 메인 포털로 돌아가기</a>
        </div>
      </div>
    `;
    document.body.appendChild(div);
    document.body.style.overflow = 'hidden';
    
    const userIdEl = document.getElementById('mfgAuthUserId');
    const pwdEl = document.getElementById('mfgAuthPassword');
    const btnEl = document.getElementById('mfgAuthBtn');
    const errEl = document.getElementById('mfgAuthError');
    
    setTimeout(() => userIdEl.focus(), 100);
    
    async function doLogin() {
      const userId = userIdEl.value.trim();
      const password = pwdEl.value;
      if (!userId || !password) {
        errEl.textContent = 'ID와 비밀번호를 입력해주세요.';
        errEl.style.display = 'block';
        return;
      }
      btnEl.disabled = true;
      btnEl.textContent = '로그인 중...';
      errEl.style.display = 'none';
      try {
        const res = await fetch(AUTH_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'login', userId, password })
        });
        const data = await res.json();
        if (!data.ok) {
          errEl.textContent = data.error || '로그인 실패';
          errEl.style.display = 'block';
          btnEl.disabled = false;
          btnEl.textContent = '로그인';
          return;
        }
        localStorage.setItem('mfg_auth_token', data.token);
        localStorage.setItem('mfg_auth_user', data.userId);
        localStorage.setItem('mfg_auth_expiry', String(data.expiresAt));
        document.getElementById('mfgAuthOverlay').remove();
        document.body.style.overflow = '';
      } catch (e) {
        errEl.textContent = '네트워크 오류: ' + e.message;
        errEl.style.display = 'block';
        btnEl.disabled = false;
        btnEl.textContent = '로그인';
      }
    }
    
    btnEl.addEventListener('click', doLogin);
    pwdEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
    userIdEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') pwdEl.focus(); });

    // 게스트 진입 — GAS 호출 없이 제한 모드로 입장
    const guestBtn = document.getElementById('mfgGuestBtn');
    if (guestBtn) guestBtn.addEventListener('click', () => {
      localStorage.setItem('mfg_guest', '1');
      localStorage.setItem('mfg_auth_user', 'guest');
      document.getElementById('mfgAuthOverlay').remove();
      document.body.style.overflow = '';
    });
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectModal);
  } else {
    injectModal();
  }
})();
</script>

const {
  useState,
  useMemo
} = React;
async function __gunzipToObj(b64) {
  try {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const ds = new DecompressionStream('gzip');
    const stream = new Blob([bytes]).stream().pipeThrough(ds);
    const buf = await new Response(stream).arrayBuffer();
    const json = new TextDecoder().decode(buf);
    return JSON.parse(json);
  } catch (e) {
    console.warn('압축 해제 실패:', e);
    return null;
  }
}
async function __normalizeBackup(data) {
  if (data == null) return null;
  if (typeof data === 'string') return await __gunzipToObj(data);
  return data;
}
const __idb = {
  _db: null,
  async open() {
    if (this._db) return this._db;
    return new Promise(resolve => {
      try {
        const req = indexedDB.open('mfgreport_cache', 1);
        req.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('backups')) db.createObjectStore('backups');
        };
        req.onsuccess = e => {
          this._db = e.target.result;
          resolve(this._db);
        };
        req.onerror = () => resolve(null);
      } catch {
        resolve(null);
      }
    });
  },
  async get(key) {
    const db = await this.open();
    if (!db) return null;
    return new Promise(resolve => {
      try {
        const tx = db.transaction('backups', 'readonly');
        const r = tx.objectStore('backups').get(key);
        r.onsuccess = () => resolve(r.result || null);
        r.onerror = () => resolve(null);
      } catch {
        resolve(null);
      }
    });
  },
  async set(key, value) {
    const db = await this.open();
    if (!db) return;
    return new Promise(resolve => {
      try {
        const tx = db.transaction('backups', 'readwrite');
        tx.objectStore('backups').put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => resolve();
      } catch {
        resolve();
      }
    });
  },
  async prune(prefix, keepKey) {
    const db = await this.open();
    if (!db) return;
    return new Promise(resolve => {
      try {
        const tx = db.transaction('backups', 'readwrite');
        const store = tx.objectStore('backups');
        const req = store.getAllKeys();
        req.onsuccess = () => {
          (req.result || []).forEach(k => {
            if (typeof k === 'string' && k.startsWith(prefix + ':') && k !== keepKey) store.delete(k);
          });
        };
        tx.oncomplete = () => resolve();
        tx.onerror = () => resolve();
      } catch {
        resolve();
      }
    });
  }
};
function ValidationPanel({
  tcpData,
  feData,
  allLogs,
  computeLogContribution
}) {
  const [selectedCategory, setSelectedCategory] = useState('all');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [severityFilter, setSeverityFilter] = useState('all');
  const [sortBy, setSortBy] = useState(null);
  const [colFilters, setColFilters] = useState({});
  const [openDropdown, setOpenDropdown] = useState(null);
  const parseHm = hm => {
    if (!hm || typeof hm !== 'string' || !hm.includes(':')) return null;
    const [h, m] = hm.split(':').map(Number);
    if (isNaN(h) || isNaN(m)) return null;
    return h * 60 + m;
  };
  const minToHm = m => {
    m = (m % (24 * 60) + 24 * 60) % (24 * 60);
    return `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`;
  };
  const allDowntimeLogs = useMemo(() => {
    const arr = [];
    if (tcpData?.downtimeLogs) arr.push(...tcpData.downtimeLogs.map(d => ({
      ...d,
      source: 'TCP'
    })));
    if (feData?.downtimeLogs) arr.push(...feData.downtimeLogs.map(d => ({
      ...d,
      source: 'FE'
    })));
    return arr;
  }, [tcpData, feData]);
  const allDefectLogs = useMemo(() => {
    const arr = [];
    if (tcpData?.defectLogs) arr.push(...tcpData.defectLogs.map(d => ({
      ...d,
      source: 'TCP'
    })));
    if (feData?.defectLogs) arr.push(...feData.defectLogs.map(d => ({
      ...d,
      source: 'FE'
    })));
    return arr;
  }, [tcpData, feData]);
  const allReworkLogs = useMemo(() => {
    const arr = [];
    if (tcpData?.reworkLogs) arr.push(...tcpData.reworkLogs.map(r => ({
      ...r,
      source: 'TCP'
    })));
    if (feData?.reworkLogs) arr.push(...feData.reworkLogs.map(r => ({
      ...r,
      source: 'FE'
    })));
    return arr;
  }, [tcpData, feData]);
  const includeValidLine = l => {
    if (l.section === 'TCP') return ['1PC', '2PC', 'Nospin'].includes(l.lineName);
    if (l.section === 'FE') {
      const ln = String(l.lineName || '').replace(/\s+/g, '').toLowerCase();
      if (ln === 'atv') return false;
      return true;
    }
    return true;
  };
  const filteredLogs = useMemo(() => {
    return allLogs.filter(l => {
      if (!l.productionDate) return false;
      if (!includeValidLine(l)) return false;
      if (dateFrom && l.productionDate < dateFrom) return false;
      if (dateTo && l.productionDate > dateTo) return false;
      return true;
    });
  }, [allLogs, dateFrom, dateTo]);
  const planIssues = useMemo(() => {
    const issues = [];
    const STD = [{
      key: '조회',
      name: '조회',
      sMin: 8 * 60 + 30,
      eMin: 8 * 60 + 40,
      dur: 10
    }, {
      key: '오전쉼',
      name: '오전 쉬는시간',
      sMin: 10 * 60 + 30,
      eMin: 10 * 60 + 40,
      dur: 10
    }, {
      key: '점심',
      name: '점심시간',
      sMin: 12 * 60 + 30,
      eMin: 13 * 60 + 30,
      dur: 60
    }, {
      key: '체조',
      name: '체조',
      sMin: 13 * 60 + 30,
      eMin: 13 * 60 + 35,
      dur: 5
    }, {
      key: '오후쉼',
      name: '오후 쉬는시간',
      sMin: 15 * 60 + 20,
      eMin: 15 * 60 + 30,
      dur: 10
    }, {
      key: '저녁',
      name: '저녁시간',
      sMin: 17 * 60 + 30,
      eMin: 18 * 60,
      dur: 30
    }];
    const groups = {};
    filteredLogs.forEach(l => {
      if (!l.startTime || !l.endTime) return;
      const key = `${l.productionDate}|${l.shift || '주간'}|${l.section}`;
      if (!groups[key]) groups[key] = [];
      groups[key].push(l);
    });
    const overlap = (as, ae, bs, be) => Math.max(0, Math.min(ae, be) - Math.max(as, bs));
    Object.entries(groups).forEach(([gkey, logs]) => {
      const [date, shift, section] = gkey.split('|');
      const offset = shift === '야간' ? 12 * 60 : 0;
      const fiveSMin = section === 'FE' ? 10 : 5;
      const workIntervals = [];
      logs.forEach(l => {
        const s = parseHm(l.startTime),
          e = parseHm(l.endTime);
        if (s == null || e == null) return;
        const ws = s + offset;
        let we = e + offset;
        if (we < ws) we += 24 * 60;
        workIntervals.push([ws, we]);
      });
      workIntervals.sort((a, b) => a[0] - b[0]);
      const workUnion = [];
      workIntervals.forEach(([s, e]) => {
        if (workUnion.length && s <= workUnion[workUnion.length - 1][1]) {
          workUnion[workUnion.length - 1][1] = Math.max(workUnion[workUnion.length - 1][1], e);
        } else workUnion.push([s, e]);
      });
      const logIds = new Set(logs.map(l => l.id));
      const data = section === 'TCP' ? tcpData : feData;
      const planned = [];
      (data?.downtimeLogs || []).forEach(dt => {
        if (!logIds.has(dt.productionLogId)) return;
        const cat = dt.downtimeCategory || dt.category;
        if (cat !== '계획') return;
        const s = parseHm(dt.startTime),
          e = parseHm(dt.endTime);
        if (s == null || e == null) return;
        let ds = s + offset,
          de = e + offset;
        if (de < ds) de += 24 * 60;
        planned.push([ds, de]);
      });
      const expected = STD.map(st => ({
        ...st,
        sMinAbs: st.sMin + offset,
        eMinAbs: st.eMin + offset
      }));
      const workEnd = workUnion.length ? workUnion[workUnion.length - 1][1] : 0;
      const fiveSTargets = [17 * 60 + 30 + offset, 20 * 60 + offset];
      for (const target of fiveSTargets) {
        if (Math.abs(workEnd - target) <= 5) {
          expected.push({
            key: '라인5S',
            name: `라인5S (${section})`,
            sMinAbs: target - fiveSMin,
            eMinAbs: target,
            dur: fiveSMin
          });
          break;
        }
      }
      const missing = [];
      expected.forEach(ex => {
        let expInWork = 0;
        workUnion.forEach(([ws, we]) => {
          expInWork += overlap(ws, we, ex.sMinAbs, ex.eMinAbs);
        });
        if (expInWork <= 0) return;
        let actual = 0;
        planned.forEach(([ps, pe]) => {
          actual += overlap(ps, pe, ex.sMinAbs, ex.eMinAbs);
        });
        if (actual < expInWork) {
          missing.push({
            name: ex.name,
            expected: expInWork,
            actual,
            missing: expInWork - actual
          });
        }
      });
      if (missing.length > 0) {
        const totalMissing = missing.reduce((s, m) => s + m.missing, 0);
        issues.push({
          category: 'planned_downtime',
          severity: totalMissing >= 30 ? 'high' : totalMissing >= 10 ? 'mid' : 'low',
          date,
          shift,
          section,
          line: Array.from(new Set(logs.map(l => l.lineName))).join(', '),
          item: '',
          logCount: logs.length,
          issueText: missing.map(m => `${m.name}(${Math.round(m.missing)}분)`).join(', '),
          missingMinutes: totalMissing,
          logs: logs.map(l => l.id)
        });
      }
    });
    return issues;
  }, [filteredLogs, tcpData, feData]);
  const oeeIssues = useMemo(() => {
    const issues = [];
    filteredLogs.forEach(l => {
      const data = l.section === 'TCP' ? tcpData : feData;
      const items = data?.settings?.[l.section]?.items || [];
      const itemDef = items.find(it => it.item === l.item);
      if (itemDef?.excludeFromOEE === true) return;
      if (!itemDef) {
        issues.push({
          category: 'oee',
          severity: 'high',
          date: l.productionDate,
          shift: l.shift,
          section: l.section,
          line: l.lineName,
          item: l.item,
          issueText: '아이템이 설정에 없음 (CT 조회 불가)',
          logs: [l.id]
        });
        return;
      }
      if (!itemDef.ct || !Array.isArray(itemDef.ct) || itemDef.ct.length === 0) {
        issues.push({
          category: 'oee',
          severity: 'high',
          date: l.productionDate,
          shift: l.shift,
          section: l.section,
          line: l.lineName,
          item: l.item,
          issueText: 'CT(Cycle Time) 미설정',
          logs: [l.id]
        });
        return;
      }
      const workers = Array.isArray(l.selectedWorkers) ? l.selectedWorkers.length : parseInt(l.workers) || 1;
      const td = new Date(l.productionDate);
      const ce = itemDef.ct.find(c => {
        if (c.workers !== workers) return false;
        const sd = new Date(c.startDate);
        const ed = c.endDate ? new Date(c.endDate) : new Date('9999-12-31');
        return td >= sd && td <= ed;
      });
      if (!ce) {
        const wlist = [...new Set(itemDef.ct.map(c => c.workers))].join('/');
        issues.push({
          category: 'oee',
          severity: 'high',
          date: l.productionDate,
          shift: l.shift,
          section: l.section,
          line: l.lineName,
          item: l.item,
          issueText: `CT 매칭 실패 (인원 ${workers}명 — 등록된 CT 인원: ${wlist}명). P(성능) 계산에서 제외됨`,
          logs: [l.id]
        });
        return;
      }
      const baseQty = parseFloat(ce?.baseQty) || 0;
      if (baseQty <= 0) {
        issues.push({
          category: 'oee',
          severity: 'high',
          date: l.productionDate,
          shift: l.shift,
          section: l.section,
          line: l.lineName,
          item: l.item,
          issueText: `기준 생산량이 0 (인원 ${workers}명 기준 — CT 확인 필요)`,
          logs: [l.id]
        });
        return;
      }
      const contrib = computeLogContribution(l);
      if (!contrib) return;
      if (contrib.expectedOutput > 0) {
        const ratio = contrib.goodQty / contrib.expectedOutput;
        if (ratio > 2) {
          issues.push({
            category: 'oee',
            severity: 'mid',
            date: l.productionDate,
            shift: l.shift,
            section: l.section,
            line: l.lineName,
            item: l.item,
            issueText: `실제 양품(${Math.round(contrib.goodQty)})이 기대생산(${Math.round(contrib.expectedOutput)})의 ${(ratio * 100).toFixed(0)}% — CT 재검토 필요`,
            logs: [l.id]
          });
        } else if (ratio < 0.1 && contrib.goodQty > 0) {
          issues.push({
            category: 'oee',
            severity: 'mid',
            date: l.productionDate,
